name: deploy
# 手动触发: Gitea Web UI → Actions → deploy → Run workflow。
# 不再在 push 时自动触发——用户从 GitHub 拉取到 prod3 后，
# push 到 Gitea，然后手动在 Web UI 点击触发。
# runner 跑在主控宿主机(:host),复用主机 docker(已登录 registry.internal)+ 免密 ssh 到各目标。

on:
  workflow_dispatch:

env:
  REGISTRY: registry.internal:5000
  IMAGE_NAME: sales-agent
  FRONTEND_IMAGE_NAME: sales-agent-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
          echo "checked out $(git rev-parse --short HEAD)"

      - name: Build image (sha + latest)
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Building ${REGISTRY}/${IMAGE_NAME}:${SHA} and :latest"
          docker build -t ${REGISTRY}/${IMAGE_NAME}:${SHA} -t ${REGISTRY}/${IMAGE_NAME}:latest .

      - name: Push image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker push ${REGISTRY}/${IMAGE_NAME}:${SHA}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest
          echo "::notice::pushed ${REGISTRY}/${IMAGE_NAME}:${SHA}"

      - name: Build frontend image (sha + latest)
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Building frontend ${REGISTRY}/${FRONTEND_IMAGE_NAME}:${SHA} and :latest"
          docker build -t ${REGISTRY}/${FRONTEND_IMAGE_NAME}:${SHA} -t ${REGISTRY}/${FRONTEND_IMAGE_NAME}:latest -f console/Dockerfile console/

      - name: Push frontend image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker push ${REGISTRY}/${FRONTEND_IMAGE_NAME}:${SHA}
          docker push ${REGISTRY}/${FRONTEND_IMAGE_NAME}:latest
          echo "::notice::pushed frontend ${REGISTRY}/${FRONTEND_IMAGE_NAME}:${SHA}"

      - name: Mirror neo4j image to registry
        run: |
          docker pull docker.1ms.run/neo4j:5
          docker tag  docker.1ms.run/neo4j:5 ${REGISTRY}/neo4j:5
          docker push ${REGISTRY}/neo4j:5
          echo "::notice::mirrored ${REGISTRY}/neo4j:5"

  deploy-fanout:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Fan-out deploy to all targets
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${SHA}"
          FRONTEND_IMAGE="${REGISTRY}/${FRONTEND_IMAGE_NAME}:${SHA}"
          echo "Rolling out backend=${IMAGE} frontend=${FRONTEND_IMAGE}"
          IMAGE="${IMAGE}" FRONTEND_IMAGE="${FRONTEND_IMAGE}" scripts/ci-fanout.sh

  sync-code:
    runs-on: ubuntu-latest
    # 把代码同步到源码镜像服务器(deploy/code-sync-targets.json)。清单空时 no-op。
    steps:
      - name: checkout (本地 Gitea)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: Sync code to source-mirror servers
        run: scripts/sync-code.sh

  diag:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: diagnostic
        run: |
          echo "PWD: $(pwd)"
          echo "SHA: $(git rev-parse --short HEAD)"
          ls deploy/deploy-targets.json && echo "TARGETS_OK"
          ls scripts/ci-fanout.sh && echo "FANOUT_OK"
          # Test SSH to all deploy targets
          for host in root@47.118.16.235; do
            echo "--- SSH $host ---"
            ssh -n -o BatchMode=yes -o ConnectTimeout=5 $host 'echo OK_$(hostname)' 2>&1 || echo "SSH_FAILED"
          done
          # Test the deploy command on test remote
          echo "--- Test deploy cmd ---"
          ssh -n -o BatchMode=yes root@47.118.16.235 'REGISTRY_IMAGE=registry.internal:5000/sales-agent:latest bash /root/code/sales-agent/scripts/deploy-release.sh --yes 2>&1' | tail -5 2>&1 || echo "DEPLOY_FAILED"
