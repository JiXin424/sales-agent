lden_0454", "question": "考虑到其透明的定价和真实的购买力，福多多如何确保性价比？", "reference": "根据上下文，福多多通过“透明不加价”原则和“真实购买力”保障来实现成本效益。具体来说，电影票不高于猫眼零售价，蛋糕券与品牌官方价1:1，杜绝后端加价；同时通过高兑换率和兜底服务，确保每一元预算的实际价值最大化，总拥有成本更低。", "kb_label": "taishan", "model": "(default)", "answer": "这个问题问得好，说明你抓住了企业福利采购的核心——客户不怕花钱，怕花冤枉钱。福多多的性价比不是靠喊口号，是靠三个实打实的机制锁死的。\n\n你明天跟客户聊的时候，直接把这三点讲清楚：\n\n1. **零风险承诺倒逼供应链**。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多对客户承诺“蛋糕不高于官方正价，差价双倍赔付”“电影票不高于猫眼零售价，差价三倍赔付”。这意味着什么？意味着福多多自己必须先拿到比市场零售价更低的价格，否则每卖一张票、每卖一个蛋糕都在赔钱。这个机制逼着采购团队必须拿到真正的底价，而不是虚标原价再打折。\n\n2. **规模效应摊薄成本**。服务超30000家企业、覆盖2000万员工，这个体量（根据公司背景资料，置信度90%）让福多多在跟品牌方谈判时有绝对话语权。30万+商品、1000+品牌，不是小公司能拿到的资源池。量大，单价才能压下来，这个逻辑客户一听就懂。\n\n3. **定价透明，不玩虚的**。很多福利平台喜欢搞“原价999，员工价199”的把戏，福多多不干这个。定价逻辑就是“市场真实零售价”或“官方正价”，在这个基础上靠集采优势做减法。客户拿猫眼、京东、品牌官网一对比就知道，福多多的价格要么持平，要么更低。透明本身就是性价比——客户不用花时间去比价、去算折扣。\n\n**一句话总结**：福多多的性价比不是靠“打折”打出来的，是靠“零风险承诺+规模集采+透明定价”这套组合拳锁死的。你跟客户说：“您不用信我，您拿猫眼、京东、品牌官网随便比，比贵了福多多赔您。”", "rendered": "这个问题问得好，说明你抓住了企业福利采购的核心——客户不怕花钱，怕花冤枉钱。福多多的性价比不是靠喊口号，是靠三个实打实的机制锁死的。\n\n你明天跟客户聊的时候，直接把这三点讲清楚：\n\n1. **零风险承诺倒逼供应链**。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多对客户承诺“蛋糕不高于官方正价，差价双倍赔付”“电影票不高于猫眼零售价，差价三倍赔付”。这意味着什么？意味着福多多自己必须先拿到比市场零售价更低的价格，否则每卖一张票、每卖一个蛋糕都在赔钱。这个机制逼着采购团队必须拿到真正的底价，而不是虚标原价再打折。\n\n2. **规模效应摊薄成本**。服务超30000家企业、覆盖2000万员工，这个体量（根据公司背景资料，置信度90%）让福多多在跟品牌方谈判时有绝对话语权。30万+商品、1000+品牌，不是小公司能拿到的资源池。量大，单价才能压下来，这个逻辑客户一听就懂。\n\n3. **定价透明，不玩虚的**。很多福利平台喜欢搞“原价999，员工价199”的把戏，福多多不干这个。定价逻辑就是“市场真实零售价”或“官方正价”，在这个基础上靠集采优势做减法。客户拿猫眼、京东、品牌官网一对比就知道，福多多的价格要么持平，要么更低。透明本身就是性价比——客户不用花时间去比价、去算折扣。\n\n**一句话总结**：福多多的性价比不是靠“打折”打出来的，是靠“零风险承诺+规模集采+透明定价”这套组合拳锁死的。你跟客户说：“您不用信我，您拿猫眼、京东、品牌官网随便比，比贵了福多多赔您。”\n\n来源：\n1. 《拼多多助力市场价格透明化》\n2. 《拼多多性价比全面解析,助你轻松超越竞争对手的购物攻略!_小李之家》\n3. 《拼多多购物体验,价格实惠与质量如何选择?看清低价背后的逻辑,学会识别质量,精明消费指南!-自媒体-PHP中文网》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 6406, "ttft_ms": 18, "prompt_tokens": 3825, "completion_tokens": 406, "total_tokens": 4231, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.8, "完整性 (Completeness) [GEval]": 0.6 定能不能做。**\n工会预算通常是\"人均XX元/年\"，但很多销售一上来就推高价方案，结果客户说\"超预算了\"就卡住了。正确做法：先问清楚人均预算和总人数，然后直接给2-3个档位的方案（比如100元档、200元档、500元档），让客户自己选。根据员工案例库《王菲销售业务分享》（置信度80%），她成交的工会单子，80%是从最低档切入，后续再升级的。\n\n**第三，成员需求决定满意度，但别被带偏。**\n工会采购最怕\"众口难调\"。你不需要满足每个人的需求，而是要给一个\"选择权\"——比如福多多的福利商城，30万+商品覆盖衣食住行，员工自己选。你只需要告诉工会主席：\"你们员工最常提的需求是什么？电影票、蛋糕、还是年节礼包？我帮你们配一个组合方案。\" 根据客户画像库（置信度75%），工会采购决策者最在意的不是\"员工喜不喜欢\"，而是\"有没有人投诉\"。\n\n**你明天就做的三件事：**\n1. 整理一份\"工会采购合规清单\"，把经费使用红线、报销流程、审计要点列清楚，发给客户建立信任\n2. 准备3个档位的方案模板（100/200/500元），每个档位配2-3种组合（电影票+蛋糕、年节礼包+商城积分等）\n3. 跟客户沟通时，先问\"你们今年的经费使用规范是什么\"，再问\"人均预算多少\"，最后问\"员工反馈最多的是什么\"——顺序不能错", "rendered": "直接说结论：工会采购的本质是\"合规第一、预算第二、需求第三\"，顺序不能乱，顺序一错单子就黄。\n\n你明天跟工会客户沟通时，就按这个逻辑来拆解：\n\n**第一，合规是入场券，不是加分项。**\n工会采购最怕审计出问题。根据产品知识库《工会采购场景指南》（置信度90%），工会经费使用有严格的红线——必须走\"货到验收、凭票报销\"的流程，不能预充值、不能发现金等价物。你开场就要主动问：\"你们今年的经费使用规范有没有特别要求？\" 而不是先推产品。让客户觉得你懂规矩，他才敢跟你聊。\n\n**第二，预算决定方案档次，不是决定能不能做。**\n工会预算通常是\"人均XX元/年\"，但很多销售一上来就推高价方案，结果客户说\"超预算了\"就卡住了。正确做法：先问清楚人均预算和总人数，然后直接给2-3个档位的方案（比如100元档、200元档、500元档），让客户自己选。根据员工案例库《王菲销售业务分享》（置信度80%），她成交的工会单子，80%是从最低档切入，后续再升级的。\n\n**第三，成员需求决定满意度，但别被带偏。**\n工会采购最怕\"众口难调\"。你不需要满足每个人的需求，而是要给一个\"选择权\"——比如福多多的福利商城，30万+商品覆盖衣食住行，员工自己选。你只需要告诉工会主席：\"你们员工最常提的需求是什么？电影票、蛋糕、还是年节礼包？我帮你们配一个组合方案。\" 根据客户画像库（置信度75%），工会采购决策者最在意的不是\"员工喜不喜欢\"，而是\"有没有人投诉\"。\n\n**你明天就做的三件事：**\n1. 整理一份\"工会采购合规清单\"，把经费使用红线、报销流程、审计要点列清楚，发给客户建立信任\n2. 准备3个档位的方案模板（100/200/500元），每个档位配2-3种组合（电影票+蛋糕、年节礼包+商城积分等）\n3. 跟客户沟通时，先问\"你们今年的经费使用规范是什么\"，再问\"人均预算多少\"，最后问\"员工反馈最多的是什么\"——顺序不能错\n\n来源：\n1. 《工会采购制度》\n2. 《物资采购管理办法 (2).pdf-原创力文档》\n3. 《工会内部采购制度管理规定 - 豆丁网》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 7520, "ttft_ms": 4, "prompt_tokens": 3824, "completion_tokens": 510, "total_tokens": 4334, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.9, "完整性 (Completeness) [GEval]": 1.0, "Contextual Recall": 0.6, "Contextual Precision": 1.0, "Contextual Relevancy": 0.7222, "Faithfulness": 1.0, "Answer Relevancy": 0.95, "AnswerRecall (回答召回率)": 1.0, "Task C o alignment.", "Contextual Recall": "The score is 1.00 because every sentence in the expected output is fully supported by the retrieval context. Specifically, sentence 1 aligns with node 3's description of '模仿非洲部落情境' and role assignment; sentence 2 is supported by nodes 1 and 5 regarding music igniting passion and releasing pressure; and sentence 3 is supported by node 5's mention of '打破彼此间的壁垒', which matches the concept of '破冰'. Great job—everything is perfectly covered!", "Contextual Precision": "The score is 1.00 because the first node is highly relevant, directly addressing role-playing and music rhythm for rapid icebreaking, while all subsequent nodes are irrelevant, which is exactly the ideal ranking for contextual precision.", "Contextual Relevancy": "The score is 0.40 because the retrieval context contains many statements that are only general descriptions of African drum music or unrelated to role-playing and rapid ice-breaking, as noted in reasons like '该陈述是关于音乐的一般性描述，并未涉及非洲鼓、角色扮演或快速破冰的具体方法'. However, some statements are relevant, such as '非洲鼓团建是模仿非洲部落情境,通过非洲鼓不同的节奏,使部落内部成员之间,部落与部落之间的配合,达成一种完美统一的效果' and '摘下面具，快乐前行...扮演不同的角色', which touch on role-playing and team ice-breaking, but they are insufficient to fully address the input's focus on rapid ice-breaking through role-playing and rhythm.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness.", "Answer Relevancy": "The score is 0.15 because the actual output almost entirely ignores the input's specific question about African drums, role-playing, and rhythm for icebreaking, instead focusing on unrelated business contexts and client visits, with only a minimal or no direct relevance to the query.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统未直接回应用户的具体问题，而是以问题与业务场景不相关为由拒绝回答，未提供任何可操作的销售建议或信息，遗漏了用户请求中的关键信息点，且语气不符合专业销售教练的角色。"}}, {"question_id": "golden_0351", "question": "工会经费计提比例及留存规则？", "reference": "根据工会经费管理规定，经费主要来源为单位按工资总额2%计提的工会经费，其中基层工会留存50%，其余部分上缴上级工会。此外，经费还包括会员缴纳的5‰会费、行政补助和上级补助等。", "kb_label": "taishan", "model": "(default)", "answer": "工会经费的计提比例和留存规则，这是企业HR和工会采购福利时的核心关切。你问这个，说明你在跟客户聊福利方案时，遇到了对方拿这个当挡箭牌或决策依据。\n\n**直接给结论：**\n\n根据《中华人民共和国工会法》和《中国工会章程》的通用规定（需要查询知识库确认最新地方细则），标准规则是：\n\n1.  **计提比例**：企业按全部职工工资总额的 **2%** 按月计提工会经费。\n2.  **留存与上缴**：这2%的经费中，**60%** 留存给本单位工会使用，**40%** 上缴上级工会（通常逐级上缴至全国总工会）。\n\n**你明天就能用的三件事：**\n\n1.  **确认客户所在省市**：各地对工会经费的留存比例、使用范围（比如是否允许用于电影票、蛋糕等福利）有具体细则。问客户一句：“你们是按北京市总工会的细则执行，还是按你们集团自己的规定？” 这能帮你判断客户是真有政策限制，还是单纯想压价。\n2.  **把“合规”变成你的优势**：当客户说“我们工会经费有比例限制，不能乱花”时，你的话术应该是：“**正因如此，才更需要选我们。** 福多多所有产品（电影票、蛋糕、年节礼包）都支持开具工会经费合规发票，且我们20年零诉讼、零外债，能帮你规避审计风险。你用这笔钱买其他东西，万一出问题，审计查下来你担责；买我们的，我们帮你兜底。”\n3.  **算一笔账给客户听**：假设客户公司1000人，月均工资1万，月计提工会经费20万。其中60%留存（12万）。如果他用这12万买我们的电影通兑或蛋糕卡，覆盖全员，人均成本才120元/月。**你要帮他算的是“人均成本”，而不是“总经费”。** 话术：“张总，你们每月工会经费留存12万，如果全用来发福利，人均才120块。用我们的电影通兑，员工满意度高，你工会工作也出彩，这笔账怎么算都划算。”\n\n**注意**：如果客户说“我们上级工会规定只能发米面油”，这是典型的**政策限制异议**。你需要确认他上级工会的具体文件。如果确实有文件，你就转向推荐我们的**年节慰问礼包**（30万+商品，包含米面油等合规品类），而不是硬推电影票。", "rendered": "工会经费的计提比例和留存规则，这是企业HR和工会采购福利时的核心关切。你问这个，说明你在跟客户聊福利方案时，遇到了对方拿这个当挡箭牌或决策依据。\n\n**直接给结论：**\n\n根据《中华人民共和国工会法》和《中国工会章程》的通用规定（需要查询知识库确认最新地方细则），标准规则是：\n\n1.  **计提比例**：企业按全部职工工资总额的 **2%** 按月计提工会经费。\n2.  **留存与上缴**：这2%的经费中，**60%** 留存给本单位工会使用，**40%** 上缴上级工会（通常逐级上缴至全国总工会）。\n\n**你明天就能用的三件事：**\n\n1.  **确认客户所在省市**：各地对工会经费的留存比例、使用范围（比如是否允许用于电影票、蛋糕等福利）有具体细则。问客户一句：“你们是按北京市总工会的细则执行，还是按你们集团自己的规定？” 这能帮你判断客户是真有政策限制，还是单纯想压价。\n2.  **把“合规”变成你的优势**：当客户说“我们工会经费有比例限制，不能乱花”时，你的话术应该是：“**正因如此，才更需要选我们。** 福多多所有产品（电影票、蛋糕、年节礼包）都支持开具工会经费合规发票，且我们20年零诉讼、零外债，能帮你规避审计风险。你用这笔钱买其他东西，万一出问题，审计查下来你担责；买我们的，我们帮你兜底。”\n3.  **算一笔账给客户听**：假设客户公司1000人，月均工资1万，月计提工会经费20万。其中60%留存（12万）。如果他用这12万买我们的电影通兑或蛋糕卡，覆盖全员，人均成本才120元/月。**你要帮他算的是“人均成本”，而不是“总经费”。** 话术：“张总，你们每月工会经费留存12万，如果全用来发福利，人均才120块。用我们的电影通兑，员工满意度高，你工会工作也出彩，这笔账怎么算都划算。”\n\n**注意**：如果客户说“我们上级工会规定只能发米面油”，这是典型的**政策限制异议**。你需要确认他上级工会的具体文件。如果确实有文件，你就转向推荐 er the sales coach agent successfully completed the user's request, but the system provided a generic response about 福多多's customer service and guarantees, without any evaluation, analysis, or feedback on the agent's performance. It fails to directly respond to the user's specific question, provides no actionable sales advice, and does not fulfill the role of a professional sales coach."}}, {"question_id": "golden_0503", "question": "比较给销售新人的建议：寻找相似成功榜样与向同事学习，聚焦于各自的益处。", "reference": "对于销售新人而言，寻找相似成功的榜样和向同事学习各有独特益处：\n\n- **寻找相似成功的榜样**：能让你获得强烈的“他行，我也行”的信念。王菲正是通过找到一位性格内敛但靠踏实复盘成功的男同事作为榜样，在低谷期重建了自信。这种榜样更具参考价值，能直接激发你的成长型思维，让你相信能力可以通过努力复制。\n\n- **向同事学习**：能让你吸收身边人具体的闪光点，并快速内化为自己的技能。王菲强调，观察同事在真实拜访中的沟通方式，并主动“蹭”拜访，是新人积累量变的关键。这种学习更贴近日常，能即时解决具体问题。\n\n两者结合，既能通过榜样获得精神动力，又能通过同事学习积累实战经验，共同支撑新人度过新手期。", "kb_label": "taishan", "model": "(default)", "answer": "直接说结论：**先找成功榜样，再向同事学习，顺序不能反。**\n\n新人最怕的不是没方法，而是不知道\"什么是对的\"。给你三个具体动作：\n\n1. **锁定一个\"相似榜样\"**：找公司里跟你背景、客户类型最像的Top Sales。比如你负责中小企业，就找同样做中小企业的销冠。观察他每天做什么、怎么开场、怎么跟单。**好处是：路径可复制，不会因为客户类型不同而学偏。**\n\n2. **用\"跟单\"代替\"请教\"**：别光问\"你怎么做的\"，申请跟一次他的完整拜访或电话。你坐在旁边看他怎么应对客户说\"贵\"、怎么收尾。**好处是：场景化学习，比听理论管用10倍。**\n\n3. **向同事学习要聚焦一个点**：每天只学一个具体动作。比如今天只学\"怎么开场\"，明天只学\"怎么处理异议\"。别贪多，学完立刻用。**好处是：反馈快，能马上验证对不对。**\n\n你明天就做一件事：找你的主管，问\"咱们团队里谁做中小企业客户最厉害？我想跟他跟一次单。\"", "rendered": "直接说结论：**先找成功榜样，再向同事学习，顺序不能反。**\n\n新人最怕的不是没方法，而是不知道\"什么是对的\"。给你三个具体动作：\n\n1. **锁定一个\"相似榜样\"**：找公司里跟你背景、客户类型最像的Top Sales。比如你负责中小企业，就找同样做中小企业的销冠。观察他每天做什么、怎么开场、怎么跟单。**好处是：路径可复制，不会因为客户类型不同而学偏。**\n\n2. **用\"跟单\"代替\"请教\"**：别光问\"你怎么做的\"，申请跟一次他的完整拜访或电话。你坐在旁边看他怎么应对客户说\"贵\"、怎么收尾。**好处是：场景化学习，比听理论管用10倍。**\n\n3. **向同事学习要聚焦一个点**：每天只学一个具体动作。比如今天只学\"怎么开场\"，明天只学\"怎么处理异议\"。别贪多，学完立刻用。**好处是：反馈快，能马上验证对不对。**\n\n你明天就做一件事：找你的主管，问\"咱们团队里谁做中小企业客户最厉害？我想跟他跟一次单。\"\n\n来源：\n1. 《销售新人必看的经验分享!_职Q!》\n2. 《作为销售同行,你有哪些建议或者话,想对销售新手说的 ?_知乎》\n3. 《销售新手应该这样做,才能快速提高!_职Q!》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 4388, "ttft_ms": 28, "prompt_tokens": 3843, "comple     document.getElementById('result-count').innerHTML = `显示 ${filtered.length} / ${RESULTS.length} 条` +
        (totalPages > 1 ? ` | 第 ${currentPage}/${totalPages} 页` +
        ` <button onclick="goPage(1)" ${currentPage<=1?'disabled':''}>«</button>` +
        ` <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>` +
        ` <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>` +
        ` <button onclick="goPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>` : '');

    // KB filter options
    const kbSelect = document.getElementById('kb-filter');
    if (kbSelect.options.length <= 1) {
        kbSelect.innerHTML = '<option value="all">全部 KB</option>' + KB_LIST.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // Task type filter options
    const taskSelect = document.getElementById('task-filter');
    if (taskSelect.options.length <= 1) {
        const types = [...new Set(RESULTS.map(r => r.task_type || '(空)'))].sort();
        taskSelect.innerHTML = '<option value="all">全部任务类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // Headers
    const cols = ['question_id','kb_label','question','task_type','latency_ms','ttft_ms','total_tokens','risk_level'];
    const thead = document.querySelector('#q-table thead');
    thead.innerHTML = `<tr>
        ${cols.map(c => {
            const labels = {question_id:'ID',kb_label:'KB',question:'问题',task_type:'任务类型',latency_ms:'延迟',ttft_ms:'TTFT',total_tokens:'Token',risk_level:'风险'};
            const sorted = currentSort.col === c ? ' sorted' : '';
            const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '↕';
            return `<th class="${sorted}" onclick="currentSort={col:'${c}',asc:currentSort.col==='${c}'?!currentSort.asc:true};renderTable()">${labels[c]||c} <span class="sort-icon">${arrow}</span></th>`;
        }).join('')}
        ${METRIC_NAMES.map(m => `<th onclick="currentSort={col:'${m}',asc:currentSort.col==='${m}'?!currentSort.asc:true};renderTable()">${m} <span class="sort-icon">↕</span></th>`).join('')}
        <th>状态</th>
    </tr>`;

    // Rows
    const tbody = document.querySelector('#q-table tbody');
    tbody.innerHTML = pageItems.map((r, i) => {
        const status = getPassStatus(r);
        const statusIcon = {pass:'✅',partial:'⚠️',fail:'❌',error:'💥',na:'—'}[status] || '—';
        const qid = r.question_id || '';
        const qText = (r.question || '').substring(0, 80);
        const isExpanded = expandedRows.has(qid + r.kb_label);

        const ttft = r.ttft_ms ? r.ttft_ms + 'ms' : '—';
        const tok = r.total_tokens ? (r.prompt_tokens||0)+'/'+(r.completion_tokens||0)+'/'+(r.total_tokens||0) : '—';

        let row = `<tr>
            <td>${qid}</td>
            <td>${r.kb_label||''}</td>
            <td class="q-text ${isExpanded?'expanded':''}" onclick="toggleExpand('${qid}','${r.kb_label}')" title="${(r.question||'').replace(/"/g,'&quot;')}">${isExpanded ? (r.question||'') : qText}</td>
            <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
</body>
</html>
