<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小赢欣赏</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100vh;
  background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 50%, #0d1b2a 100%);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.wrap {
  max-width: 480px; margin: 0 auto; padding: 48px 28px;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
}
.icon-wrap {
  width: 100px; height: 100px; border-radius: 28px;
  background: linear-gradient(135deg, #ffd54f 0%, #ffa000 100%);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px; font-size: 52px;
  box-shadow: 0 12px 32px rgba(255, 160, 0, 0.35);
}
h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: 2px; }
.sub { font-size: 15px; color: #aab4c7; line-height: 1.8; margin-bottom: 48px; max-width: 300px; }
.btn {
  width: 100%; max-width: 320px; padding: 18px;
  font-size: 18px; font-weight: 600; color: #1a1a2e;
  background: linear-gradient(90deg, #ffd54f, #ffa000);
  border: none; border-radius: 14px; cursor: pointer;
  box-shadow: 0 10px 28px rgba(255, 160, 0, 0.4);
  transition: transform 0.12s ease;
}
.btn:active { transform: scale(0.97); }
.hint { margin-top: 24px; font-size: 13px; color: #5a6a80; }
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.6); z-index: 100;
  justify-content: center; align-items: center;
}
.overlay.active { display: flex; }
.box {
  background: #fff; color: #333; border-radius: 14px;
  padding: 24px 28px; max-width: 300px; width: 80%;
  text-align: center; font-size: 15px; line-height: 1.6;
}
.box.ok { color: #52c41a; } .box.err { color: #ff4d4f; }
</style>
</head>
<body>

<div class="wrap">
  <div class="icon-wrap">🌟</div>
  <h1>小赢欣赏</h1>
  <div class="sub">3 分钟，看见今天一个小进展<br>让每一次小赢都被看见</div>
  <button class="btn" id="startBtn">开始复盘</button>
  <div class="hint">点击后请在钉钉单聊中回复</div>
</div>

<div class="overlay" id="overlay">
  <div class="box" id="msg">正在验证身份...</div>
</div>

<script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var action = 'small_win_appreciation';
  var tenantId = params.get('tenant_id') || '';
  var corpId = '__CORP_ID__';

  var overlay = document.getElementById('overlay');
  var msg = document.getElementById('msg');

  function show(text, kind) {
    msg.textContent = text;
    msg.className = 'box' + (kind ? ' ' + kind : '');
    overlay.classList.add('active');
  }

  document.getElementById('startBtn').addEventListener('click', function () {
    show('正在进入小赢欣赏...', '');

    dd.ready(function () {
      dd.runtime.permission.requestAuthCode({
        corpId: corpId,
        onSuccess: function (result) {
          var url = '/integrations/dingtalk/whoami'
            + '?code=' + encodeURIComponent(result.code)
            + '&action=' + encodeURIComponent(action)
            + '&tenant_id=' + encodeURIComponent(tenantId);
          fetch(url)
            .then(function (resp) { return resp.json(); })
            .then(function (data) {
              if (data.status === 'ok') {
                show('✅ 已开始，请在钉钉单聊中回复', 'ok');
                setTimeout(function () {
                  dd.ready(function () { dd.biz.navigation.close(); });
                }, 1000);
              } else {
                show('操作失败：' + (data.detail || JSON.stringify(data)), 'err');
              }
            })
            .catch(function (err) {
              show('请求失败：' + err.message, 'err');
            });
        },
        onFail: function (err) {
          show('验证失败：' + (err.errorMessage || JSON.stringify(err)), 'err');
        }
      });
    });

    dd.error(function () {
      show('请在钉钉客户端中打开此页面', 'err');
    });
  });
})();
</script>

</body>
</html>
