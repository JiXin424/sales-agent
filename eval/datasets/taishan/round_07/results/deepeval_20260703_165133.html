冲**\n    *   如果节日礼包发晚了、蛋糕送错了、电影票兑不了，员工不会骂“供应商”，只会骂“公司福利真差劲”。HR作为福利采购的直接负责人，会成为所有负面情绪的出口。根据员工案例库《王菲销售业务分享》（置信度80%），有客户反馈“一次蛋糕配送延误，HR被员工在内部论坛骂了三天”。\n    *   **你的话术**：“王总，您想想，万一我们这边系统出问题，员工领不到福利，他们第一个找的是您，不是我们。”\n\n2.  **采购流程被质疑，个人职业风险上升**\n    *   一旦出现重大履约事故（如供应商跑路、商品大面积质量问题），公司审计和合规部门会倒查采购流程。如果当时因为“价格低”或“关系好”选择了稳定性差的供应商，采购负责人会被贴上“专业能力不足”或“尽职调查失职”的标签。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多20年零诉讼、零外债的稳定性，本身就是采购负责人的“护身符”。\n    *   **你的话术**：“选供应商，价格是小事，稳定是大事。万一出问题，审计查下来，您当初的选型依据就很重要了。”\n\n3.  **年度预算被浪费，来年话语权削弱**\n    *   供应商不稳定导致的补发、赔偿、甚至员工满意度下降，都会让公司觉得“这笔福利预算花得不值”。HR部门在争取下一年度预算时，会因为这个“污点”而被财务和业务部门质疑，话语权被严重削弱。\n    *   **你的话术**：“福利预算一年就一次，如果因为供应商不稳定导致效果打折，明年再想申请同样的额度，难度就大了。”\n\n**你明天可以做的动作**：下次拜访客户时，带上一份福多多的“资质白皮书”（包含零诉讼证明、高新企业证书、五星售后认证），直接说：“李总，这些是我们20年稳定经营的证明。您把福利交给我们，就是给您的采购流程上了一道保险。”", "rendered": "直接说结论：供应商稳定性出问题，采购负责人轻则被问责，重则丢饭碗。你明天跟客户聊时，要把这些危机变成他的“个人风险”，而不是公司的“系统风险”。\n\n具体来说，忽视供应商稳定性，会引发三个层面的潜在危机：\n\n1.  **员工信任崩塌，HR首当其冲**\n    *   如果节日礼包发晚了、蛋糕送错了、电影票兑不了，员工不会骂“供应商”，只会骂“公司福利真差劲”。HR作为福利采购的直接负责人，会成为所有负面情绪的出口。根据员工案例库《王菲销售业务分享》（置信度80%），有客户反馈“一次蛋糕配送延误，HR被员工在内部论坛骂了三天”。\n    *   **你的话术**：“王总，您想想，万一我们这边系统出问题，员工领不到福利，他们第一个找的是您，不是我们。”\n\n2.  **采购流程被质疑，个人职业风险上升**\n    *   一旦出现重大履约事故（如供应商跑路、商品大面积质量问题），公司审计和合规部门会倒查采购流程。如果当时因为“价格低”或“关系好”选择了稳定性差的供应商，采购负责人会被贴上“专业能力不足”或“尽职调查失职”的标签。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多20年零诉讼、零外债的稳定性，本身就是采购负责人的“护身符”。\n    *   **你的话术**：“选供应商，价格是小事，稳定是大事。万一出问题，审计查下来，您当初的选型依据就很重要了。”\n\n3.  **年度预算被浪费，来年话语权削弱**\n    *   供应商不稳定导致的补发、赔偿、甚至员工满意度下降，都会让公司觉得“这笔福利预算花得不值”。HR部门在争取下一年度预算时，会因为这个“污点”而被财务和业务部门质疑，话语权被严重削弱。\n    *   **你的话术**：“福利预算一年就一次，如果因为供应商不稳定导致效果打折，明年再想申请同样的额度，难度就大了。”\n\n**你明天可以做的动作**：下次拜访客户时，带上一份福多多的“资质白皮书”（包含零诉讼证明、高新企业证书、五星售后认证），直接说：“李总，这些是我们20年稳定经营的证明。您把福利交给我们，就是给您的采购流程上了一道保险。”\n\n来源：\n1. 《采购管理中有哪些风险隐患内部采购管理风险点有哪些-畅捷通》\n2. 《供应商稳定性差,如何预防?_采购_质量_管理》\n3. 《在福利采购过程中,可能会出现一些不可预测的问题-福利plus》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 9699, "ttft_ms": 16, "prompt_tokens": 3825, "completion_tokens": 517, "tot 。节日慰问、生日蛋糕、观影活动等福利支出，主要从这里出。这是客户最常问的，也是我们切入的起点。\n\n2. **行政补助收入**：单位行政（公司）依法对工会的经费补助。很多企业HR会问\"工会钱不够怎么办\"，这就是答案——可以申请行政补助，用于补充职工福利。比如公司年度预算里专门拨一笔钱给工会做福利。\n\n3. **企业自有资金**：公司直接列支的福利费用。这部分不走工会账户，由企业行政直接支付。常见场景：企业想给全员发节日礼包，但工会经费额度不够，公司自己掏钱补上。很多大客户（比如500人以上企业）会同时用工会经费+企业自有资金两条线。\n\n4. **职工个人缴费**：部分福利项目（如自选商城、超标准慰问）允许职工自付差价或全额自费。比如我们福利商城里的商品，工会经费覆盖基础额度，员工想升级商品或加购，可以自己补差价。这个渠道虽然金额不大，但能提升员工满意度和参与感。\n\n**给客户的推荐话术**：\n\"王总，工会福利的资金来源其实很灵活。最常用的是工会经费，如果额度不够，还可以申请行政补助或企业自有资金补充。我们福多多支持多资金来源混合支付，一个平台就能把工会经费、公司预算、员工自费全部打通，不用来回对账。\"\n\n**需要查询知识库确认**：各地工会经费计提比例和具体使用细则可能因地区政策有差异，建议你对接客户时，先问清楚对方工会经费的年度预算额度和使用限制，再针对性推荐方案。", "rendered": "直接说：工会福利项目的资金来源主要有四个渠道，你给客户介绍时按这个顺序讲，逻辑最顺。\n\n1. **工会经费**：这是最核心的来源。根据《基层工会经费收支管理办法》，工会经费按全部职工工资总额的2%计提，其中60%留归基层工会使用。节日慰问、生日蛋糕、观影活动等福利支出，主要从这里出。这是客户最常问的，也是我们切入的起点。\n\n2. **行政补助收入**：单位行政（公司）依法对工会的经费补助。很多企业HR会问\"工会钱不够怎么办\"，这就是答案——可以申请行政补助，用于补充职工福利。比如公司年度预算里专门拨一笔钱给工会做福利。\n\n3. **企业自有资金**：公司直接列支的福利费用。这部分不走工会账户，由企业行政直接支付。常见场景：企业想给全员发节日礼包，但工会经费额度不够，公司自己掏钱补上。很多大客户（比如500人以上企业）会同时用工会经费+企业自有资金两条线。\n\n4. **职工个人缴费**：部分福利项目（如自选商城、超标准慰问）允许职工自付差价或全额自费。比如我们福利商城里的商品，工会经费覆盖基础额度，员工想升级商品或加购，可以自己补差价。这个渠道虽然金额不大，但能提升员工满意度和参与感。\n\n**给客户的推荐话术**：\n\"王总，工会福利的资金来源其实很灵活。最常用的是工会经费，如果额度不够，还可以申请行政补助或企业自有资金补充。我们福多多支持多资金来源混合支付，一个平台就能把工会经费、公司预算、员工自费全部打通，不用来回对账。\"\n\n**需要查询知识库确认**：各地工会经费计提比例和具体使用细则可能因地区政策有差异，建议你对接客户时，先问清楚对方工会经费的年度预算额度和使用限制，再针对性推荐方案。\n\n来源：\n1. 《[方案]工会经费及福利费相关政策 - 豆丁网》\n2. 《工会经费来源及列支一览表 - 豆丁网》\n3. 《工会经费的来源有()。A.人民群众的捐助B.国家财政拨款C.工会会员缴纳的会费D.建立工会组织的全民 - 链晓得问答》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 9090, "ttft_ms": 4, "prompt_tokens": 3818, "completion_tokens": 418, "total_tokens": 4236, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.6, "完整性 (Completeness) [GEval]": 0.5, "Contextual Recall": 0.0, "Contextual Precision": 1.0, "Contextual Relevancy": 0.48, "Faithfulness": 0.75, "Answer Relevancy": 0.9286, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [             <div class="sub">${s.success}/${s.total} 成功, ${s.errors} 错误</div>
        </div>`;
    });

    // 平均分数卡片
    METRIC_NAMES.forEach(m => {
        const scores = KB_LIST.map(n => SUMMARIES[n]?.avg_scores?.[m] || 0);
        const avg = scores.length > 0 ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
        const cls = avg >= 0.7 ? 'good' : avg >= 0.5 ? 'warn' : 'bad';
        html += `
        <div class="card ${cls}">
            <div class="label">平均 ${m}</div>
            <div class="value">${avg.toFixed(2)}</div>
            <div class="sub">${KB_LIST.map((n,i) => `${n}: ${scores[i].toFixed(2)}`).join(' / ')}</div>
        </div>`;
    });

    container.innerHTML = html;
}

// ── KB Comparison Table ──
function renderKBCompare() {
    const thead = document.querySelector('#kb-compare thead');
    const tbody = document.querySelector('#kb-compare tbody');

    thead.innerHTML = `<tr>
        <th>指标</th>
        ${KB_LIST.map(n => `<th>${n} 均分</th><th>${n} 通过率</th>`).join('')}
        ${KB_LIST.length >= 2 ? '<th>差异</th>' : ''}
    </tr>`;

    tbody.innerHTML = METRIC_NAMES.map(m => {
        const scores = KB_LIST.map(n => SUMMARIES[n]?.avg_scores?.[m]);
        const passes = KB_LIST.map(n => SUMMARIES[n]?.pass_rates?.[m]);
        let diffHtml = '';
        if (KB_LIST.length >= 2 && scores[0] != null && scores[1] != null) {
            const diff = scores[0] - scores[1];
            const cls = diff > 0.05 ? 'diff-positive' : diff < -0.05 ? 'diff-negative' : 'diff-neutral';
            const arrow = diff > 0.05 ? '← KB1 更好' : diff < -0.05 ? '← KB2 更好' : '持平';
            diffHtml = `<td class="${cls}">${(diff>0?'+':'')}${diff.toFixed(3)} ${arrow}</td>`;
        }
        return `<tr>
            <td><strong>${m}</strong></td>
            ${KB_LIST.map((n,i) => `
                <td>${scores[i] != null ? scores[i].toFixed(3) : '—'}</td>
                <td>${passes[i] != null ? (passes[i]*100).toFixed(0)+'%' : '—'}</td>
            `).join('')}
            ${diffHtml}
        </tr>`;
    }).join('');
}

// ── Bar Chart ──
function renderBarChart() {
    const container = document.getElementById('bar-chart');
    let html = '<h3 style="font-size:15px;margin:20px 0 12px;color:#555">平均分数可视化</h3>';

    METRIC_NAMES.forEach(m => {
        html += `<div class="bar-row"><div class="bar-label">${m}</div>`;
        KB_LIST.forEach((n, i) => {
            const score = SUMMARIES[n]?.avg_scores?.[m] || 0;
            html += `<div class="bar-track" style="margin-right:4px">
                <div class="bar-fill kb${i}" style="width:${Math.max(score*100,3)}%">${(score*100).toFixed(0)}%</div>
            </div>`;
        });
        html += '</div>';
    });
    container.innerHTML = html;
}

// ── Question Table ──
let currentSort = {col: 'question_id', asc: true};
let expandedRows = new Set();
let expandedAnswers = new Set();

function sortResults(col, asc) {
    return [...RESULTS].sort((a,b) => {
        let va = a[col] ?? '', vb = b[col] ?? '';
        if (col === 'latency_ms' || col === 'sources_count' || col === 'total_tokens') {
            va = Number(va); vb = Number(vb);
        }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return asc ? -1 : 1;
        if (va > vb) return asc ? 1 : -1;
        return 0;
    });
}

function getPassStatus(r) {
    if (r.error) return 'error';
    if (!r.metric_success || Object.keys(r.metric_success).length === 0) return 'na';
    const vals = Object.values(r.metric_success);
    if (vals.every(v => v)) return 'pass';
    if (vals.some(v => v)) return 'partial';
    return 'fail';
}

const PAGE_SIZE = 50;
let currentPage = 1;

function goPage(n) { currentPage = n; renderTable(); window.scrollTo(0, 300); }

function renderTable() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const kbFilter = document.getElementById('kb-filter').value;
    const scoreFilter = document.getElementById('score-filter').value;

    const taskFilter = document.getElementById('task-filter').value;

    let filtered = RESULTS.filter(r => {
        if (kbFilter !== 'all' && r.kb_label !== kbFilter) return false;
        if (taskFilter !== 'all' && (r.task_type||'') !== taskFilter) return false;
        const status = getPassStatus(r);
        if (scoreFilter !== 'all' && status !== scoreFilter) return false;
        if (search && !(r.question||'').toLowerCase().includes(search) && !(r.question_id||'').toLowerCase().includes(search)) return false;
        return true;
    });

    filtered = sortResults(currentSort.col, currentSort.asc).filter(r => filtered.includes(r));

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const pageItems = filtered.slice((currentPage-1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    document.getElementById('result-count').innerHTML = `显示 ${filtered.length} / ${RESULTS.length} 条` +
        (totalPages > 1 ? ` | 第 ${currentPage}/${totalPages} 页` +
        ` <button onclick="goPage(1)" ${currentPage<=1?'disabled':''}>«</button>` +
        ` <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>` +
        ` <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>` +
        ` <button onclick="goPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>` : '');

    // KB filter options
    const kbSelect = document.getElementById('kb-filter');
    if (kbSelect.options.length <= 1) {
        kbSelect.innerHTML = '<option value="all">全部 KB</option>' + KB_LIST.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // Task type filter options
    const taskSelect = document.getElementById('task-filter');
    if (taskSelect.options.length <= 1) {
        const types = [...new Set(RESULTS.map(r => r.task_type || '(空)'))].sort();
        taskSelect.innerHTML = '<option value="all">全部任务类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // Headers
    const cols = ['question_id','kb_label','question','task_type','latency_ms','ttft_ms','total_tokens','risk_level'];
    const thead = document.querySelector('#q-table thead');
    thead.innerHTML = `<tr>
        ${cols.map(c => {
            const labels = {question_id:'ID',kb_label:'KB',question:'问题',task_type:'任务类型',latency_ms:'延迟',ttft_ms:'TTFT',total_tokens:'Token',risk_level:'风险'};
            const sorted = currentSort.col === c ? ' sorted' : '';
            const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '↕';
            return `<th class="${sorted}" onclick="currentSort={col:'${c}',asc:currentSort.col==='${c}'?!currentSort.asc:true};renderTable()">${labels[c]||c} <span class="sort-icon">${arrow}</span></th>`;
        }).join('')}
        ${METRIC_NAMES.map(m => `<th onclick="currentSort={col:'${m}',asc:currentSort.col==='${m}'?!currentSort.asc:true};renderTable()">${m} <span class="sort-icon">↕</span></th>`).join('')}
        <th>状态</th>
    </tr>`;

    // Rows
    const tbody = document.querySelector('#q-table tbody');
    tbody.innerHTML = pageItems.map((r, i) => {
        const status = getPassStatus(r);
        const statusIcon = {pass:'✅',partial:'⚠️',fail:'❌',error:'💥',na:'—'}[status] || '—';
        const qid = r.question_id || '';
        const qText = (r.question || '').substring(0, 80);
        const isExpanded = expandedRows.has(qid + r.kb_label);

        const ttft = r.ttft_ms ? r.ttft_ms + 'ms' : '—';
        const tok = r.total_tokens ? (r.prompt_tokens||0)+'/'+(r.completion_tokens||0)+'/'+(r.total_tokens||0) : '—';

        let row = `<tr>
            <td>${qid}</td>
            <td>${r.kb_label||''}</td>
            <td class="q-text ${isExpanded?'expanded':''}" onclick="toggleExpand('${qid}','${r.kb_label}')" title="${(r.question||'').replace(/"/g,'&quot;')}">${isExpanded ? (r.question||'') : qText}</td>
            <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
</body>
</html>
