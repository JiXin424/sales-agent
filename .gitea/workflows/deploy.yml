name: deploy
# 主控上的 CI:push main → build → 推 registry.internal → fan-out 部署到 deploy/deploy-targets.json 各目标。
# runner 跑在主控宿主机(:host),复用主机 docker(已登录 registry.internal)+ 免密 ssh 到各目标。
# 不用 actions/checkout(国内拉 github 失败),直接从本地 Gitea(127.0.0.1:3002)git fetch 精确 SHA。

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "deploy/*.example.json"
      - "deploy/*.example"
  workflow_dispatch:

env:
  REGISTRY: registry.internal:5000
  IMAGE_NAME: sales-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
          echo "checked out $(git rev-parse --short HEAD)"

      - name: Build image (sha + latest)
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Building ${REGISTRY}/${IMAGE_NAME}:${SHA} and :latest"
          docker build -t ${REGISTRY}/${IMAGE_NAME}:${SHA} -t ${REGISTRY}/${IMAGE_NAME}:latest .

      - name: Push image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker push ${REGISTRY}/${IMAGE_NAME}:${SHA}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest
          echo "::notice::pushed ${REGISTRY}/${IMAGE_NAME}:${SHA}"

  deploy-fanout:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Fan-out deploy to all targets
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${SHA}"
          echo "Rolling out ${IMAGE}"
          IMAGE="${IMAGE}" scripts/ci-fanout.sh
