<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>__LABEL__</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100vh;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.wrap {
  max-width: 480px; margin: 0 auto; padding: 40px 28px;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
}
.icon { font-size: 68px; margin-bottom: 22px; line-height: 1; }
h1 { font-size: 27px; font-weight: 700; margin-bottom: 14px; letter-spacing: 1px; }
.sub { font-size: 15px; color: #9aa7c7; line-height: 1.7; margin-bottom: 44px; max-width: 320px; }
.btn {
  width: 100%; max-width: 340px; padding: 18px;
  font-size: 18px; font-weight: 600; color: #fff;
  background: linear-gradient(90deg, #5b8cff, #3b5bdb);
  border: none; border-radius: 14px; cursor: pointer;
  box-shadow: 0 10px 28px rgba(59, 91, 219, 0.4);
  transition: transform 0.12s ease;
}
.btn:active { transform: scale(0.97); }
.hint { margin-top: 22px; font-size: 13px; color: #6b7898; }
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.6); z-index: 100;
  justify-content: center; align-items: center;
}
.overlay.active { display: flex; }
.box {
  background: #fff; color: #333; border-radius: 14px;
  padding: 24px 28px; max-width: 300px; width: 80%;
  text-align: center; font-size: 15px; line-height: 1.6;
}
.box.ok { color: #52c41a; } .box.err { color: #ff4d4f; }
</style>
</head>
<body>

<div class="wrap">
  <div class="icon">__ICON__</div>
  <h1>__LABEL__</h1>
  <div class="sub">__SUBTITLE__</div>
  <button class="btn" id="startBtn">开始</button>
  <div class="hint">点击开始后，请在钉钉单聊里直接回复</div>
</div>

<div class="overlay" id="overlay">
  <div class="box" id="msg">正在验证身份...</div>
</div>

<script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var action = params.get('action') || '';
  var tenantId = params.get('tenant_id') || '';
  var corpId = '__CORP_ID__';
  var label = '__LABEL__';

  var overlay = document.getElementById('overlay');
  var msg = document.getElementById('msg');

  function show(text, kind) {
    msg.textContent = text;
    msg.className = 'box' + (kind ? ' ' + kind : '');
    overlay.classList.add('active');
  }

  // 浏览器（非钉钉容器，如 PC 快捷入口跳出的 Chrome）里 JSAPI 不可用 → OAuth2 扫码免登。
  function redirectToOAuth2() {
    var clientId = '__APP_KEY__';
    var redirectUri = encodeURIComponent(window.location.origin + '/integrations/dingtalk/oauth2-callback');
    var state = action + ':' + tenantId;
    show('即将跳转钉钉登录…', '');
    window.location.href = 'https://login.dingtalk.com/oauth2/auth'
      + '?redirect_uri=' + redirectUri
      + '&client_id=' + encodeURIComponent(clientId)
      + '&response_type=code&scope=openid&prompt=consent'
      + '&state=' + encodeURIComponent(state);
  }

  document.getElementById('startBtn').addEventListener('click', function () {
    // UA 检测：非钉钉容器（PC 浏览器）→ OAuth2；钉钉容器（手机端 webview）→ JSAPI 流程
    if (!/DingTalk/i.test(navigator.userAgent)) {
      redirectToOAuth2();
      return;
    }
    show('正在呼叫 ' + label + '...', '');

    // 超时兜底 + 阶段追踪：PC 端若 dd.config 未通过，requestAuthCode 会静默不回调。
    var settled = false;
    var stage = 'start';
    var timer = setTimeout(function () {
      if (!settled) {
        settled = true;
        show('呼叫超时（卡在阶段：' + stage + '）。请确认在钉钉客户端中打开本页、且应用域名已配置', 'err');
      }
    }, 10000);

    function finishOk(msg) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      show('✅ ' + (msg || '已开始'), 'ok');
      setTimeout(function () {
        dd.ready(function () { dd.biz.navigation.close(); });
      }, 900);
    }
    function finishErr(msg) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      console.log('[quick] finishErr:', msg);
      show(msg, 'err');
    }
    function fmtErr(err) {
      return (err && (err.errorCode || err.errCode || err.errorMessage || err.message))
        || JSON.stringify(err);
    }

    function requestCode() {
      stage = 'requestAuthCode';
      console.log('[quick] requestAuthCode start, corpId=', corpId);
      dd.runtime.permission.requestAuthCode({
        corpId: corpId,
        onSuccess: function (result) {
          stage = 'whoami';
          var url = '/integrations/dingtalk/whoami'
            + '?code=' + encodeURIComponent(result.code)
            + '&action=' + encodeURIComponent(action)
            + '&tenant_id=' + encodeURIComponent(tenantId);
          fetch(url)
            .then(function (resp) { return resp.json(); })
            .then(function (data) {
              if (data.status === 'ok') {
                finishOk(data.message);
              } else {
                finishErr('操作失败：' + (data.detail || JSON.stringify(data)));
              }
            })
            .catch(function (err) {
              finishErr('请求失败：' + err.message);
            });
        },
        onFail: function (err) {
          finishErr('授权失败 [' + fmtErr(err) + ']');
        }
      });
    }

    // 关键顺序：先取签名 → dd.config → 再注册 dd.ready/dd.error。
    // PC 端 dd.ready 在 dd.config 完成后才触发；先注册 dd.ready 可能在 config
    // 之前触发，导致 requestAuthCode 在未鉴权状态下调用、卡死。
    var pageUrl = location.href.split('#')[0];
    stage = 'fetch_config';
    console.log('[quick] pageUrl for signing:', pageUrl);
    fetch('/integrations/dingtalk/jsapi-config?url=' + encodeURIComponent(pageUrl))
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        console.log('[quick] jsapi-config resp:', cfg);
        if (!cfg || !cfg.signature) {
          dd.ready(function () { requestCode(); });
          return;
        }
        stage = 'dd_config';
        dd.config({
          agentId: cfg.agentId,
          corpId: cfg.corpId,
          timeStamp: cfg.timeStamp,
          nonceStr: cfg.nonceStr,
          signature: cfg.signature,
          jsApiList: ['runtime.permission.requestAuthCode', 'biz.navigation.close']
        });
        dd.ready(function () { requestCode(); });
        dd.error(function (err) {
          console.log('[quick] dd.error:', err);
          finishErr('钉钉鉴权失败 [' + fmtErr(err) + ']，请检查应用域名是否已在钉钉后台配置');
        });
      })
      .catch(function (e) {
        console.log('[quick] jsapi-config fetch failed:', e);
        dd.ready(function () { requestCode(); });
        dd.error(function () { requestCode(); });
      });
  });
})();
</script>

</body>
</html>
