name: deploy
# 主控上的 CI:push main → build → 推 registry.internal → fan-out 部署到 deploy/deploy-targets.json 各目标。
# runner 跑在主控宿主机(:host),复用主机 docker(已登录 registry.internal)+ 免密 ssh 到各目标。
# 不用 actions/checkout(国内拉 github 失败),直接从本地 Gitea(127.0.0.1:3002)git fetch 精确 SHA。

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "deploy/*.example.json"
      - "deploy/*.example"
  workflow_dispatch:

env:
  REGISTRY: registry.internal:5000
  IMAGE_NAME: sales-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
          echo "checked out $(git rev-parse --short HEAD)"

      - name: Build image (sha + latest)
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Building ${REGISTRY}/${IMAGE_NAME}:${SHA} and :latest"
          docker build -t ${REGISTRY}/${IMAGE_NAME}:${SHA} -t ${REGISTRY}/${IMAGE_NAME}:latest .

      - name: Push image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker push ${REGISTRY}/${IMAGE_NAME}:${SHA}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest
          echo "::notice::pushed ${REGISTRY}/${IMAGE_NAME}:${SHA}"

  deploy-fanout:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Fan-out deploy to all targets
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${SHA}"
          echo "Rolling out ${IMAGE}"
          IMAGE="${IMAGE}" scripts/ci-fanout.sh

  sync-code:
    runs-on: ubuntu-latest
    # 把代码同步到源码镜像服务器(deploy/code-sync-targets.json)。清单空时 no-op。
    steps:
      - name: checkout (本地 Gitea)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: Sync code to source-mirror servers
        run: scripts/sync-code.sh

  config-dev-machine:
    runs-on: ubuntu-latest
    # 一次性：把本机(47.120.50.181)配置为 dev 机
    steps:
      - name: update hosts and docker for new registry
        run: |
          echo "=== Update /etc/hosts ==="
          grep -v "registry.internal" /etc/hosts > /tmp/hosts.clean || true
          echo "172.25.186.210 registry.internal  # → benji 新主控 (dev 私网)" >> /tmp/hosts.clean
          cp /tmp/hosts.clean /etc/hosts
          echo "hosts updated:"
          grep registry.internal /etc/hosts
          
          echo "=== Deploy CA cert ==="
          scp -o BatchMode=yes -o StrictHostKeyChecking=accept-new root@47.120.55.219:/root/code/sales-agent/infra/registry-ca.crt /tmp/reg-ca.crt
          mkdir -p /etc/docker/certs.d/registry.internal:5000
          cp /tmp/reg-ca.crt /etc/docker/certs.d/registry.internal:5000/ca.crt
          echo "CA deployed"
          
          echo "=== Docker login ==="
          REGPASS=$(ssh -o BatchMode=yes root@47.120.55.219 'cat /root/code/sales-agent/infra/registry-password.txt | tail -1')
          echo "${REGPASS}" | docker login registry.internal:5000 -u salesagent --password-stdin 2>/dev/null && echo "login OK" || echo "login FAILED"
          
          echo "=== Set tenants ==="
          cp /root/code/sales-agent/deploy/tenants.heyuan.json /root/code/sales-agent/deploy/tenants.json
          echo "tenants.json configured for dev machine"
