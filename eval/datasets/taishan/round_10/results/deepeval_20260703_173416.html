，工会采购对供应商的具体要求如下：\n\n- **资源整合能力**：需整合优质供应链资源，提供品类齐全、质量可靠的商品和服务。\n- **运营效率**：订单处理、物流配送、客户服务等环节必须高效顺畅，响应及时。\n- **售后保障**：需具备完善的售后服务体系，能快速响应投诉和退换货需求。", "kb_label": "taishan", "model": "(default)", "answer": "工会采购最看重三件事：**资源够不够全、运营够不够省心、出了问题能不能兜底**。根据知识图谱中\"配送保障\"\"售后效率保障\"\"集采服务\"等实体信息（置信度75%），结合我对这个场景的经验，给你拆解一下：\n\n**第一，资源整合能力——要的是\"一揽子方案\"，不是拼凑。**\n工会不想跟七八个供应商对接。他们要求你一个平台能覆盖电影、蛋糕、年节、商城、餐补全场景。福多多五大板块正好对得上，关键是你要在方案里突出\"一个账号、一个后台、一个结算\"，让工会看到省事。\n\n**第二，运营效率——要的是\"不用我管\"。**\n工会人少事多，最怕福利发放变成自己的额外工作。他们要求：员工自助选品、自动配送、实时售后。你重点讲福多多的**自营客服7x12小时在线、24小时极速响应**，以及**蛋糕不高于官方正价、电影票不高于猫眼零售价**的零风险承诺——这些直接降低工会的运营负担。\n\n**第三，售后保障——要的是\"出了事你扛\"。**\n工会最怕员工投诉。福多多**正品假一赔三、差价双倍/三倍赔付**，加上**20年零诉讼、零外债**的信用记录，就是最好的定心丸。你拜访时把零风险承诺书打印出来，比说一百句都管用。\n\n**你明天拜访工会时，就按这个顺序讲：** 先讲\"一个平台全搞定\"（资源整合），再讲\"员工自己选，你不用管\"（运营效率），最后把零风险承诺拍桌上（售后保障）。工会最吃这套。", "rendered": "工会采购最看重三件事：**资源够不够全、运营够不够省心、出了问题能不能兜底**。根据知识图谱中\"配送保障\"\"售后效率保障\"\"集采服务\"等实体信息（置信度75%），结合我对这个场景的经验，给你拆解一下：\n\n**第一，资源整合能力——要的是\"一揽子方案\"，不是拼凑。**\n工会不想跟七八个供应商对接。他们要求你一个平台能覆盖电影、蛋糕、年节、商城、餐补全场景。福多多五大板块正好对得上，关键是你要在方案里突出\"一个账号、一个后台、一个结算\"，让工会看到省事。\n\n**第二，运营效率——要的是\"不用我管\"。**\n工会人少事多，最怕福利发放变成自己的额外工作。他们要求：员工自助选品、自动配送、实时售后。你重点讲福多多的**自营客服7x12小时在线、24小时极速响应**，以及**蛋糕不高于官方正价、电影票不高于猫眼零售价**的零风险承诺——这些直接降低工会的运营负担。\n\n**第三，售后保障——要的是\"出了事你扛\"。**\n工会最怕员工投诉。福多多**正品假一赔三、差价双倍/三倍赔付**，加上**20年零诉讼、零外债**的信用记录，就是最好的定心丸。你拜访时把零风险承诺书打印出来，比说一百句都管用。\n\n**你明天拜访工会时，就按这个顺序讲：** 先讲\"一个平台全搞定\"（资源整合），再讲\"员工自己选，你不用管\"（运营效率），最后把零风险承诺拍桌上（售后保障）。工会最吃这套。\n\n来源：\n1. 《工会集中采购管理规定 - 豆丁网》\n2. 《工会服务采购管理办法最新 - 豆丁网》\n3. 《工会经费物资采购管理办法1篇-用友畅捷通》\n（共 5 条来源）", "task_type": "knowledge_qa", "risk_level": "none", "sources_count": 5, "latency_ms": 6559, "ttft_ms": 17, "prompt_tokens": 4037, "completion_tokens": 374, "total_tokens": 4411, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.9, "完整性 (Completeness) [GEval]": 1.0, "Contextual Recall": 1.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.8824, "Faithfulness": 1.0, "Answer Relevancy": 0.9565, "AnswerRecall (回答召回率)": 1.0, "Task Completi  suggestions, or summarize conversational logic, which are not directly relevant to the core value pillars or competitive differences, preventing a perfect score.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "The actual outcome does not respond to any specific user question, as no user query was provided. It generates a generic analysis of '福多多' core value pillars without addressing a concrete request, missing the key requirement of directly addressing the user's specific question. Therefore, it fails to align with the task."}}, {"question_id": "golden_0454", "question": "考虑到其透明的定价和真实的购买力，福多多如何确保性价比？", "reference": "根据上下文，福多多通过“透明不加价”原则和“真实购买力”保障来实现成本效益。具体来说，电影票不高于猫眼零售价，蛋糕券与品牌官方价1:1，杜绝后端加价；同时通过高兑换率和兜底服务，确保每一元预算的实际价值最大化，总拥有成本更低。", "kb_label": "taishan", "model": "(default)", "answer": "这个问题问得好，说明你抓住了企业福利采购的核心——HR最怕的就是“看着便宜，实际买不到东西”。\n\n**福多多确保性价比，靠的不是“标低价”，而是“真实购买力”和“零风险兜底”。** 你明天跟客户聊，就抓住这三点：\n\n1. **价格透明，有硬承诺兜底。** 根据产品知识库《零风险承诺v2.0》（置信度90%），福多多对核心品类有明确的价格承诺：电影票不高于猫眼零售价，差价三倍赔付；蛋糕不高于官方正价，差价双倍赔付。这等于告诉客户：“你不用比价，我替你兜底。”\n\n2. **购买力真实，不玩虚的。** 很多平台标价低，但热门商品缺货、限购、加价。福多多20年供应链积累，覆盖全国14000+影院、75000+蛋糕门店、30万+商品，客户拿到的券和积分，能真正买到东西。你直接问客户：“你现在的供应商，员工想买的东西是不是经常显示‘已兑完’？”\n\n3. **性价比是“综合成本”概念。** 客户算账不能只看券面折扣，还要算：选品时间成本、售后处理成本、员工满意度成本。福多多自营客服7*12小时在线，24小时极速响应，这省下来的隐性成本，比那点折扣差价大得多。\n\n**你明天见客户，直接拿一个具体案例砸过去：** “张总，我们服务了30000多家企业，覆盖2000万员工。您看这个800人的IT公司案例（根据员工案例库，置信度80%），他们之前用某平台，员工投诉买不到东西，换我们后满意度直接拉满。您要不先拿50张电影票试试，看看员工实际购买体验？”", "rendered": "这个问题问得好，说明你抓住了企业福利采购的核心——HR最怕的就是“看着便宜，实际买不到东西”。\n\n**福多多确保性价比，靠的不是“标低价”，而是“真实购买力”和“零风险兜底”。** 你明天跟客户聊，就抓住这三点：\n\n1. **价格透明，有硬承诺兜底。** 根据产品知识库《零风险承诺v2.0》（置信度90%），福多多对核心品类有明确的价格承诺：电影票不高于猫眼零售价，差价三倍赔付；蛋糕不高于官方正价，差价双倍赔付。这等于告诉客户：“你不用比价，我替你兜底。”\n\n2. **购买力真实，不玩虚的。** 很多平台标价低，但热门商品缺货、限购、加价。福多多20年供应链积累，覆盖全国14000+影院、75000+蛋糕门店、30万+商品，客户拿到的券和积分，能真正买到东西。你直接问客户：“你现在的供应商，员工想买的东西是不是经常显示‘已兑完’？”\n\n3. **性价比是“综合成本”概念。** 客户算账不能只看券面折扣，还要算：选品时间成本、售后处理成本、员工满意度成本。福多多自营客服7*12小时在线，24小时极速响应，这省下来的隐性成本，比那点折扣差价大得多。\n\n**你明天见客户，直接拿一个具体案例砸过去：** “张总，我们服务了30000多家企业，覆 rmation provided, demonstrating excellent faithfulness. Great job!", "Answer Relevancy": "The score is 0.76 because the actual output contains several statements that are not directly relevant to explaining how Fuduoduo ensures cost-effectiveness, such as sales pitch examples and rhetorical questions. However, the core topic of cost-effectiveness is still addressed, preventing a lower score.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统直接回应用户关于福多多性价比的问题，提供了三点具体、可操作的解释，并给出了使用案例说服客户的建议，没有遗漏关键信息，语气符合专业销售教练角色。唯一不足是未明确提及用户问题中可能隐含的‘如何应对客户质疑’的互动场景，但整体完成度很高。"}}, {"question_id": "golden_0423", "question": "如果福利采购负责人忽视供应商稳定性风险，可能会引发哪些潜在危机？", "reference": "如果福利采购负责人忽视供应商稳定性风险，可能引发以下隐性危机：\n\n1. **供应商跑路风险**：一旦供应商经营不稳或突然倒闭，已支付的福利预算可能无法追回，导致企业直接经济损失，且员工无法正常享受福利，引发大规模投诉。\n2. **服务中断与推诿**：不稳定的供应商常出现服务响应慢、问题推诿，员工兑换福利时遭遇卡顿、商品下架或临时加价，导致满意度骤降，工会和HR疲于“救火”。\n3. **审计与问责压力**：采购决策者需为供应商资质不稳、财务不透明等问题承担审计责任，甚至面临被举报“吃回扣”的合规风险，职业风险显著增大。\n4. **员工幸福感下降**：福利预算花出去却换不来员工认可，员工因体验差而抱怨，企业留人、暖心的初衷落空，反而加剧内部矛盾。\n\n这些危机最终会使福利采购成为领导汇报时的“负面案例”，而非亮点政绩。", "kb_label": "taishan", "model": "(default)", "answer": "直接说结论：**忽视供应商稳定性，等于把公司的福利预算和员工满意度押在一张随时可能翻船的牌上。**\n\n具体来说，会引发三个层面的危机，你明天跟客户聊的时候可以拿这三点当\"风险清单\"去敲打他：\n\n1. **员工信任崩塌**：福利采购最怕\"发了券用不了\"。如果供应商突然倒闭、系统宕机、券码失效，员工领了福利却用不了，HR会被骂成筛子。**根据员工案例库《王菲销售业务分享》（置信度80%）**，曾有企业因供应商跑路，员工集体投诉到工会，HR总监年终奖直接泡汤。\n\n2. **财务合规暴雷**：供应商一旦出问题，已支付的预付款可能打水漂，发票开不出来，财务审计过不了。**根据产品知识库《零风险承诺v2.0》（置信度90%）**，福多多20年零诉讼、零外债，实缴注册资本3000万，这种稳定性本身就是给客户财务上的\"防火墙\"。\n\n3. **采购个人背锅**：福利采购负责人最怕的不是\"选贵了\"，而是\"选错了\"。一旦供应商出问题，老板追责时第一个找的就是他。**根据客户画像库（置信度75%）**，大型国企和上市公司的HRD最在意这个——他们宁可多花点钱，也要选一个\"出了事能扛得住\"的供应商。\n\n你明天跟客户聊的时候，别光说福多多多好，先问他一句：\"**如果年底发福利那天，供应商突然说系统崩了，你准备怎么跟员工交代？**\" 这句话一出口，他就得认真听你讲福多多的稳定性优势了。", "rendered": "直接说结论：**忽视供应商稳定性，等于把公司的福利预算和员工满意度押在一张随时可能翻船的牌上。**\n\n具体来说，会引发三个层面的危机，你明天跟客户聊的时候可以拿这三点当\"风险清单\"去敲打他：\n\n1. **员工信任崩塌**：福利采购最怕\"发了券用不了\"。如果供应商突然倒闭、系统宕机、券码失效，员工领了福利却用不了，HR会被骂成筛子。**根据员工案例库《王菲销售业务分享》（置信度80%）**，曾有企业因供应商跑路，员工集体投诉到工会，HR总监年终奖直接泡汤。\n\n2. **财务合规暴雷**：供应商一旦出问题，已支付的预付款 : "这问题问得准，直接看核心差异。我帮你把福多多和竞品在客户画像上的区别捋清楚，你拿去就能用。\n\n**福多多的核心客户画像：**\n- **行业**：制造业、金融、国企、大型互联网公司——这些行业员工规模大、预算稳定、福利合规要求高。根据客户画像库（置信度75%），福多多在制造业和国企的渗透率明显高于竞品。\n- **规模**：500人以上的中大型企业。这类客户决策链长（HR→工会→财务→高层），但一旦签约，续约率高、客单价大。\n- **决策者痛点**：**安全感和省心**。HR和工会最怕的是“出问题”——假货、服务断档、员工投诉。福多多20年零诉讼、零外债、实缴3000万注册资本，就是冲着这个痛点去的。\n- **需求特点**：需要一站式解决方案，不只想解决一个节日，而是希望把观影、生日、年节、商城、餐补全包了，减少供应商管理成本。\n\n**竞品（如京东锦礼、美欣等）的核心客户画像：**\n- **行业**：更偏向零售、服务业、中小型民企。这些行业预算灵活，决策快，但对价格敏感。\n- **规模**：100-500人的中小企业。决策链条短，老板或HRD直接拍板。\n- **决策者痛点**：**性价比和灵活性**。他们更关注“能不能比别家便宜”“能不能只买我需要的品类”。\n- **需求特点**：倾向于单点采购，比如只买电影票或只买蛋糕，或者用积分商城做员工激励。\n\n**核心差异一句话总结：**\n福多多吃的是“**安全省心的一站式大单**”，竞品吃的是“**灵活便宜的单点小单**”。\n\n**你明天能用的动作：**\n1. **筛选客户时**：优先看制造业、国企、金融、500人以上IT公司。如果客户是100人以下的零售店，别花太多时间，除非对方明确表示有预算。\n2. **开场白里**：直接点出“安全”和“省心”——“我们服务了30000家企业，20年零诉讼，您把福利交给我们，HR和工会都不用担责。”\n3. **遇到竞品时**：别比价格，比“风险”——“他们可能便宜点，但您算过万一出问题，员工投诉、领导问责的成本吗？”\n\n**信息缺口（需要你补充）：**\n- 你目前接触的客户具体是哪个行业、多少人？\n- 你遇到的是哪个竞品？是京东锦礼、美欣，还是其他？\n- 客户目前最纠结的点是什么？价格、服务、还是信任？", "rendered": "这问题问得准，直接看核心差异。我帮你把福多多和竞品在客户画像上的区别捋清楚，你拿去就能用。\n\n**福多多的核心客户画像：**\n- **行业**：制造业、金融、国企、大型互联网公司——这些行业员工规模大、预算稳定、福利合规要求高。根据客户画像库（置信度75%），福多多在制造业和国企的渗透率明显高于竞品。\n- **规模**：500人以上的中大型企业。这类客户决策链长（HR→工会→财务→高层），但一旦签约，续约率高、客单价大。\n- **决策者痛点**：**安全感和省心**。HR和工会最怕的是“出问题”——假货、服务断档、员工投诉。福多多20年零诉讼、零外债、实缴3000万注册资本，就是冲着这个痛点去的。\n- **需求特点**：需要一站式解决方案，不只想解决一个节日，而是希望把观影、生日、年节、商城、餐补全包了，减少供应商管理成本。\n\n**竞品（如京东锦礼、美欣等）的核心客户画像：**\n- **行业**：更偏向零售、服务业、中小型民企。这些行业预算灵活，决策快，但对价格敏感。\n- **规模**：100-500人的中小企业。决策链条短，老板或HRD直接拍板。\n- **决策者痛点**：**性价比和灵活性**。他们更关注“能不能比别家便宜”“能不能只买我需要的品类”。\n- **需求特点**：倾向于单点采购，比如只买电影票或只买蛋糕，或者用积分商城做员工激励。\n\n**核心差异一句话总结：**\n福多多吃的是“**安全省心的一站式大单**”，竞品吃的是“**灵活便宜的单点小单**”。\n\n**你明天能用的动作：**\n1. **筛选客户时**：优先看制造业、国企、金融、500人以上IT公司。如果客户是100人以下的零售店，别花太多时间，除非对方明确表示有预算。\n2. **开场白里**：直接点出“安全”和“省心”——“我们服务了30000家企业，20年零诉讼，您把福利交给我们，HR和工会都不用担责。”\n3. **遇到竞品时**：别比价格，比“风险”——“他们可能便宜点，但您算过万一出问题，员工投诉、领导问责的成本吗？”\n\n**信息缺口（需要你补充）：**\n- 你目前接触的客户具体是哪个行业、多少人？\n- 你遇到的是哪个竞品？是京东锦礼、美欣，还是其他？\n- 客户目前最纠结的点是什么？价格、服务、还是信任？\n\n来源：\n1. 《拼多多和团购网的商业逻辑有什么区别?_知乎》\n2. 《对比任意两个电商平台的异同,例如:淘宝、天猫、京东、严选、考__牛客网》\n3. 《对比任意两个电商平台的异同，例如：淘宝、天猫、京东、严选、考》\n（共 5 条来源）", "task_type": "customer_context_summary", "risk_level": "none", "sources_count": 5, "latency_ms": 9468, "ttft_ms": 8, "prompt_tokens": 3830, "completion_tokens": 588, "total_tokens": 4418, "error": "DeepEval error: Evaluation LLM outputted an invalid JSON. Please use a better evaluation model.", "metric_scores": {}, "metric_success": {}, "metric_reasons": {}}, {"question_id": "golden_0349", "question": "合规要求、预算限制和成员需求如何共同影响工会采购？", "reference": "工会采购的合规性、预算刚性和会员需求三者共同决定了采购的流程与方向。首先，合规性要求采购必须严格遵循工会经费使用规定，流程需民主透明，且对发票、人均标准有严格要求，确保经得起审计。其次，预算刚性意味着经费额度有限，工会必须通过规模化采购和优选方案实现预算价值最大化。最后，会员需求驱动福利内容必须多元且实用，以提升会员感知和满意度。综合来看，合规性保障采购合法透明，预算刚性约束成本效率，会员需求则决定福利的针对性与吸引力，三者缺一不可。", "kb_label": "taishan", "model": "(default)", "answer": "这个问题问得挺准，直接说结论：**工会采购的决策逻辑，本质就是\"合规是底线，预算是天花板，成员需求是突破口\"。** 你只要把这三者的关系理清了，话术和策略自然就有了。\n\n你明天跟客户聊的时候，可以按这个顺序来拆：\n\n1.  **先拿\"合规\"当敲门砖，建立信任。**\n    工会采购最怕的就是\"违规\"和\"审计\"。你上来别急着推产品，先问一句：\"**咱们今年的福利采购，在合规和审计上有什么特别要求吗？**\" 这句话一出口，对方就知道你懂行。然后你可以顺势引出福多多的优势——根据产品知识库《零风险承诺v2.0》（置信度90%），我们20年零诉讼、零外债，所有流程透明可追溯，能帮工会规避\"小金库\"或\"利益输送\"的风险。这直接解决了对方最大的顾虑。\n\n2.  **再用\"预算限制\"做方案，体现专业。**\n    预算卡得死，不代表不能做。你要做的不是抱怨预算少，而是帮对方把钱花出\"花\"来。比如，预算只有200元/人，你可以推荐**年节慰问**里的100-200元档位礼包，或者**观影文娱**的通兑券。话术可以这么说：\"**张主席，200元的预算，如果发米面油，大家觉得没新意还占地方。但如果换成一张电影通兑券，覆盖全国14000+影院，员工周末带家人去看场电影，体验感完全不一样，工会的'存在感'也出来了。**\" 这就是用\"感知价值\"去对冲\"预算限制\"。\n\n3.  **最后用\"成员需求\"做引爆点，推动决策。**\n    工会采购的最终目的是让会员满意。你可以在方案里加一个\"**员工需求小调研**\"的环节，比如让HR在内部群里发个投票：\"电影票、蛋糕券、商城积分，你更想要哪个？\" 然后把投票结果作为你推荐方案的依据。这招叫\"**借力打力**\"——不是你在推销，是员工自己选的。话术是：\"**李总，我们内部做了个小范围调研，80%的年轻员工都选了电影券，说比发米面油实用。您看咱们今年的方案是不是可以往这个方向倾斜一下？**\" 这能极大降低HR的决策风险。\n\n**总结一句：你见工会客户，脑子里就绷紧这根弦——先谈合规（安全），再谈预算（性价比），最后用成员需求（满意度）来一锤定音。** 这三步走下来，客户会觉得你不是卖东西的，是帮他解决问题的顾问。", "rendered": "这个问题问得挺准，直接说结论：**工会采购的决策逻辑，本质就是\"合规是底线，预算是天花板，成员需求是突破口\"。** 你只要把这三者的关系理清了，话术和策略自然就有了。\n\n你明天跟客户聊的时候，可以按这个顺序来拆：\n\n1.  **先拿\"合规\"当敲门砖，建立信任。**\n    工会采购最怕的就是\"违规\"和\"审计\"。你上来别急 周，你再看自己跟同事的差距。", "rendered": "这个问题问得好，但咱们别绕弯子——**你真正想问的是：我是不是在浪费时间？答案：不是，而且差距大到三个月后你都不敢信。**\n\n直接说结果：一个月后，认真复盘的人手里有“地图”，跳过复盘的人还在“摸黑走路”。\n\n具体差在哪，我给你拆成三点：\n\n1. **话术迭代速度**：复盘的人每次都能找到自己哪句话说软了、哪个异议没接住，第二天就能改。一个月下来，他手里至少有20-30个“实战验证过”的应对话术。跳过复盘的人，同一个坑能摔五次，话术永远是“临场发挥”，靠运气吃饭。\n\n2. **客户判断力**：复盘的人会琢磨“这个客户说‘考虑一下’是真没预算，还是没找到决策人”，慢慢就能一眼看穿客户真实意图。不复盘的人，永远在跟假信号较劲，把大量时间耗在不可能成交的客户身上。\n\n3. **心态韧性**：复盘的人把每次失败都变成“数据点”，知道哪里能改，所以不怕被拒。不复盘的人，被拒了只觉得“我不行”，情绪内耗越来越大，一个月后要么麻木，要么想转行。\n\n**你明天就能做的一个动作**：今晚花15分钟，把你今天最满意和最不满意的一次沟通写下来。就写三行——客户说了什么、你说了什么、下次你会怎么改。坚持一周，你再看自己跟同事的差距。\n\n来源：\n1. 《超兔CRM系统落地复盘,助力销售业绩提升_网易订阅》\n2. 《复盘对销售有多重要?_知乎》\n3. 《2022营销月度总结实用》\n（共 5 条来源）", "task_type": "conversation_review", "risk_level": "none", "sources_count": 5, "latency_ms": 5905, "ttft_ms": 3, "prompt_tokens": 3912, "completion_tokens": 311, "total_tokens": 4223, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.2, "完整性 (Completeness) [GEval]": 0.1, "Contextual Recall": 1.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.6053, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.3}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": false, "Contextual Recall": true, "Contextual Precision": false, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": false}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output does not match the core facts or policy description from the Expected Output. The Expected Output references a specific quote from '王菲' and frames the answer around the idea that not reviewing a client meeting is equivalent to not having the meeting at all, emphasizing wasted opportunities and slower growth. The Actual Output instead gives a generic motivational sales advice with three bullet points and a suggested action, without mentioning the key quote, the named person, or the core concept of 'turning experience into trust g and conducting reviews, as stated: '该文档主要讨论复盘的定义和重要性，但并未直接对比‘连续一个月跳过复盘’与‘认真复盘’的成长差异。' The second node repeats similar content. The third node presents a story with a six-month timeframe, not one month, and '未直接回答输入问题中关于‘跳过所有客户跟进复盘’的对比。' The fourth node also lacks direct comparison, and the fifth node is a work plan template unrelated to the question. Since no relevant nodes exist, the ranking of relevant nodes higher than irrelevant nodes cannot be achieved, resulting in the lowest score.", "Contextual Relevancy": "The score is 0.61 because the retrieval context contains some relevant statements about the importance of review (复盘) for sales growth, such as '销售成长及业绩提升的关键——复盘' and the case study of two salespeople where the one who did daily summaries outperformed the other, which directly relates to the input's comparison of skipping vs. diligently summarizing client follow-ups. However, many statements are irrelevant, including philosophical quotes from Schopenhauer, general sales success factors, and administrative details, as noted in reasons like '该陈述是关于叔本华的哲学观点，与销售成长或客户跟进复盘无关' and '该语句涉及销售月工作计划、人员变更等具体行政事务，与输入中关于新销售跳过客户跟进复盘与认真总结者的成长差异无关'. This partial relevance results in a moderate score.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness. Great job!", "Answer Relevancy": "The score is 1.00 because the actual output contains no irrelevant statements and fully addresses the input question about the growth difference between a salesperson who skips follow-up reviews and one who diligently summarizes meetings.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统未直接回应用户的具体问题，而是给出了一个泛泛的分析性回答，没有提供可操作的、具体的销售建议或信息，且遗漏了用户问题中的关键信息点，语气也不符合专业销售教练的角色。"}}, {"question_id": "golden_0287", "question": "非洲鼓如何通过角色扮演与音乐节奏实现快速破冰？", "reference": "根据上下文，非洲鼓项目通过让参与者换上非洲服饰、被赋予鼓手、舞者、酋长等不同角色，无需特别引导即可快速进入狂欢场景。音乐节奏能立刻点燃每个人的激情，使参与者放下负担和压力，在欢乐的团队游戏中实现快速破冰。", "kb_label": "taishan", "model": "(default)", "answer": "直接给结论：**把非洲鼓的\"节奏互动\"变成你拜访客户的\"破冰钩子\"，核心动作是——让客户在3分钟内用拍手或敲桌参与进来，而不是你一个人表演。**\n\n具体怎么干，三件事：\n\n1. **开场白设计成\"邀请式\"**，别上来就介绍福多多。  \n   话术：\"王总，我最近学了个非洲鼓的破冰玩法，特简单，你跟我拍两下，30秒就能学会。来，你拍桌子，我打节奏——\"  \n   目的：用动作打破商务距离，客户一旦参与，戒备心就降一半。\n\n2. **节奏互动后，自然过渡到\"团队氛围\"话题**。  \n   拍完后说：\"你看，就一个简单节奏，大家一配合，氛围马上不一样。我们福多多的福利方案也是这个逻辑——用对工具，员工参与感拉满。\"  \n   关键：**把\"玩\"和\"福利价值\"无缝衔接**，别生硬转折。\n\n3. **准备一个\"3分钟破冰包\"**：  \n   - 手机里存一段20秒的非洲鼓节奏视频（自己拍的就行）  \n   - 带一个迷你手鼓或直接用桌面当鼓  \n   - 话术背熟：\"左左右右，停！\"——节奏要简单到客户一次就能跟上  \n\n**注意**：这个玩法适合初次拜访、氛围偏严肃的客户。如果客户是特别内向或时间紧的，别硬来，改成\"我给你看段视频\"就行。  \n**核心逻辑**：节奏互动触发人的本能跟随反应，比干聊产品快10倍建立好感。", "rendered": "直接给结论：**把非洲鼓的\"节奏互动\"变成你拜访客户的\"破冰钩子\"，核心动作是——让客户在3分钟内用拍手或敲桌参与进来，而不是你一个人表演。**\n\n具体怎么干，三件事：\n\n1. **开场白设计成\"邀请式\"**，别上来就介绍福多多。  \n   话术：\"王总，我最近学了个非洲鼓的破冰玩法，特简单，你跟我拍两下，30秒就能学会。来，你拍桌子，我打节奏——\"  \n   目的：用动作打破商务距离，客户一旦参与，戒备心就降一半。\n\n2. **节奏互动后，自然过渡到\"团队氛围\"话题**。  \n   拍完后说：\"你看，就一个简单节奏，大家一配合，氛围马上不一样。我们福多多的福利方案也是这个逻辑——用对工具，员工参与感拉满。\"  \n   关键：**把\"玩\"和\"福利价值\"无缝衔接**，别生硬转折。\n\n3. **准备一个\"3分钟破冰包\"**：  \n   - 手机里存一段20秒的非洲鼓节奏视频（自己拍的就行）  \n   - 带一个迷你手鼓或直接用桌面当鼓  \n   - 话术背熟：\"左左右右，停！\"——节奏要简单到客户一次就能跟上  \n\n**注意**：这个玩法适合初次拜访、氛围偏严肃的客户。如果客户是特别内向或时间紧的，别硬来，改成\"我给你看段视频\"就行。  \n**核心逻辑**：节奏互动触发人的本能跟随反应，比干聊产品快10倍建立好感。\n\n来源：\n1. 《玩转激情非洲鼓, 打造活力团队!_知乎》\n2. 《非洲鼓如何配音乐节奏-传媒配音网》\n3. 《如何开展一场有逼格又好玩的室内团建活动——非洲鼓_知乎》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 6583, "ttft_ms": 5, "prompt_tokens": 3824, "completion_tokens": 355, "total_tokens": 4179, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.2, "完整性 (Completeness) [GEval]": 0.0, "Contextual Recall": 1.0, "Contextual Precision": 0.7556, "Contextual Relevancy": 0.4737, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.0}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval 怕选错，你就给他一个“后悔药”。话术：「这样，我们先拿一个小的节日礼包试点，比如中秋。你员工用着好，咱们再谈全年的合作。如果体验有任何问题，我24小时内给你解决方案，解决不了你随时停，我绝不纠缠。你没有任何风险。」\n\n**核心逻辑：** 客户要的不是“对比”，是“安全感”。你不需要把竞品说得一文不值，只需要把福多多的“零风险”和“自营服务”这两个点钉死，让他觉得“选福多多，我不用担责”。这就够了。\n\n来源：\n1. 《比较一下淘宝和拼多多在售后服务上的差距 - 今日头条》\n2. 《现在的淘宝和拼多多哪一个平台的客服给客户体验会更好一些?_知乎》\n3. 《对比淘宝和拼多多两个平台_知乎》\n（共 5 条来源）", "task_type": "objection_handling", "risk_level": "none", "sources_count": 5, "latency_ms": 7074, "ttft_ms": 16, "prompt_tokens": 5242, "completion_tokens": 459, "total_tokens": 5701, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.2, "完整性 (Completeness) [GEval]": 0.7, "Contextual Recall": 0.4, "Contextual Precision": 0.0, "Contextual Relevancy": 0.3333, "Faithfulness": 1.0, "Answer Relevancy": 0.8261, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.4}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": true, "Contextual Recall": false, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": false}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output does not directly compare 网票福多多 vs 竞争对手 on service response and after-sales support as requested; instead, it shifts focus to sales tactics and trust-building, omitting key factual differences like competitor's slow response and lack of guarantees. While it mentions 福多多's self-operated customer service and zero-risk promise, it fails to cover critical points from the Expected Output such as competitor's service evasion, platform stability risks, and the contrast in commitment reliability. The output is more of a motivational sales script than a factual comparison, making it less useful for a salesperson needing precise differentiators. Score reflects poor alignment with core facts and completeness.", "完整性 (Completeness) [GEval]": "The Actual Output covers the key points of self-operated customer service (7x12 hours, 24-hour response) and zero-risk guarantees (price difference compensation, authenticity assurance), which align with the Expected Output's service response and after-sales support. However, it omits the Expected Output's mention of competitors' shortcomings (e.g., outsourcing, inconsistent promises, platform stability risks) and the specific detail that the self-service team is 'fully authorized' for customized solutions. These are important comparative points, so the coverage is partial but not complete.", "Contextual Recall": "The score is 0.40 because only partial alignment exists between the expected output and the retrieval context. Specifically, sentence 2's mention of competitors' issues like '售后服务难以保障、推诿严重' is partially supported by node 4 (Pinduoduo's '机器人' and '糟糕' service) and node 5 (Taobao's '不想搭理' and '麻烦'), and sentence 3's '承诺与实际体验不一致' and '平台经营稳定性存疑' align with the same nodes. However, sentence 1's description of '网票福多多' having '自营客服团队' and '快速响应', sentence 2's specific guarantees like '正品授权、差价赔付', and sentence 3's summary of '高品质运营及售后服务' are unsupported, as the retrieval context only discusses Taobao and Pinduoduo without mentioning '网票福多多' or its features.", "Contextual Precision": "The score is 0.00 because all nodes in the retrieval contexts are irrelevant to the input, as they discuss after-sales policies and customer service of Taobao, Pinduoduo, and JD without mentioning '网票福多多' or its competitors. Since no relevant nodes exist, the ranking of relevant nodes higher than irrelevant nodes cannot be achieved, resulting in the lowest possible score.", "Contextual Relevancy": "The score is 0.33 because only a few statements in the retrieval context discuss service response and after-sales support (e.g., '淘宝有相对完善的售后政策' and '拼多多在售后政策方面，也提供了7天无理由退货等服务'), but they compare 淘宝 and 拼多多, not 网票福多多 vs its competitors as requested. The majority of statements are irrelevant, as noted in reasons like 'The statement discusses 淘宝 and 拼多多, not 网票福多多 or its competitors' and 'does not mention 网票福多多 or its competitors'.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness.", "Answer Relevancy": "The score is 0.83 because the actual output contains several statements that are irrelevant to directly comparing service response and after-sales support differences between 网票福多多 and its competitors, such as evaluating the question direction, giving unrelated suggestions, and summarizing core logic without making the requested comparison. However, the score is not lower because the output still addresses the general topic of service and support, showing partial relevance.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "The actual outcome did not directly address the user's specific question (likely a request for factual comparison or data), instead providing generic strategic advice. It failed to use available tools to retrieve external information, omitted key details from the user's query, and the response style, while professional, did not align with the expected role of a sales coach who should leverage data and tools to deliver actionable, specific insights."}}, {"question_id": "golden_0503", "question": "比较给销售新人的建议：寻找相似成功榜样与向同事学习，聚焦于各自的益处。", "reference": "对于销售新人而言，寻找相似成功的榜样和向同事学习各有独特益处：\n\n- **寻找相似成功的榜样**：能让你获得强烈的“他行，我也行”的信念。王菲正是通过找到一位性格内敛但靠踏实复盘成功的男同事作为榜样，在低谷期重建了自信。这种榜样更具参考价值，能直接激发你的成长型思维，让你相信能力可以通过努力复制。\n\n- **向同事学习**：能让你吸收身边人具体的闪光点，并快速内化为自己的技能。王菲强调，观察同事在真实拜访中的沟通方式，并主动“蹭”拜访，是新人积累量变的关键。这种学习更贴近日常，能即时解决具体问题。\n\n两者结合，既能通过榜样获得精神动力，又能通过同事学习积累实战经验，共同支撑新人度过新手期。", "kb_label": "taishan", "model": "(default)", "answer": "直接说结论：**先找成功榜样，再向同事学习，顺序不能反。** 新人最容易犯的错是\"谁都学，谁都学不像\"，最后变成四不像。\n\n给你三个动作，明天就能用：\n\n1. **花半小时，锁定一个\"成功榜样\"**——不是业绩最高的那个，而是**入行时间跟你差不多、但最近三个月签单节奏明显变快**的同事。他的路径你最容易复制。观察他每天在做什么：是电话量多？还是拜访频次高？还是某个行业（比如IT、制造业）特别擅长？记下来，这就是你的\"最小可复制动作\"。\n\n2. **向同事学习，但要\"带着问题去\"**——别泛泛问\"怎么做好销售\"，没人有空教。具体问：\"你上周那个500人的工会客户，第一次电话怎么破冰的？\" 或者 \"你跟进那个HR的时候，第三周发了什么内容？\" 根据员工案例库《王菲销售业务分享》（置信度80%），新人最有效的学习方式是**拆解一个完整成交案例的每个动作**，而不是听一堆大道理。\n\n3. **每周三，主动约榜样同事喝杯咖啡**——不是闲聊，是复盘你这一周遇到的具体卡点。比如\"客户说考虑一下，我该不该追？\" 让他现场给你演示一遍话术。**学他的\"肌肉记忆\"，而不是学他的\"道理\"**。\n\n核心逻辑：榜样给你方向（知道往哪走），同事给你动作（知道怎么走）。先有方向，动作才有意义。", "rendered": "直接说结论：**先找成功榜样，再向同事学习，顺序不能反。** 新人最容易犯的错是\"谁都学，谁都学不像\"，最后变成四不像。\n\n给你三个动作，明天就能用：\n\n1. **花半小时，锁定一个\"成功榜样\"**——不是业绩最高的那个，而是**入行时间跟你差不多、但最近三个月签单节奏明显变快**的同事。他的路径你最容易复制。观察他每天在做什么：是电话量多？还是拜访频次高？还是某个行业（比如IT、制造业）特别擅长？记下来，这就是你的\"最小可复制动作\"。\n\n2. **向同事学习，但要\"带着问题去\"**——别泛泛问\"怎么做好销售\"，没人有空教。具体问：\"你上周那个500人的工会客户，第一次电话怎么破冰的？\" 或者 \"你跟进那个HR的时候，第三周发了什么内容？\" 根据员工案例库《王菲销售业务分享》（置信度80%），新人最有效的学习方式是**拆解一个完整成交案例的每个动作**，而不是听一堆大道理。\n\n3. **每周三，主动约榜样同事喝杯咖啡**——不是闲聊，是复盘你这一周遇到的具体卡点。比如\"客户说考虑一下，我该不该追？\" 让他现场给你演示一遍话术。**学他的\"肌肉记忆\"，而不是学他的\"道理\"**。\n\n核心逻辑：榜样给你方向（知道往哪走），同事给你动作（知道怎么走）。先有方向，动作才有意义。\n\n来源：\n1. 《销售新人必看的经验分享!_职Q!》\n2. 《作为销售同行,你有哪些建议或者话,想对销售新手说的 ?_知乎》\n3. 《销售新手应该这样做,才能快速提高!_职Q!》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 5638, "ttft_ms": 26, "prompt_tokens": 3831, "completion_tokens": 331, "total_tokens": 4162, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.5, "完整性 (Completeness) [GEval]": 0.5, "Contextual Recall": 0.25, "Contextual Precision": 0.0, "Contextual Relevancy": 0.3478, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 1.0}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": true, "Contextual Recall": false, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": true}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output provides a clear, actionable sequence (find a role model first, then learn from colleagues) and includes specific steps a salesperson can take, which aligns well with         const passRate = s.total > 0 ? (s.success / s.total * 100).toFixed(1) : 'N/A';
        html += `
        <div class="card">
            <div class="label">${name} — 成功率</div>
            <div class="value">${passRate}%</div>
            <div class="sub">${s.success}/${s.total} 成功, ${s.errors} 错误</div>
        </div>`;
    });

    // 平均分数卡片
    METRIC_NAMES.forEach(m => {
        const scores = KB_LIST.map(n => SUMMARIES[n]?.avg_scores?.[m] || 0);
        const avg = scores.length > 0 ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
        const cls = avg >= 0.7 ? 'good' : avg >= 0.5 ? 'warn' : 'bad';
        html += `
        <div class="card ${cls}">
            <div class="label">平均 ${m}</div>
            <div class="value">${avg.toFixed(2)}</div>
            <div class="sub">${KB_LIST.map((n,i) => `${n}: ${scores[i].toFixed(2)}`).join(' / ')}</div>
        </div>`;
    });

    container.innerHTML = html;
}

// ── KB Comparison Table ──
function renderKBCompare() {
    const thead = document.querySelector('#kb-compare thead');
    const tbody = document.querySelector('#kb-compare tbody');

    thead.innerHTML = `<tr>
        <th>指标</th>
        ${KB_LIST.map(n => `<th>${n} 均分</th><th>${n} 通过率</th>`).join('')}
        ${KB_LIST.length >= 2 ? '<th>差异</th>' : ''}
    </tr>`;

    tbody.innerHTML = METRIC_NAMES.map(m => {
        const scores = KB_LIST.map(n => SUMMARIES[n]?.avg_scores?.[m]);
        const passes = KB_LIST.map(n => SUMMARIES[n]?.pass_rates?.[m]);
        let diffHtml = '';
        if (KB_LIST.length >= 2 && scores[0] != null && scores[1] != null) {
            const diff = scores[0] - scores[1];
            const cls = diff > 0.05 ? 'diff-positive' : diff < -0.05 ? 'diff-negative' : 'diff-neutral';
            const arrow = diff > 0.05 ? '← KB1 更好' : diff < -0.05 ? '← KB2 更好' : '持平';
            diffHtml = `<td class="${cls}">${(diff>0?'+':'')}${diff.toFixed(3)} ${arrow}</td>`;
        }
        return `<tr>
            <td><strong>${m}</strong></td>
            ${KB_LIST.map((n,i) => `
                <td>${scores[i] != null ? scores[i].toFixed(3) : '—'}</td>
                <td>${passes[i] != null ? (passes[i]*100).toFixed(0)+'%' : '—'}</td>
            `).join('')}
            ${diffHtml}
        </tr>`;
    }).join('');
}

// ── Bar Chart ──
function renderBarChart() {
    const container = document.getElementById('bar-chart');
    let html = '<h3 style="font-size:15px;margin:20px 0 12px;color:#555">平均分数可视化</h3>';

    METRIC_NAMES.forEach(m => {
        html += `<div class="bar-row"><div class="bar-label">${m}</div>`;
        KB_LIST.forEach((n, i) => {
            const score = SUMMARIES[n]?.avg_scores?.[m] || 0;
            html += `<div class="bar-track" style="margin-right:4px">
                <div class="bar-fill kb${i}" style="width:${Math.max(score*100,3)}%">${(score*100).toFixed(0)}%</div>
            </div>`;
        });
        html += '</div>';
    });
    container.innerHTML = html;
}

// ── Question Table ──
let currentSort = {col: 'question_id', asc: true};
let expandedRows = new Set();
let expandedAnswers = new Set();

function sortResults(col, asc) {
    return [...RESULTS].sort((a,b) => {
        let va = a[col] ?? '', vb = b[col] ?? '';
        if (col === 'latency_ms' || col === 'sources_count' || col === 'total_tokens') {
            va = Number(va); vb = Number(vb);
        }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return asc ? -1 : 1;
        if (va > vb) return asc ? 1 : -1;
        return 0;
    });
}

function getPassStatus(r) {
    if (r.error) return 'error';
    if (!r.metric_success || Object.keys(r.metric_success).length === 0) return 'na';
    const vals = Object.values(r.metric_success);
    if (vals.every(v => v)) return 'pass';
    if (vals.some(v => v)) return 'partial';
    return 'fail';
}

const PAGE_SIZE = 50;
let currentPage = 1;

function goPage(n) { currentPage = n; renderTable(); window.scrollTo(0, 300); }

function renderTable() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const kbFilter = document.getElementById('kb-filter').value;
    const scoreFilter = document.getElementById('score-filter').value;

    const taskFilter = document.getElementById('task-filter').value;

    let filtered = RESULTS.filter(r => {
        if (kbFilter !== 'all' && r.kb_label !== kbFilter) return false;
        if (taskFilter !== 'all' && (r.task_type||'') !== taskFilter) return false;
        const status = getPassStatus(r);
        if (scoreFilter !== 'all' && status !== scoreFilter) return false;
        if (search && !(r.question||'').toLowerCase().includes(search) && !(r.question_id||'').toLowerCase().includes(search)) return false;
        return true;
    });

    filtered = sortResults(currentSort.col, currentSort.asc).filter(r => filtered.includes(r));

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const pageItems = filtered.slice((currentPage-1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    document.getElementById('result-count').innerHTML = `显示 ${filtered.length} / ${RESULTS.length} 条` +
        (totalPages > 1 ? ` | 第 ${currentPage}/${totalPages} 页` +
        ` <button onclick="goPage(1)" ${currentPage<=1?'disabled':''}>«</button>` +
        ` <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>` +
        ` <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>` +
        ` <button onclick="goPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>` : '');

    // KB filter options
    const kbSelect = document.getElementById('kb-filter');
    if (kbSelect.options.length <= 1) {
        kbSelect.innerHTML = '<option value="all">全部 KB</option>' + KB_LIST.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // Task type filter options
    const taskSelect = document.getElementById('task-filter');
    if (taskSelect.options.length <= 1) {
        const types = [...new Set(RESULTS.map(r => r.task_type || '(空)'))].sort();
        taskSelect.innerHTML = '<option value="all">全部任务类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // Headers
    const cols = ['question_id','kb_label','question','task_type','latency_ms','ttft_ms','total_tokens','risk_level'];
    const thead = document.querySelector('#q-table thead');
    thead.innerHTML = `<tr>
        ${cols.map(c => {
            const labels = {question_id:'ID',kb_label:'KB',question:'问题',task_type:'任务类型',latency_ms:'延迟',ttft_ms:'TTFT',total_tokens:'Token',risk_level:'风险'};
            const sorted = currentSort.col === c ? ' sorted' : '';
            const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '↕';
            return `<th class="${sorted}" onclick="currentSort={col:'${c}',asc:currentSort.col==='${c}'?!currentSort.asc:true};renderTable()">${labels[c]||c} <span class="sort-icon">${arrow}</span></th>`;
        }).join('')}
        ${METRIC_NAMES.map(m => `<th onclick="currentSort={col:'${m}',asc:currentSort.col==='${m}'?!currentSort.asc:true};renderTable()">${m} <span class="sort-icon">↕</span></th>`).join('')}
        <th>状态</th>
    </tr>`;

    // Rows
    const tbody = document.querySelector('#q-table tbody');
    tbody.innerHTML = pageItems.map((r, i) => {
        const status = getPassStatus(r);
        const statusIcon = {pass:'✅',partial:'⚠️',fail:'❌',error:'💥',na:'—'}[status] || '—';
        const qid = r.question_id || '';
        const qText = (r.question || '').substring(0, 80);
        const isExpanded = expandedRows.has(qid + r.kb_label);

        const ttft = r.ttft_ms ? r.ttft_ms + 'ms' : '—';
        const tok = r.total_tokens ? (r.prompt_tokens||0)+'/'+(r.completion_tokens||0)+'/'+(r.total_tokens||0) : '—';

        let row = `<tr>
            <td>${qid}</td>
            <td>${r.kb_label||''}</td>
            <td class="q-text ${isExpanded?'expanded':''}" onclick="toggleExpand('${qid}','${r.kb_label}')" title="${(r.question||'').replace(/"/g,'&quot;')}">${isExpanded ? (r.question||'') : qText}</td>
            <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
</body>
</html>
