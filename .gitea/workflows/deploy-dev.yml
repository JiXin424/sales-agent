name: deploy-dev
# push 到 dev 分支自动触发：构建 dev 标签镜像 → 仅部署本机 prod2（force-recreate 应用容器）。
# 不碰生产 prod3 和 test（它们只跟 main），不动 latest 标签。

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  REGISTRY: registry.internal:5000
  IMAGE_NAME: sales-agent
  FRONTEND_IMAGE_NAME: sales-agent-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
          echo "checked out $(git rev-parse --short HEAD)"

      - name: Build image (dev tag only,不动 latest)
        run: |
          echo "Building ${REGISTRY}/${IMAGE_NAME}:dev"
          docker build -t ${REGISTRY}/${IMAGE_NAME}:dev .

      - name: Push image
        run: |
          docker push ${REGISTRY}/${IMAGE_NAME}:dev
          echo "::notice::pushed ${REGISTRY}/${IMAGE_NAME}:dev"

      - name: Build frontend image (dev tag only)
        run: |
          echo "Building frontend ${REGISTRY}/${FRONTEND_IMAGE_NAME}:dev"
          docker build -t ${REGISTRY}/${FRONTEND_IMAGE_NAME}:dev -f console/Dockerfile console/

      - name: Push frontend image
        run: |
          docker push ${REGISTRY}/${FRONTEND_IMAGE_NAME}:dev
          echo "::notice::pushed frontend ${REGISTRY}/${FRONTEND_IMAGE_NAME}:dev"

  deploy-fanout:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: checkout (本地 Gitea,精确 SHA)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@127.0.0.1:3002/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Fan-out deploy to dev targets only
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:dev"
          FRONTEND_IMAGE="${REGISTRY}/${FRONTEND_IMAGE_NAME}:dev"
          echo "Rolling out backend=${IMAGE} frontend=${FRONTEND_IMAGE} to dev targets"
          TARGETS_FILE=deploy/deploy-targets-dev.json \
            DEPLOY_BRANCH=dev FORCE_RECREATE_APP=1 \
            IMAGE="${IMAGE}" FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
            scripts/ci-fanout.sh
