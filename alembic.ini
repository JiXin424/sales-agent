# Alembic 配置。数据库 URL 由 migrations/env.py 从应用 settings 注入（async driver）。
# 在项目根目录运行：alembic upgrade head / alembic stamp head 等。

[alembic]
script_location = src/sales_agent/migrations
# URL 留空，env.py 用 get_settings().database.url 覆盖
sqlalchemy.url =
# 版本文件命名用递增前缀，便于阅读
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# 可选：用 ruff 格式化生成的 migration
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
