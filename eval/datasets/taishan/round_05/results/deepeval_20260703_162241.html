 addresses the input question about how Wang Fei sought help from colleagues and learned to categorize qualification documents when first making bids.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统未直接回应用户的具体问题，而是给出了通用的销售建议，没有针对用户请求中的关键信息点进行回答，且未调用任何工具来提供具体、可操作的信息，完全不符合专业销售教练的角色要求。"}}, {"question_id": "golden_0344", "question": "二十年稳定运营、透明定价与自营服务如何应对采购风险并提升员工满意度？", "reference": "网票福多多20年的稳健经营、透明定价和自营服务，能有效解决采购风险并提升员工满意度。具体来说：\n\n- **20年稳健经营**：供应商资质可靠，零诉讼零外债，合同写入零风险承诺，彻底消除采购决策者对供应商跑路、审计问责的担忧。\n- **透明定价**：电影票不加价、福利商城价格公开，杜绝隐形加价，确保同样预算员工到手更多，直接提升员工的实际购买力和满意度。\n- **自营客服团队**：365天快速响应，问题当天闭环，避免推诿和售后难，让员工享受便捷优质的服务，大幅降低投诉率。\n\n这三者结合，使采购决策者从“救火”转为放心，工会和HR成为福利专家，员工幸福感显著提升，福利真正发挥留人暖心作用。", "kb_label": "taishan", "model": "(default)", "answer": "直接给结论：**把\"二十年稳定运营、透明定价、自营服务\"这三个点，转化成采购最怕的三个风险的反向承诺，你就能赢。**\n\n你这个问题问得挺准，说明你抓住了采购决策的核心——不是比谁便宜，而是比谁\"不出事\"。我直接给你三句话，明天就能用：\n\n**1. 二十年稳定运营 → 打\"供应商暴雷\"风险**\n话术：\"王总，我们2005年成立，实缴注册资本3000万，至今零诉讼、零外债。您选我们，等于给公司福利上了个'二十年老店'的保险，不用担心明年换供应商、员工卡里钱花不出去。\"\n\n**2. 透明定价 → 打\"价格猫腻\"风险**\n话术：\"我们电影票不高于猫眼零售价，蛋糕不高于官方正价，差价双倍/三倍赔付。您不用费劲比价，员工也不用担心'公司发的券比外面贵'，满意度自然高。\"\n\n**3. 自营客服团队 → 打\"售后没人管\"风险**\n话术：\"我们400人自营团队，7x12小时在线，24小时极速响应。员工有问题直接找我们，不用经过HR转达，您省心，员工也满意。\"\n\n**核心逻辑**：采购最怕的不是贵，是\"选错了担责\"。你把\"二十年\"翻译成\"稳定\"，把\"透明\"翻译成\"省事\"，把\"自营\"翻译成\"兜底\"，采购就敢拍板。\n\n**明天就做一件事**：找三个正在跟进的客户，把上面三句话分别编成微信，发给对应的采购负责人，看谁回复最快。", "rendered": "直接给结论：**把\"二十年稳定运营、透明定价、自营服务\"这三个点，转化成采购最怕的三个风险的反向承诺，你就能赢。**\n\n你这个问题问得挺准，说明你抓住了采购决策的核心——不是比谁便宜，而是比谁\"不出事\"。我直接给你三句话，明天就能用：\n\n**1. 二十年稳定运营 → 打\"供应商暴雷\"风险**\n话术：\"王总，我们2005年成立，实缴注册资本3000万，至今零诉讼、零外债。您选我们，等于给公司福利上了个'二十年老店'的保险，不用担心明年换供应商、员工卡里钱花不出去。\"\n\n**2. 透明定价 → 打\"价格猫腻\"风险**\n话术：\"我们电影票不高于猫眼零售价，蛋糕不高于官方正价，差价双倍/三倍赔付。您不用费劲比价，员工也不用担心'公司发的券比外面贵'，满意度自然高。\"\n\n**3. 自营客服团队 → 打\"售后没人管\"风险**\n话术：\"我们400人自营团队，7x12小时在线，24小时极速响应。员工有问题直接找我们，不用经过HR转达，您省心，员工也满意。\"\n\n**核心逻辑**：采购最怕的不是贵，是\"选错了担责\"。你把\"二十年\"翻译成\"稳定\"，把\"透明\"翻译成\"省事\"，把\"自营\"翻译成\"兜底\"，采购就敢拍板。\n\n**明天就做一件事**：找三个正在跟进的客户，把上面三句话分别编成微信，发给对应的采购负责人，看谁回复最快。\n\n来源：\n1. 《无 levant statements and fully addresses the input question about how 网票福多多 ensures stability, reliability, real purchasing power, and quality service.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "The actual outcome does not address the user's request at all. It provides information about a company's stability, risk-free promises, and customer service, which is unrelated to evaluating a sales coaching agent's performance. The response fails to directly answer the user's question, lacks actionable sales advice, and does not align with the professional sales coach role."}}, {"question_id": "golden_0423", "question": "如果福利采购负责人忽视供应商稳定性风险，可能会引发哪些潜在危机？", "reference": "如果福利采购负责人忽视供应商稳定性风险，可能引发以下隐性危机：\n\n1. **供应商跑路风险**：一旦供应商经营不稳或突然倒闭，已支付的福利预算可能无法追回，导致企业直接经济损失，且员工无法正常享受福利，引发大规模投诉。\n2. **服务中断与推诿**：不稳定的供应商常出现服务响应慢、问题推诿，员工兑换福利时遭遇卡顿、商品下架或临时加价，导致满意度骤降，工会和HR疲于“救火”。\n3. **审计与问责压力**：采购决策者需为供应商资质不稳、财务不透明等问题承担审计责任，甚至面临被举报“吃回扣”的合规风险，职业风险显著增大。\n4. **员工幸福感下降**：福利预算花出去却换不来员工认可，员工因体验差而抱怨，企业留人、暖心的初衷落空，反而加剧内部矛盾。\n\n这些危机最终会使福利采购成为领导汇报时的“负面案例”，而非亮点政绩。", "kb_label": "taishan", "model": "(default)", "answer": "你这个问题问得好，直接点出了很多销售新人容易忽略的致命点。福利采购负责人如果忽视供应商稳定性，最直接的后果就是**信任崩塌**，而且是连环崩塌。\n\n你明天跟客户沟通时，可以重点讲这**三个层面的潜在危机**，每个都能戳到他们的痛处：\n\n1. **员工层面的信任危机**：这是最直接的。比如中秋节发蛋糕券，结果供应商出问题，员工兑换不了、配送延迟、蛋糕品质差。员工不会骂供应商，只会骂公司“发的什么破福利”。一次糟糕的体验，HR部门一年的辛苦就白费了，员工满意度直接跳水。根据员工案例库《王菲销售业务分享》（置信度80%），有客户反馈过，之前合作的某家小供应商在春节档期系统崩溃，导致近千名员工无法兑换，HR被投诉电话打爆，最后不得不自掏腰包补偿。\n\n2. **HR个人层面的职业危机**：福利采购是HR的“面子工程”。选了一家不靠谱的供应商，出了问题，老板会质疑HR的选型能力和风险把控能力。轻则年终奖泡汤，重则影响晋升，甚至背锅走人。HR最怕的就是“费力不讨好”，你帮他规避了这个风险，就是帮他保住了职业安全。\n\n3. **企业层面的法律与财务危机**：这听起来有点远，但很真实。供应商跑路、数据泄露、假货纠纷，最终责任都会追溯到企业。比如供应商泄露了员工个人信息，企业要承担连带责任。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多20年零诉讼、零外债，实缴注册资本3000万，这就是最硬的背书——我们不会跑路，出了问题我们兜底。\n\n**所以，你下次跟客户聊的时候，别光讲“我们有什么”，要讲“没有我们会怎样”。** 把这三个危机摆出来，然后说：“我们福多多做了20年，服务了3万多家企业，图的就是一个稳。选我们，你不用担心明年这家公司还在不在，不用担心员工兑换出问题。这就是我们最大的价值。”", "rendered": "你这个问题问得好，直接点出了很多销售新人容易忽略的致命点。福利采购负责人如果忽视供应商稳定性，最直接的后果就是**信任崩塌**，而且是连环崩塌。\n\n你明天跟客户沟通时，可以重点讲这**三个层面的潜在危机* to broader categories. The completeness is slightly reduced because the Expected Output's fourth point (employee happiness decline) is only partially addressed. The output is highly actionable for sales scenarios, with concrete talking points and a real example. Score reflects good alignment but minor gaps in completeness.", "完整性 (Completeness) [GEval]": "The Actual Output covers the core theme of trust crises from ignoring supplier stability, but it misses several key points from the Expected Output. Specifically, it does not mention the risk of supplier bankruptcy leading to unrecoverable payments, service interruption and buck-passing, audit and accountability pressure, or the risk of being accused of taking kickbacks. The Actual Output introduces new examples (e.g., cake vouchers, HR compensation) and a specific vendor (福多多) not present in the Expected Output, which adds extra information but does not compensate for the missing key points. Overall, 4 out of 5 key points from the Expected Output are absent, resulting in a low score.", "Contextual Recall": "The score is 0.00 because none of the sentences in the expected output can be attributed to any node in the retrieval context. For example, sentence 1's '供应商跑路风险' and specific financial loss details are not present in node 4, which only mentions '供应商倒闭' broadly. Similarly, sentences 2-5 describe detailed scenarios like service delays, audit pressure, employee happiness, and negative reporting, none of which are supported by the retrieval context's general risk mentions.", "Contextual Precision": "The score is 0.25 because only the fourth node is relevant, but it is ranked fourth out of five, meaning it appears after three irrelevant nodes. The first three nodes are irrelevant as they discuss general procurement risks or supplier quality issues without addressing the specific crises of ignoring supplier stability risks in welfare procurement, such as '供应商跑路风险' or '服务中断'. The fourth node is relevant because it ex , {"question_id": "golden_0383", "question": "若竞争对手模仿福多多，其三大核心价值会如何被削弱？", "reference": "若竞争对手试图模仿福多多的三大核心价值，其优势将被显著削弱：\n\n1. **稳定可靠**：福多多拥有20年稳健经营、零外债零诉讼的信用记录，以及核心团队超10年的稳定性，这些是长期积累的信任资产，竞争对手难以短期复制。模仿者若缺乏同等历史积淀，客户对其“承诺即做到”的信任度会大打折扣。\n\n2. **实际购买力领先**：福多多的购买力优势源于与供应商的深度合作和规模效应，而非单纯补贴。竞争对手若仅靠价格战模仿，可能陷入亏损或牺牲服务质量，反而无法持续提供同等性价比。\n\n3. **高品质服务**：福多多基于服务30000+企业客户的经验，形成了成熟的售后体系和客户洞察。模仿者若缺乏类似经验积累，其服务流程和响应能力将难以达到同等水平，客户体验必然下降。\n\n综上，福多多的三大价值支柱根植于20年的行业深耕与信用记录，竞争对手的模仿只能触及表面，无法真正削弱其核心差异化优势。", "kb_label": "taishan", "model": "(default)", "answer": "这问题问得好，说明你在思考福多多的护城河。直接说结论：**模仿得了皮毛，模仿不了筋骨。** 福多多的三大核心价值——**规模效应、零风险承诺、20年信任积累**——不是靠抄能抄来的。\n\n我给你拆开讲：\n\n1.  **规模效应：模仿者烧不起这个钱，也攒不出这个量**\n    福多多覆盖全国14000+影院、600+城市，服务超30000家企业、2000万员工。这个体量带来的议价能力，是模仿者拿不到的。比如电影票不高于猫眼零售价、蛋糕不高于官方正价，这些承诺背后是巨大的订单量支撑。模仿者如果硬要跟，要么补贴烧到亏本，要么价格根本压不下来，两头不讨好。**规模是时间+资金+客户信任堆出来的，不是复制个页面就能有的。**\n\n2.  **零风险承诺：模仿者敢签这个字吗？**\n    福多多敢承诺“电影票差价三倍赔付”“蛋糕差价双倍赔付”“正品假一赔三”，背后是实缴3000万注册资本、20年零诉讼零外债的底气。模仿者如果照抄这个承诺，一旦出现赔付，资金链可能直接断裂。**这不是一个营销口号，而是一个用真金白银和20年信用背书的合同条款。** 模仿者要么不敢承诺，要么承诺了也兑现不了，反而砸自己招牌。\n\n3.  **20年信任积累：模仿者没有这个“时间护城河”**\n    服务30000+客户、覆盖2000万员工，这背后是20年稳定运营、7×12小时自营客服、24小时极速响应积累下来的口碑。HR选福利供应商，最怕的就是“今年在，明年跑”。福多多的“至今零诉讼、零外债”就是最好的信任背书。模仿者哪怕产品做得再像，客户一句“你们公司成立几年了？”，就直接露怯了。**信任这个东西，没法速成。**\n\n**给你的行动建议：**\n下次客户说“别家也有类似的”，你就抓住这三点反问：\n- “他们敢承诺电影票差价三倍赔付吗？”\n- “他们公司成立多久了？实缴资本多少？”\n- “他们服务过多少家像您这样的企业？”\n\n**记住，客户买的不是“功能”，是“放心”。** 福多多卖的不是电影票和蛋糕，是“选我，你不出事”的安全感。这个，模仿者给不了。", "rendered": "这问题问得好，说明你在思考福多多的护城河。直接说结论：**模仿得了皮毛，模仿不了筋骨。** 福多多的三大核心价值——**规模效应、零风险承诺、20年信任积累**——不是靠抄能抄来的。\n\n我给你拆开讲：\n\n1.  **规模效应：模仿者烧不起这个钱，也攒不出这个量**\n    福多多覆盖全国14000+影院、600+城市，服务超30000家企业、2000万员工。这个体量带来的议价能力，是模仿者拿不到的。比如电影票不高于猫眼零售价、蛋糕不高于官方正价，这些承诺背后是巨大的订单量支撑。模仿者如果硬要跟，要么补贴烧到亏本，要么价格根本压不下来，两头不讨好。**规模是时间+资金+客户信任堆出来的，不是复制个页面就能有的。**\n\n2.  **零风险承诺：模仿者敢签这个字吗？**\n    福多多敢承诺“电影票差价三倍赔付”“蛋糕差价双倍赔付”“正品假一赔三”，背后是实缴3000万注册资本、20年零诉讼零外债的底气。模仿者如果照抄这个承诺，一旦出现赔付，资金链可能直接断裂。**这不是一个营销口号，而是一个用真金白银和20年信用背书的合同条款。** 模仿者要么不敢承诺，要么承诺了也兑现不了，反而砸自己招牌。\n\n3.  **20年信任积累：模仿者没有这个“时间护城河”**\n    服务30 合干销售？\"复盘的人，每次被拒都当成一次\"实验数据\"——\"哦，原来这个行业的客户更在意售后响应速度，那下次我重点讲7x12小时客服。\"（根据产品知识库《公司介绍v3.0》，置信度90%）心态从\"被客户拒绝\"变成\"帮客户解决问题\"。\n\n**你明天就能做的一个动作：**\n今晚挑一个今天聊过的客户，花10分钟写三句话——①他今天说的哪句话让我最意外？②我哪句话说完后他沉默了？③下次联系我准备说什么？坚持一周，你再看自己的跟进记录，会发现完全不一样。", "rendered": "这个问题问得好，但咱们先别谈理论，直接说结论：**一个月后，认真复盘的那个销售，手里至少有3-5个能精准推进的客户；不复盘的那个，手里还是一堆\"考虑一下\"的微信好友。**\n\n具体差别在哪？我拆成三点说：\n\n1. **话术迭代速度差3倍以上**\n   不复盘的人，每次被客户说\"贵了\"\"再想想\"，下次还是原封不动地回同一套话。复盘的人，第一次被拒后就会想：「那句\"贵了\"是嫌单价高，还是预算没批？」然后第二天就换一套打法去试。一个月下来，前者还在用第一周的话术，后者已经迭代了四五版。\n\n2. **客户分层能力天差地别**\n   不复盘的人，脑子里所有客户都是\"有意向但没签\"。复盘的人，会逼自己回答三个问题：这个客户卡在哪个环节？是决策人没找对，还是方案没打动他？下次联系用什么理由？一个月后，前者还在\"跟进中\"的泥潭里打转，后者已经能精准判断——这个客户该放一放，那个客户该加把火。\n\n3. **心态上，一个越跑越累，一个越跑越顺**\n   不复盘的人，每天重复同样的动作，被拒多了就自我怀疑：\"是不是我不适合干销售？\"复盘的人，每次被拒都当成一次\"实验数据\"——\"哦，原来这个行业的客户更在意售后响应速度，那下次我重点讲7x12小时客服。\"（根据产品知识库《公司介绍v3.0》，置信度90%）心态从\"被客户拒绝\"变成\"帮客户解决问题\"。\n\n**你明天就能做的一个动作：**\n今晚挑一个今天聊过的客户，花10分钟写三句话——①他今天说的哪句话让我最意外？②我哪句话说完后他沉默了？③下次联系我准备说什么？坚持一周，你再看自己的跟进记录，会发现完全不一样。\n\n来源：\n1. 《超兔CRM系统落地复盘,助力销售业绩提升_网易订阅》\n2. 《复盘对销售有多重要?_知乎》\n3. 《2022营销月度总结实用》\n（共 5 条来源）", "task_type": "conversation_review", "risk_level": "none", "sources_count": 5, "latency_ms": 6858, "ttft_ms": 3, "prompt_tokens": 3912, "completion_tokens": 424, "total_tokens": 4336, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.7, "完整性 (Completeness) [GEval]": 0.0, "Contextual Recall": 0.5, "Contextual Precision": 0.0, "Contextual Relevancy": 0.5588, "Faithfulness": 1.0, "Answer Relevancy": 0.9524, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.3}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": false, "Contextual Recall": true, "Contextual Precision": false, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": false}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output covers the core idea that a salesperson who does not review will grow slower, but it introduces specific metrics (3-5 c , "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "The actual outcome does not address any user request or question; it simply provides a description of a product's UVP (Unique Value Proposition) without any context of a user query, sales coaching advice, or actionable recommendations. It fails to meet all criteria: it does not respond to a specific user question, lacks actionable sales advice, and does not align with the role of a professional sales coach."}}, {"question_id": "golden_0330", "question": "比较常规、大型及水上活动如何提升团队凝聚力与沟通。", "reference": "根据网票福多多的活动方案，三类团建活动通过不同方式提升团队凝聚力与沟通协作能力：\n\n- **常规拓展活动**（如超音速、达芬奇密码）侧重基础能力提升，通过模拟场景帮助团队发现沟通障碍、打破思维定势、提升大局观，适合日常团队磨合。\n- **大型拓展活动**（如非洲鼓、飞盘赛）更具主题性和参与规模，侧重提升团队士气、促进跨部门融合与文化构建，能有效增强集体荣誉感和团队战斗力。\n- **水上拓展活动**（如皮划艇、龙舟赛）融合娱乐性与竞技性，皮划艇强调个人拼搏与团队协作，龙舟赛则极其考验团队同舟共济、节奏统一及集体荣誉感，适合夏季或亲水场景。", "kb_label": "taishan", "model": "(default)", "answer": "你这个问题问得好，但太宽了。我直接给你三个方向，你明天就能用上。\n\n**第一，别把\"团队凝聚力\"当口号，要把它拆成可执行的动作。**\n\n你提到的\"常规、大型、水上活动\"，本质是三种不同的场景，对应的凝聚力提升点完全不同：\n\n• **常规活动（如每周例会、月度团建）**：核心是**降低沟通成本**。别搞复杂游戏，就做两件事：一是**固定一个\"吐槽/建议\"环节**，每人3分钟，只说真话，说完就过；二是**强制交叉分组**，让平时不坐一起的人搭档完成一个10分钟的小任务（比如用乐高搭一个公司吉祥物）。动作要轻，频率要高。\n\n• **大型活动（如年会、运动会）**：核心是**创造共同记忆点**。别只搞领导讲话和抽奖，要设计一个**全员参与的\"共创\"环节**。比如，让每个部门认领一个节目/展板/游戏摊位，从策划到执行全权负责。这比任何团建都更能激发归属感。关键是**给资源、给舞台、给反馈**，别让他们白干。\n\n• **水上活动（如漂流、皮划艇）**：核心是**制造\"非对称依赖\"**。水上项目天然有风险，需要协作。别让所有人各玩各的，要**强制配对**——一个会游泳的带一个不会的，一个胆大的带一个胆小的。在出发前，给他们一个共同目标（比如\"第一个到达终点的队伍有神秘奖励\"）。过程中，他们必须互相照应，这种\"生死与共\"的体验，比任何说教都管用。\n\n**第二，沟通提升的关键，是\"结构化\"而非\"自由发挥\"。**\n\n很多活动失败，是因为大家聊着聊着就散了。你要做的是**给沟通一个框架**：\n\n• **活动前**：发一个\"破冰任务卡\"，上面写3个问题（比如\"你最近最开心的一件事\"\"你工作中最头疼的一个问题\"），要求每个人在活动期间至少找到3个不同部门的人交换答案。这比\"大家自我介绍\"有效10倍。\n\n• **活动中**：设置\"信息传递站\"。比如在水上活动，每到一个休息点，必须由队伍里最沉默的那个人，向全队汇报\"我们刚才遇到了什么困难，怎么解决的\"。强制发言，打破沉默。\n\n• **活动后**：24小时内，每个人在群里发一张活动照片+一句\"今天最感谢的人\"。**公开表达感谢**，是强化关系的核武器。\n\n**第三，给你一个马上能用的动作：**\n\n你明天就做一件事：**把\"团队凝聚力\"这个目标，换成\"让每个人在活动中至少有一次被看见、被需要、被感谢的体验\"**。然后，围绕这个目标，去设计你上面提到的三类活动。别贪多，一次只抓一个点。\n\n如果你能告诉我你具体要搞哪一类活动、团队大概多少人、平时沟通氛围怎么样，我可以给你更精准的话术和流程。", "rendered": "你这个问题问得好，但太宽了。我直接给你三个方向，你明天就能用上。\n\n**第一，别把\"团队凝聚力\"当口号，要把它拆成可执行的动作。**\n\n你提到的\"常规、大型、水上活动\"，本质是三种不同的场景，对应的凝聚力提升点完全不同：\n\n• **常规活动（如每周例会、月度团建）**：核心是**降低沟通成本**。别搞复杂游戏，就做两件事：一是**固定一个\"吐槽/建议\"环节**，每人3分钟，只说真话，说完就过；二是**强制交叉分组**，让平时不坐一起的人搭档完成一个10分钟的小任务（比如用乐高搭一个公司吉祥物）。动作要轻，频率要高。\n\n• **大型活动（如年会、运动会）**：核心是**创造共同记忆点**。别只搞领导讲话和抽奖，要设计一个**全员参与的\"共创\"环节**。比如，让每个部门认领一个节目/展板/游戏摊位，从策划到执行全权负责。这比任何团建都更能激发归属感。关键是**给资源、给舞台、给反馈**，别让他们白干。\n\n• **水上活动（如漂流、皮划艇）**：核心是**制造\"非对称依赖\"**。水上项目天然有风险，需要协作。别让所有人各玩各的，要**强制配对**——一个会游泳的带一个不会的，一个胆大的带一个胆小的。在出发前，给他们一个共同目标（比如\"第一个到达终点的队伍有神秘奖励\"）。过程中，他们必须互相照应，这种\"生死与共\"的体验，比任何说教都管用。\n\n**第二，沟通提升的关键，是\"结构化\"而非\"自由发挥\"。**\n\n很多活动失败，是因为大家聊着聊着就散了。你要做的是**给沟通一个框架**：\n\n• **活动前**：发一个\"破冰任务卡\"，上面写3个问题（比如\"你最近最开心的一件事\"\"你工作中最头疼的一个问题\"），要求每个人在活动期间至少找到3个不同部门的人交换答案。这比\"大家自我介绍\"有效10倍。\n\n• **活动中**：设置\"信息传递站\"。比如在水上活动，每到一个休息点，必须由队伍里最沉默的那个人，向全队汇报\"我们刚才遇到了什么困难，怎么解决的\"。强制发言，打破沉默。\n\n• **活动后**：24小时内，每个人在群里发一张活动照片+一句\"今天最感谢的人\"。**公开表达感谢**，是强化关系的核武器。\n\n**第三，给你一个马上能用的动作：**\n\n你明天就做一件事：**把\"团队凝聚力\"这个目标，换成\"让每个人在活动中至少有一次被看见、被需要、被感谢的体验\"**。然后，围绕这个目标，去设计你上面提到的三类活动。别贪多，一次只抓一个点。\n\n如果你能告诉我你具体要搞哪一类活动、团队大概多少人、平时沟通氛围怎么样，我可以给你更精准的话术和流程。\n\n来源：\n1. 《公司活动组织指南：让团队互动，增进凝聚力》\n2. 《沙滩团建活动方案.pptx_淘豆网》\n3. 《如何通过团队建设活动提升团队凝聚力?-银行频道-和讯网》\n（共 4 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 4, "latency_ms": 9411, "ttft_ms": 15, "prompt_tokens": 3824, "completion_tokens": 650, "total_tokens": 4474, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.0, "完整性 (Completeness) [GEval]": 0.0, "Contextual Recall": 0.0, "Contextual Precision": 1.0, "Contextual Relevancy": 1.0, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": false, "Contextual Recall": false, "Contextual Precision": true, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall 走得通。这是新人最缺的——不是技巧，是\"我能行\"的底气。\n\n• **好处3：少走弯路**。榜样踩过的坑你直接避开，他验证过有效的话术、节奏、客户类型，你拿来就用，省掉大量试错成本。\n\n**二、再向同事学习——这是\"补短板\"**\n\n• **好处1：拓宽打法库**。不同同事有不同强项——有人擅长电话破冰，有人擅长方案呈现，有人擅长逼单。你遇到具体卡点时，找对应强项的同事问一句，比你自己琢磨三天都管用。\n\n• **好处2：获取即时反馈**。同事就在你身边，你刚打完一通电话，转头问一句\"我刚才那个异议处理得怎么样\"，他能立刻给你指出来哪里可以优化。这是书本和课程给不了的。\n\n• **好处3：积累行业判断力**。听同事复盘客户案例、分析竞品动作，你慢慢就能建立起对市场的直觉——什么客户能签、什么客户是坑、什么时机该推什么产品。\n\n**三、实操建议**\n\n你明天就做三件事：\n1. **找1个相似榜样**：观察公司里跟你背景最像、业绩最好的那个人，主动约他15分钟，问\"你新人期最关键的3个动作是什么\"。\n2. **建1个\"同事技能地图\"**：把身边同事的强项记下来——谁擅长方案、谁擅长客情、谁擅长谈判，遇到问题直接找对人。\n3. **每周1次\"偷师\"**：挑一个你觉得厉害的同事，跟听他一通客户电话或一次拜访，结束后问他\"刚才那个点你是怎么想的\"。\n\n顺序别搞反。先定方向，再补短板，你三个月就能跑起来。", "rendered": "直接说结论：**先找相似成功榜样，再向同事学习，顺序不能反。**\n\n新人最容易犯的错是\"什么都学\"，结果学了一堆不适合自己的打法，越做越乱。我给你拆开讲：\n\n**一、先找相似成功榜样——这是\"定方向\"**\n\n• **好处1：可复制性强**。榜样跟你背景、性格、资源相近，他的路径你直接照搬就能出效果，不用自己从头摸索。比如你也是刚入行、内向型销售，那就找公司里同样内向但业绩稳的老销售，看他怎么破冰、怎么跟进，你学起来阻力最小。\n\n• **好处2：建立信心快**。看到\"跟我差不多的人也能做成\"，你就知道自己这条路走得通。这是新人最缺的——不是技巧，是\"我能行\"的底气。\n\n• **好处3：少走弯路**。榜样踩过的坑你直接避开，他验证过有效的话术、节奏、客户类型，你拿来就用，省掉大量试错成本。\n\n**二、再向同事学习——这是\"补短板\"**\n\n• **好处1：拓宽打法库**。不同同事有不同强项——有人擅长电话破冰，有人擅长方案呈现，有人擅长逼单。你遇到具体卡点时，找对应强项的同事问一句，比你自己琢磨三天都管用。\n\n• **好处2：获取即时反馈**。同事就在你身边，你刚打完一通电话，转头问一句\"我刚才那个异议处理得怎么样\"，他能立刻给你指出来哪里可以优化。这是书本和课程给不了的。\n\n• **好处3：积累行业判断力**。听同事复盘客户案例、分析竞品动作，你慢慢就能建立起对市场的直觉——什么客户能签、什么客户是坑、什么时机该推什么产品。\n\n**三、实操建议**\n\n你明天就做三件事：\n1. **找1个相似榜样**：观察公司里跟你背景最像、业绩最好的那个人，主动约他15分钟，问\"你新人期最关键的3个动作是什么\"。\n2. **建1个\"同事技能地图\"**：把身边同事的强项记下来——谁擅长方案、谁擅长客情、谁擅长谈判，遇到问题直接找对人。\n3. **每周1次\"偷师\"**：挑一个你觉得厉害的同事，跟听他一通客户电话或一次拜访，结束后问他\"刚才那个点你是怎么想的\"。\n\n顺序别搞反。先定方向，再补短板，你三个月就能跑起来。\n\n来源：\n1. 《销售新人必看的经验分享!_职Q!》\n2. 《作为销售同行,你有哪些建议或者话,想对销售新手说的 ?_知乎》\n3. 《销售新手应该这样做,才能快速提高!_职Q!》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 7713, "ttft_ms": 15, "prompt_tokens": 3831, "completion_tokens": 532, "total_tokens": 4363, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.8, "完整性 (Completeness) [GEval]": 0.5, "Contextual Recall": 0.0, "Contextual Precisi     let html = '<h3 style="font-size:15px;margin:20px 0 12px;color:#555">平均分数可视化</h3>';

    METRIC_NAMES.forEach(m => {
        html += `<div class="bar-row"><div class="bar-label">${m}</div>`;
        KB_LIST.forEach((n, i) => {
            const score = SUMMARIES[n]?.avg_scores?.[m] || 0;
            html += `<div class="bar-track" style="margin-right:4px">
                <div class="bar-fill kb${i}" style="width:${Math.max(score*100,3)}%">${(score*100).toFixed(0)}%</div>
            </div>`;
        });
        html += '</div>';
    });
    container.innerHTML = html;
}

// ── Question Table ──
let currentSort = {col: 'question_id', asc: true};
let expandedRows = new Set();
let expandedAnswers = new Set();

function sortResults(col, asc) {
    return [...RESULTS].sort((a,b) => {
        let va = a[col] ?? '', vb = b[col] ?? '';
        if (col === 'latency_ms' || col === 'sources_count' || col === 'total_tokens') {
            va = Number(va); vb = Number(vb);
        }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return asc ? -1 : 1;
        if (va > vb) return asc ? 1 : -1;
        return 0;
    });
}

function getPassStatus(r) {
    if (r.error) return 'error';
    if (!r.metric_success || Object.keys(r.metric_success).length === 0) return 'na';
    const vals = Object.values(r.metric_success);
    if (vals.every(v => v)) return 'pass';
    if (vals.some(v => v)) return 'partial';
    return 'fail';
}

const PAGE_SIZE = 50;
let currentPage = 1;

function goPage(n) { currentPage = n; renderTable(); window.scrollTo(0, 300); }

function renderTable() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const kbFilter = document.getElementById('kb-filter').value;
    const scoreFilter = document.getElementById('score-filter').value;

    const taskFilter = document.getElementById('task-filter').value;

    let filtered = RESULTS.filter(r => {
        if (kbFilter !== 'all' && r.kb_label !== kbFilter) return false;
        if (taskFilter !== 'all' && (r.task_type||'') !== taskFilter) return false;
        const status = getPassStatus(r);
        if (scoreFilter !== 'all' && status !== scoreFilter) return false;
        if (search && !(r.question||'').toLowerCase().includes(search) && !(r.question_id||'').toLowerCase().includes(search)) return false;
        return true;
    });

    filtered = sortResults(currentSort.col, currentSort.asc).filter(r => filtered.includes(r));

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const pageItems = filtered.slice((currentPage-1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    document.getElementById('result-count').innerHTML = `显示 ${filtered.length} / ${RESULTS.length} 条` +
        (totalPages > 1 ? ` | 第 ${currentPage}/${totalPages} 页` +
        ` <button onclick="goPage(1)" ${currentPage<=1?'disabled':''}>«</button>` +
        ` <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>` +
        ` <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>` +
        ` <button onclick="goPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>` : '');

    // KB filter options
    const kbSelect = document.getElementById('kb-filter');
    if (kbSelect.options.length <= 1) {
        kbSelect.innerHTML = '<option value="all">全部 KB</option>' + KB_LIST.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // Task type filter options
    const taskSelect = document.getElementById('task-filter');
    if (taskSelect.options.length <= 1) {
        const types = [...new Set(RESULTS.map(r => r.task_type || '(空)'))].sort();
        taskSelect.innerHTML = '<option value="all">全部任务类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // Headers
    const cols = ['question_id','kb_label','question','task_type','latency_ms','ttft_ms','total_tokens','risk_level'];
    const thead = document.querySelector('#q-table thead');
    thead.innerHTML = `<tr>
        ${cols.map(c => {
            const labels = {question_id:'ID',kb_label:'KB',question:'问题',task_type:'任务类型',latency_ms:'延迟',ttft_ms:'TTFT',total_tokens:'Token',risk_level:'风险'};
            const sorted = currentSort.col === c ? ' sorted' : '';
            const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '↕';
            return `<th class="${sorted}" onclick="currentSort={col:'${c}',asc:currentSort.col==='${c}'?!currentSort.asc:true};renderTable()">${labels[c]||c} <span class="sort-icon">${arrow}</span></th>`;
        }).join('')}
        ${METRIC_NAMES.map(m => `<th onclick="currentSort={col:'${m}',asc:currentSort.col==='${m}'?!currentSort.asc:true};renderTable()">${m} <span class="sort-icon">↕</span></th>`).join('')}
        <th>状态</th>
    </tr>`;

    // Rows
    const tbody = document.querySelector('#q-table tbody');
    tbody.innerHTML = pageItems.map((r, i) => {
        const status = getPassStatus(r);
        const statusIcon = {pass:'✅',partial:'⚠️',fail:'❌',error:'💥',na:'—'}[status] || '—';
        const qid = r.question_id || '';
        const qText = (r.question || '').substring(0, 80);
        const isExpanded = expandedRows.has(qid + r.kb_label);

        const ttft = r.ttft_ms ? r.ttft_ms + 'ms' : '—';
        const tok = r.total_tokens ? (r.prompt_tokens||0)+'/'+(r.completion_tokens||0)+'/'+(r.total_tokens||0) : '—';

        let row = `<tr>
            <td>${qid}</td>
            <td>${r.kb_label||''}</td>
            <td class="q-text ${isExpanded?'expanded':''}" onclick="toggleExpand('${qid}','${r.kb_label}')" title="${(r.question||'').replace(/"/g,'&quot;')}">${isExpanded ? (r.question||'') : qText}</td>
            <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
</body>
