任。一旦选的供应商出问题——券发不了、蛋糕送不到、员工投诉——背锅的是他。所以你的销售策略要围绕\"让他睡得着觉\"来打。\n\n**明天就做的三件事：**\n\n1. **把\"稳定性\"变成可量化的武器**。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多20年稳健经营、零诉讼、零外债、实缴注册资本3000万。这些数字你背下来，每次报价单后面附上\"公司资质一页纸\"，把营业执照、高新技术企业证书、五星售后服务认证、信息安全管理认证的截图放上去。客户问价格时，你直接说：\"王总，我们价格不是最低的，但我们是唯一敢承诺'零风险'的——电影票比猫眼贵我赔三倍，蛋糕比官方贵我赔双倍。您选便宜的，万一出问题，您得花十倍精力去擦屁股。\"\n\n2. **用\"合规性\"堵住竞品的路**。根据竞品情报库《竞品对标分析》（置信度80%），很多小供应商连正规发票都开不齐，更别提资质认证了。你可以在方案里专门列一页\"合规保障清单\"：国家高新技术企业、ISO9001质量管理体系认证、ISO27001信息安全管理体系认证、五星售后服务认证。然后问客户：\"您现在的供应商，这些证能拿出来吗？\" 这个问题一抛，对方心里就有数了。\n\n3. **讲一个\"翻车案例\"，让客户自己算账**。不用指名道姓，就说：\"去年有个客户，贪便宜选了个小平台，中秋节蛋糕券发出去，结果门店不认，员工炸了锅，HR被领导叫去谈话，最后花了三倍的钱才把事平了。您算算，省那5%的成本，值吗？\" 这种故事比任何数据都有杀伤力。\n\n**核心逻辑就一句话**：工会采购的决策者，要的不是\"最便宜\"，而是\"最安全\"。你把\"安全\"这个价值讲透了，价格就不是问题了。", "rendered": "直接给结论：**你下次见工会客户，第一句话就说\"我们公司成立20年，零诉讼、零外债，实缴注册资本3000万\"——这句话比任何低价都管用。**\n\n工会采购的核心逻辑不是\"省钱\"，而是\"不出事\"。你想想，工会主席/HR负责人花的是公司的钱，但担的是自己的责任。一旦选的供应商出问题——券发不了、蛋糕送不到、员工投诉——背锅的是他。所以你的销售策略要围绕\"让他睡得着觉\"来打。\n\n**明天就做的三件事：**\n\n1. **把\"稳定性\"变成可量化的武器**。根据产品知识库《零风险承诺v2.0》（置信度90%），福多多20年稳健经营、零诉讼、零外债、实缴注册资本3000万。这些数字你背下来，每次报价单后面附上\"公司资质一页纸\"，把营业执照、高新技术企业证书、五星售后服务认证、信息安全管理认证的截图放上去。客户问价格时，你直接说：\"王总，我们价格不是最低的，但我们是唯一敢承诺'零风险'的——电影票比猫眼贵我赔三倍，蛋糕比官方贵我赔双倍。您选便宜的，万一出问题，您得花十倍精力去擦屁股。\"\n\n2. **用\"合规性\"堵住竞品的路**。根据竞品情报库《竞品对标分析》（置信度80%），很多小供应商连正规发票都开不齐，更别提资质认证了。你可以在方案里专门列一页\"合规保障清单\"：国家高新技术企业、ISO9001质量管理体系认证、ISO27001信息安全管理体系认证、五星售后服务认证。然后问客户：\"您现在的供应商，这些证能拿出来吗？\" 这个问题一抛，对方心里就有数了。\n\n3. **讲一个\"翻车案例\"，让客户自己算账**。不用指名道姓，就说：\"去年有个客户，贪便宜选了个小平台，中秋节蛋糕券发出去，结果门店不认，员工炸了锅，HR被领导叫去谈话，最后花了三倍的钱才把事平了。您算算，省那5%的成本，值吗？\" 这种故事比任何数据都有杀伤力。\n\n**核心逻辑就一句话**：工会采购的决策者，要的不是\"最便宜\"，而是\"最安全\"。你把\"安全\"这个价值讲透了，价格就不是问题了。\n\n来源：\n1. 《简述从劳动的供给来看,工会影响工资决定程度的影响因素。 - 链晓得问答》\n2. 《工会对工资的影响集中在( )。 -考呗网》\n3. 《超星尔雅学习通《劳动通论（浙江大学）》2023章节测试答案-7》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 7929, "ttft_ms": 42, "prompt_tokens": 3827, "completion_tokens": 519, "total_tokens": 4346, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.5, "完 **：合规和预算都过了，才轮到\"员工喜不喜欢\"。这时候拿出福多多的数据——根据员工案例库《王菲销售业务分享》（置信度80%），电影通兑卡和蛋糕券是员工满意度最高的福利品类之一。你可以说：\"张主席，预算内我们有两种方案，A方案是纯实物礼包，B方案是观影+蛋糕的组合券，员工自己选。根据我们服务30000家客户的经验，B方案员工满意度能高出30%以上。\"\n\n**一句话总结**：合规是门票，预算画跑道，需求决定你在这条跑道上能跑多快。先解决\"能不能买\"，再解决\"买什么\"。", "rendered": "直接说结论：**工会采购的决策逻辑是\"合规是底线，预算是天花板，需求是突破口\"**，你谈单时顺序不能搞反。\n\n你明天谈工会客户，按这三步走：\n\n1. **先封住合规口**：工会采购最怕审计出问题。开场就亮出福多多的资质——根据产品知识库《公司资质与荣誉》（置信度90%），我们有国家高新技术企业认证、信息安全管理体系认证、五星售后服务认证，20年零诉讼零外债。直接说：\"张主席，我们所有流程都经得起审计，合同、发票、验收单全套合规，您放心。\" 合规问题不解决，后面免谈。\n\n2. **再卡预算线**：工会经费有严格的使用范围和额度限制。别一上来就推高价方案。先问：\"今年人均预算大概在什么范围？\" 然后根据预算倒推方案。比如人均200元，就推年节慰问的200档礼包；人均500元，可以上福利商城+观影的组合。**预算不是限制，是帮你框定选品范围的指南针。**\n\n3. **最后用需求破局**：合规和预算都过了，才轮到\"员工喜不喜欢\"。这时候拿出福多多的数据——根据员工案例库《王菲销售业务分享》（置信度80%），电影通兑卡和蛋糕券是员工满意度最高的福利品类之一。你可以说：\"张主席，预算内我们有两种方案，A方案是纯实物礼包，B方案是观影+蛋糕的组合券，员工自己选。根据我们服务30000家客户的经验，B方案员工满意度能高出30%以上。\"\n\n**一句话总结**：合规是门票，预算画跑道，需求决定你在这条跑道上能跑多快。先解决\"能不能买\"，再解决\"买什么\"。\n\n来源：\n1. 《工会采购制度》\n2. 《物资采购管理办法 (2).pdf-原创力文档》\n3. 《工会内部采购制度管理规定 - 豆丁网》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 6799, "ttft_ms": 15, "prompt_tokens": 3824, "completion_tokens": 386, "total_tokens": 4210, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.8, "完整性 (Completeness) [GEval]": 0.8, "Contextual Recall": 0.2, "Contextual Precision": 1.0, "Contextual Relevancy": 0.5385, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": true, "Contextual Recall": false, "Contextual Precision": true, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": true}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output covers the core facts (compliance, budget, member needs) and is semantically equivalent to the Expected Output, but it adds extensive sales-specific guidance and examples not pre eeds in union procurement. Since there are no irrelevant nodes, the ranking is perfect, and the score cannot be higher.", "Contextual Relevancy": "The score is 0.54 because the retrieval context contains mostly procedural details (e.g., '采购程序的公开', '采购合同的签订') and metadata (e.g., '上传人:遂***') that are irrelevant to how compliance, budget, and member needs jointly influence union procurement, as noted in reasons like '该语句仅为管理办法的引言和目的说明，未直接涉及合规要求、预算限制和成员需求如何共同影响工会采购的具体内容.' However, some statements are relevant, such as '工会采购制度能够控制采购成本' (addressing budget) and '工会的采购活动必须遵守国家的有关法律、法规' (addressing compliance), but none explicitly discuss the joint influence of all three factors.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness. Great job!", "Answer Relevancy": "The score is 1.00 because the actual output contains no irrelevant statements and fully addresses the input question about how compliance requirements, budget constraints, and member needs jointly influence union procurement.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "The actual outcome directly addresses the user's request by providing a structured, actionable sales strategy for union procurement. It covers key points (compliance, budget, member needs) without omission, and the tone is professional and coach-like. The only minor shortfall is that it does not explicitly confirm whether the user's specific question was answered verbatim, but the framework is highly relevant and practical."}}, {"question_id": "golden_0350", "question": "工会四项基本职能及福利角色解析", "reference": "根据上下文，中国工会的四项基本职能是：维护职工权益、动员和组织建设、参与民主管理、教育职工提升素质。在福利方面，工会扮演着“职工娘家人”的角色，负责发放福利、组织活动。", "kb_label": "taishan", "model": "(default)", "answer": "直接给你结论：工会四项职能——维护、建设、参与、教育——每一项都能和福利挂钩，你的核心动作是把福利从\"花钱\"变成\"履行职能的工具\"。\n\n具体怎么用，我拆开说：\n\n**1. 维护职能（最核心的切入点）**\n工会首要 ges, but they do not address the input's focus on imitation and value weakening.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness.", "Answer Relevancy": "The score is 1.00 because the actual output contains no irrelevant statements; it directly and fully addresses the input question about how competitors imitating Fuduoduo would weaken its three core values.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统直接回应用户关于模仿者的问题，提供了具体的、可操作的销售建议（如强调零风险承诺、稳健经营和自营客服的不可复制性），没有遗漏关键信息点，且语气符合专业销售教练的角色。唯一的小扣分在于未明确提及是否使用了工具，但基于知识库的分析已足够完成任务。"}}, {"question_id": "golden_0500", "question": "如果一名新销售连续一个月跳过所有客户跟进复盘，与另一位认真总结每次会议的人相比，他们的成长会有何不同？", "reference": "根据上下文，王菲强调“**如果你见完客户不去复盘，那就等于没见**”。因此，如果一位销售新人一个月都不做复盘，他的成长将远不如坚持复盘的人。因为通过复盘，每一次拜访（无论成功与否）都会变成自己的养分；碰到的问题越多，学习和复盘的东西就越多，积累越多，慢慢就成了专家。而不复盘的人，等于白白浪费了每次见客户的机会，无法将经验转化为信任基础，成长速度会明显滞后。", "kb_label": "taishan", "model": "(default)", "answer": "这问题问得好，但咱不聊虚的。直接说结论：**一个月后，一个还在原地打转，一个已经能独立拿单了。**\n\n你问的\"不同\"，我拆成三个最要命的差距：\n\n1.  **踩坑的\"学费\"交没交到点上**\n    *   不复盘的人：同一个坑连踩十次。比如客户说\"太贵了\"，他每次都硬着头皮解释价格，次次被怼回来。一个月下来，除了挫败感，什么都没攒下。\n    *   认真复盘的人：第一次被怼，他会记下来\"客户说贵，我的回应无效\"。第二次，他会想\"是不是该先问预算？\"第三次，他可能就试出了「先问客户预算范围，再针对性推荐档位」这个有效话术。一个月，他把别人的坑变成了自己的台阶。\n\n2.  **对客户的\"直觉\"准不准**\n    *   不复盘的人：对客户的判断全凭感觉。\"这个客户好像有兴趣\"\"那个客户应该没戏\"，全是模糊的。下次再遇到类似客户，他还是抓瞎。\n    *   认真复盘的人：他会总结出规律。\"上次那个500人的IT公司，HR最关心员工满意度，所以这次我也重点讲福利商城和生日礼遇的个性化选择。\" 一个月下来，他脑子里有了一本\"客户类型手册\"，看一眼公司规模、行业，就知道该往哪个方向聊。根据客户画像库（置信度75%），这种直觉是复盘的直接产物。\n\n3.  **心态是\"越打越虚\"还是\"越打越稳\"**\n    *   不复盘的人：每天像无头苍蝇，被客户拒绝后，除了\"运气不好\"找不到任何解释。一个月，自信心被磨得差不多了。\n    *   认真复盘的人：每次复盘都是一次\"小胜利\"。哪怕单子没成，他也知道\"这次开场白比上次好\"\"这次应对异议比上次快\"。他手里有数据、有方法，底气是实打实的。根据员工案例库（置信度80%），销冠的共性就是\"把失败复盘成经验\"。\n\n**你明天就能做的动作：** 挑你最近最头疼的一次客户沟通，用手机备忘录记三句话：**1. 客户说了什么让我卡住了？ 2. 我当时是怎么回的？ 3. 如果重来一次，我会怎么说？** 就三句话，五分钟的事。坚持一周，你再看效果。", "rendered": "这问题问得好 规定，工会经费的60%留存部分，就是用来给职工搞活动、发福利的，我们正好在这个范围内。”\n\n• **客户说“我们经费紧张，没钱”** —— 追问一句：“您说的经费紧张，是指工会账户余额不够，还是企业整体预算压缩了？” 如果是工会账户余额不够，可以建议客户用企业行政经费（职工福利费）来采购，因为很多企业HR的福利预算和工会经费是两条线，互不冲突。\n\n**一句话总结**：工会经费2%计提，60%留存可用，你的产品正好是合规的支出方向。客户问政策，你讲这个；客户问开票，你确认后回复。别被“经费”两个字吓住，很多企业工会经费花不完，反而需要你帮他们规划怎么合规花出去。\n\n来源：\n1. 《工会经费的计提比例是多少》\n2. 《工会经费的计提比例_律图》\n3. 《工会经费的计提比例_张燕鹏律师律师问答-华律•精选解答》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 8861, "ttft_ms": 21, "prompt_tokens": 3818, "completion_tokens": 504, "total_tokens": 4322, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.5, "完整性 (Completeness) [GEval]": 0.2, "Contextual Recall": 0.5, "Contextual Precision": 1.0, "Contextual Relevancy": 0.7, "Faithfulness": 0.8889, "Answer Relevancy": 0.8462, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": false, "Contextual Recall": true, "Contextual Precision": true, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": true}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output correctly identifies the 2% payroll deduction but incorrectly states the retention ratio as 60% instead of the Expected Output's 50%, which is a factual mismatch. It also adds extensive sales guidance not present in the Expected Output, but this does not compensate for the missing critical point about the 50% retention rule. The output is practically useful for sales but fails to align with the core facts and completeness required by Steps 1 and 2.", "完整性 (Completeness) [GEval]": "The Expected Output specifies that the base rate is 2% of total wages, but the retention rate for the grassroots union is 50%, not 60% as stated in the Actual Output. This is a key factual discrepancy. Additionally, the Expected Output mentions other funding sources such as member dues (5‰), administrative lt)", "answer": "客户问这个，说明他已经在对比了，这是个好信号。别慌，咱们福多多在服务这块是硬实力，直接亮出来就行。\n\n你明天就做的三件事：\n\n1. **一句话定调，把“服务”变成“安全感”**\n   「王总，您问的这个问题很关键。我们服务了3万多家企业，20年零诉讼、零外债，靠的就是两样东西：一是**自营客服团队，7x12小时在线，24小时内极速响应**；二是**零风险承诺**——电影票比猫眼贵，差价三倍赔；蛋糕比官方贵，差价双倍赔；买到假货，假一赔三。这些不是口号，是写进合同里的。您选福利商，选的不就是这份放心吗？」（根据产品知识库《零风险承诺v2.0》《公司介绍文档》，置信度90%）\n   *逻辑：把“服务响应”和“售后保障”打包成“零风险”这个核心价值，直接打消客户对“出了问题找谁、赔不赔”的顾虑。*\n\n2. **用“自营”对比“外包”，一句话戳痛点**\n   「很多平台客服是外包的，出了问题踢皮球。我们400多人的团队，客服、技术、运营全是自营。您员工遇到问题，一个电话或在线消息，我们内部流转解决，不用您HR当传话筒。**您想想，是让员工自己找客服解决省心，还是每次都要您来协调？**」\n   *逻辑：把“服务响应快”翻译成“帮HR省事”，这是企业采购决策者最在意的点。*\n\n3. **准备一个“服务承诺对比表”，但别主动给**\n   客户问到这一步，你心里要有数：咱们的**零风险承诺**（差价赔付、假一赔三、自营客服）是绝大多数竞品做不到的。如果客户追问竞品服务，你就说：\n   「王总，具体竞品的服务条款我不方便评价。但我可以把我们福多多的**服务承诺清单**发给您，您拿这个去对比任何一家，哪家敢把‘差价三倍赔’写进合同，一目了然。」\n   *逻辑：不攻击竞品，但用“可验证的承诺”让客户自己去对比，这叫“让事实说话”。*\n\n**风险提醒**：客户如果要求把“24小时响应”或“差价赔付”写进合同，先别自己拍板，跟法务或你的主管确认一下具体条款的适用范围，避免承诺和实际交付有出入。", "rendered": "客户问这个，说明他已经在对比了，这是个好信号。别慌，咱们福多多在服务这块是硬实力，直接亮出来就行。\n\n你明天就做的三件事：\n\n1. **一句话定调，把“服务”变成“安全感”**\n   「王总，您问的这个问题很关键。我们服务了3万多家企业，20年零诉讼、零外债，靠的就是两样东西：一是**自营客服团队，7x12小时在线，24小时内极速响应**；二是**零风险承诺**——电影票比猫眼贵，差价三倍赔；蛋糕比官方贵，差价双倍赔；买到假货，假一赔三。这些不是口号，是写进合同里的。您选福利商，选的不就是这份放心吗？」（根据产品知识库《零风险承诺v2.0》《公司介绍文档》，置信度90%）\n   *逻辑：把“服务响应”和“售后保障”打包成“零风险”这个核心价值，直接打消客户对“出了问题找谁、赔不赔”的顾虑。*\n\n2. **用“自营”对比“外包”，一句话戳痛点**\n   「很多平台客服是外包的，出了问题踢皮球。我们400多人的团队，客服、技术、运营全是自营。您员工遇到问题，一个电话或在线消息，我们内部流转解决，不用您HR当传话筒。**您想想，是让员工自己找客服解决省心，还是每次都要您来协调？**」\n   *逻辑：把“服务响应快”翻译成“帮HR省事”，这是企业采购决策者最在意的点。*\n\n3. **准备一个“服务承诺对比表”，但别主动给**\n   客户问到这一步，你心里要有数：咱们的**零风险承诺**（差价赔付、假一赔三、自营客服）是绝大多数竞品做不到的。如果客户追问竞品服务，你就说：\n   「王总，具体竞品的服务条款我不方便评价。但我可以把我们福多多的**服务承诺清单**发给您，您拿这个去对比任何一家，哪家敢把‘差价三倍赔’写进合同，一目了然。」\n   *逻辑：不攻击竞品，但用“可验证的承诺”让客户自己去对比，这叫“让事实说话”。*\n\n**风险提醒**：客户如果要求把“24小时响应”或“差价赔付”写进合同，先别自己拍板，跟法务或你的主管确认一下具体条款的适用范围，避免承诺和实际交付有出入。\n\n来源：\n1. 《比较一下淘宝和拼多多在售后服务上的差距 - 今日头条》\n2. 《现在的淘宝和拼多多哪一个平台的客服给客户体验会更好一些?_知乎》\n3. 《对比淘宝和拼多多两个平台_知乎》\n（共 5 条来源）", "task_type": "objection_handling", "risk_level": "none", "sources_count": 5, "latency_ms": 9476, "ttft_ms": 19, "prompt_tok 据《工会法》，企业按每月全部职工工资总额的2%拨缴工会经费，其中60%留基层工会使用，可用于职工福利、文体活动、困难帮扶等。这是工会福利的\"基本盘\"。\n\n2. **企业行政补助**：很多企业会从行政经费或利润中额外拨款，补充工会福利预算。尤其是一些效益好的企业，工会经费不够花，老板愿意再掏钱做员工关怀。这个渠道的金额弹性很大，是你要重点挖掘的增量。\n\n3. **职工个人缴纳**：部分福利项目（如兴趣小组、定制化旅游、高端体检等）会采取\"工会补一点、个人出一点\"的模式。职工自愿缴纳部分费用，工会再补贴一部分。这个渠道金额不大，但能撬动更高价值的福利项目。\n\n4. **上级工会专项拨款**：各级总工会（如省总、市总）会有专项经费，用于支持基层工会开展特定活动，比如\"送清凉\"\"送温暖\"\"职工疗休养\"等。这个渠道有季节性、政策性，金额不固定，但能帮客户\"花小钱办大事\"。\n\n**你明天就能用的动作**：下次跟客户聊预算时，别只盯着\"工会经费\"这一个来源。直接问：\"除了工会经费，公司行政这边有没有额外福利预算？或者上级工会今年有没有专项拨款？\"——这一问，往往能多撬出30%-50%的预算空间。", "rendered": "直接说：工会福利项目的资金来源主要有四个渠道，你记好，跟客户聊的时候能显得你很专业。\n\n1. **工会经费**：这是最核心的来源。根据《工会法》，企业按每月全部职工工资总额的2%拨缴工会经费，其中60%留基层工会使用，可用于职工福利、文体活动、困难帮扶等。这是工会福利的\"基本盘\"。\n\n2. **企业行政补助**：很多企业会从行政经费或利润中额外拨款，补充工会福利预算。尤其是一些效益好的企业，工会经费不够花，老板愿意再掏钱做员工关怀。这个渠道的金额弹性很大，是你要重点挖掘的增量。\n\n3. **职工个人缴纳**：部分福利项目（如兴趣小组、定制化旅游、高端体检等）会采取\"工会补一点、个人出一点\"的模式。职工自愿缴纳部分费用，工会再补贴一部分。这个渠道金额不大，但能撬动更高价值的福利项目。\n\n4. **上级工会专项拨款**：各级总工会（如省总、市总）会有专项经费，用于支持基层工会开展特定活动，比如\"送清凉\"\"送温暖\"\"职工疗休养\"等。这个渠道有季节性、政策性，金额不固定，但能帮客户\"花小钱办大事\"。\n\n**你明天就能用的动作**：下次跟客户聊预算时，别只盯着\"工会经费\"这一个来源。直接问：\"除了工会经费，公司行政这边有没有额外福利预算？或者上级工会今年有没有专项拨款？\"——这一问，往往能多撬出30%-50%的预算空间。\n\n来源：\n1. 《[方案]工会经费及福利费相关政策 - 豆丁网》\n2. 《工会经费来源及列支一览表 - 豆丁网》\n3. 《工会经费的来源有()。A.人民群众的捐助B.国家财政拨款C.工会会员缴纳的会费D.建立工会组织的全民 - 链晓得问答》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 6694, "ttft_ms": 26, "prompt_tokens": 3818, "completion_tokens": 340, "total_tokens": 4158, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.8, "完整性 (Completeness) [GEval]": 0.8, "Contextual Recall": 0.75, "Contextual Precision": 1.0, "Contextual Relevancy": 0.5862, "Faithfulness": 0.8571, "Answer Relevancy": 0.8696, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.3}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": true, "Contextual Recall": true, "Contextual Precision": true, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": false}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output covers all four funding sources (工会经费, 企业行政补助, 职工个人缴纳, 上级工会专项拨款) which are semantically equivalent to the Expected Output's four sources, though the percentage for 工会经费 differs (60% vs 50% retained) and 职工个人缴纳 is described as voluntary rather than mandatory 千分之五. The response is complete and highly actionable for sales scenarios, with specific questioning tactics. Minor factual discrepancy in the retention rate and the nature of member contributions prevents full alignment.", "完整性 (Completeness) [GEval]": "The actual output covers three of the four key points from the expected output: it mentions '工会经费' (unit allocation of 2% of total wages, though it says 60% stays at the grassroots level instead of 50% returned by the provincial federation), '企业行政补助' (unit administrative subsidy), and '上级工会专项拨款' (higher-level union subsidies). However, it omits the fourth key point: '会员个人缴纳会费' (members' personal dues at 0.5% of basic salary). This missing point is a distinct funding source in the expected output and is not minor, as it represents a separate channel. The actual output also includes an extra point about '职工个人缴纳' for specific projects, which is not the same as the mandatory membership dues. Therefore, one important point is missing, leading to a score in the 0.7–0.9 range.", "Contextual Recall": "The score is 0.75 because the retrieval context supports three out of four funding sources: node(s) in retrieval context 1 covers unit-allocated union funds and member dues (sentences 1 and 2), and node 2 covers subsidies from higher-level unions (sentence 4). However, no node mentions '单位行政补助' (administrative subsidies) from sentence 3, leading to a deduction.", "Contextual Precision": "The score is 1.00 because all relevant nodes (nodes 1, 2, and 3) are ranked higher than all irrelevant nodes (nodes 4 and 5). The first three nodes each contain information about funding sources 累量变的关键。这种学习更贴近日常，能即时解决具体问题。\n\n两者结合，既能通过榜样获得精神动力，又能通过同事学习积累实战经验，共同支撑新人度过新手期。", "kb_label": "taishan", "model": "(default)", "answer": "直接说结论：**先找相似成功榜样，再向同事学习，顺序不能反。**\n\n新人最容易踩的坑是——到处问\"怎么做\"，结果信息太多反而乱了。我给你拆成两步走：\n\n**第一步：找相似成功榜样（先解决\"方向\"问题）**\n- 找一个和你背景、客户类型、产品线最像的销冠。比如你主攻工会客户，就找工会线做得最好的那个。\n- **好处**：你能看到\"同样起点的人怎么跑通的\"，路径可复制，不会觉得\"人家有资源我学不来\"。\n- **动作**：明天就去问这个榜样三个问题——\"你第一个单怎么签的？客户最常卡在哪？你用什么话术破的？\"\n\n**第二步：向同事学习（再解决\"细节\"问题）**\n- 等方向明确了，再广泛吸收不同同事的实战技巧。比如A同事的破冰话术、B同事的异议处理、C同事的跟进节奏。\n- **好处**：避免\"学了一堆用不上\"，因为你有自己的框架了，能判断哪些技巧适合你。\n- **动作**：每周挑一个同事，跟单或复盘，记下他处理某个环节的具体动作，然后下周一就用上。\n\n**一句话总结**：先找榜样定方向，再向同事学细节。别反过来，否则你只会越学越乱。", "rendered": "直接说结论：**先找相似成功榜样，再向同事学习，顺序不能反。**\n\n新人最容易踩的坑是——到处问\"怎么做\"，结果信息太多反而乱了。我给你拆成两步走：\n\n**第一步：找相似成功榜样（先解决\"方向\"问题）**\n- 找一个和你背景、客户类型、产品线最像的销冠。比如你主攻工会客户，就找工会线做得最好的那个。\n- **好处**：你能看到\"同样起点的人怎么跑通的\"，路径可复制，不会觉得\"人家有资源我学不来\"。\n- **动作**：明天就去问这个榜样三个问题——\"你第一个单怎么签的？客户最常卡在哪？你用什么话术破的？\"\n\n**第二步：向同事学习（再解决\"细节\"问题）**\n- 等方向明确了，再广泛吸收不同同事的实战技巧。比如A同事的破冰话术、B同事的异议处理、C同事的跟进节奏。\n- **好处**：避免\"学了一堆用不上\"，因为你有自己的框架了，能判断哪些技巧适合你。\n- **动作**：每周挑一个同事，跟单或复盘，记下他处理某个环节的具体动作，然后下周一就用上。\n\n**一句话总结**：先找榜样定方向，再向同事学细节。别反过来，否则你只会越学越乱。\n\n来源：\n1. 《销售新人必看的经验分享!_职Q!》\n2. 《作为销售同行,你有哪些建议或者话,想对销售新手说的 ?_知乎》\n3. 《销售新手应该这样做,才能快速提高!_职Q!》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 5903, "ttft_ms": 26, "prompt_tokens": 3831, "completion_tokens": 292, "total_tokens": 4123, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.3, "完整性 (Completeness) [GEval]": 0.4, "Contextual Recall": 0.25, "Contextual Precision": 0.0, "Contextual Relevancy": 0.3846, "Faithfulness": 1.0, "Answer Relevancy": 0.9286, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": false, "Contextual Recall": false, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Co             </div>`;
        });
        html += '</div>';
    });
    container.innerHTML = html;
}

// ── Question Table ──
let currentSort = {col: 'question_id', asc: true};
let expandedRows = new Set();
let expandedAnswers = new Set();

function sortResults(col, asc) {
    return [...RESULTS].sort((a,b) => {
        let va = a[col] ?? '', vb = b[col] ?? '';
        if (col === 'latency_ms' || col === 'sources_count' || col === 'total_tokens') {
            va = Number(va); vb = Number(vb);
        }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return asc ? -1 : 1;
        if (va > vb) return asc ? 1 : -1;
        return 0;
    });
}

function getPassStatus(r) {
    if (r.error) return 'error';
    if (!r.metric_success || Object.keys(r.metric_success).length === 0) return 'na';
    const vals = Object.values(r.metric_success);
    if (vals.every(v => v)) return 'pass';
    if (vals.some(v => v)) return 'partial';
    return 'fail';
}

const PAGE_SIZE = 50;
let currentPage = 1;

function goPage(n) { currentPage = n; renderTable(); window.scrollTo(0, 300); }

function renderTable() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const kbFilter = document.getElementById('kb-filter').value;
    const scoreFilter = document.getElementById('score-filter').value;

    const taskFilter = document.getElementById('task-filter').value;

    let filtered = RESULTS.filter(r => {
        if (kbFilter !== 'all' && r.kb_label !== kbFilter) return false;
        if (taskFilter !== 'all' && (r.task_type||'') !== taskFilter) return false;
        const status = getPassStatus(r);
        if (scoreFilter !== 'all' && status !== scoreFilter) return false;
        if (search && !(r.question||'').toLowerCase().includes(search) && !(r.question_id||'').toLowerCase().includes(search)) return false;
        return true;
    });

    filtered = sortResults(currentSort.col, currentSort.asc).filter(r => filtered.includes(r));

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const pageItems = filtered.slice((currentPage-1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    document.getElementById('result-count').innerHTML = `显示 ${filtered.length} / ${RESULTS.length} 条` +
        (totalPages > 1 ? ` | 第 ${currentPage}/${totalPages} 页` +
        ` <button onclick="goPage(1)" ${currentPage<=1?'disabled':''}>«</button>` +
        ` <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>` +
        ` <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>` +
        ` <button onclick="goPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>` : '');

    // KB filter options
    const kbSelect = document.getElementById('kb-filter');
    if (kbSelect.options.length <= 1) {
        kbSelect.innerHTML = '<option value="all">全部 KB</option>' + KB_LIST.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // Task type filter options
    const taskSelect = document.getElementById('task-filter');
    if (taskSelect.options.length <= 1) {
        const types = [...new Set(RESULTS.map(r => r.task_type || '(空)'))].sort();
        taskSelect.innerHTML = '<option value="all">全部任务类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // Headers
    const cols = ['question_id','kb_label','question','task_type','latency_ms','ttft_ms','total_tokens','risk_level'];
    const thead = document.querySelector('#q-table thead');
    thead.innerHTML = `<tr>
        ${cols.map(c => {
            const labels = {question_id:'ID',kb_label:'KB',question:'问题',task_type:'任务类型',latency_ms:'延迟',ttft_ms:'TTFT',total_tokens:'Token',risk_level:'风险'};
            const sorted = currentSort.col === c ? ' sorted' : '';
            const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '↕';
            return `<th class="${sorted}" onclick="currentSort={col:'${c}',asc:currentSort.col==='${c}'?!currentSort.asc:true};renderTable()">${labels[c]||c} <span class="sort-icon">${arrow}</span></th>`;
        }).join('')}
        ${METRIC_NAMES.map(m => `<th onclick="currentSort={col:'${m}',asc:currentSort.col==='${m}'?!currentSort.asc:true};renderTable()">${m} <span class="sort-icon">↕</span></th>`).join('')}
        <th>状态</th>
    </tr>`;

    // Rows
    const tbody = document.querySelector('#q-table tbody');
    tbody.innerHTML = pageItems.map((r, i) => {
        const status = getPassStatus(r);
        const statusIcon = {pass:'✅',partial:'⚠️',fail:'❌',error:'💥',na:'—'}[status] || '—';
        const qid = r.question_id || '';
        const qText = (r.question || '').substring(0, 80);
        const isExpanded = expandedRows.has(qid + r.kb_label);

        const ttft = r.ttft_ms ? r.ttft_ms + 'ms' : '—';
        const tok = r.total_tokens ? (r.prompt_tokens||0)+'/'+(r.completion_tokens||0)+'/'+(r.total_tokens||0) : '—';

        let row = `<tr>
            <td>${qid}</td>
            <td>${r.kb_label||''}</td>
            <td class="q-text ${isExpanded?'expanded':''}" onclick="toggleExpand('${qid}','${r.kb_label}')" title="${(r.question||'').replace(/"/g,'&quot;')}">${isExpanded ? (r.question||'') : qText}</td>
            <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
