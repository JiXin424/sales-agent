# CI/CD 基础设施(仅私有 Registry)
# 与应用 docker-compose.yml 分离,独立生命周期。
# 启动: cd infra && docker compose -f cicd-compose.yml up -d
#
# 2026-06-26:本机(开发机 172.25.186.209)的 Gitea + gitea-runner.service(act_runner)
# 已移除。本机是主控 47.120.55.219 的闲置副本,CI 统一走主控 Gitea(push 到 main 自动
# 触发),本机生产容器也从主控 registry 拉镜像(registry.internal→172.25.186.210)。
# 故本机不再需要 Gitea/runner,只保留本 registry(切勿 `docker compose down` 误删它)。
#
# ⚠️ 端口/绑定必须与实际运行容器一致(否则 `up -d` 会重建)。当前运行态:registry=0.0.0.0:5000。
#
# 安全说明:
#   - registry 绑 0.0.0.0:5000:可能被同 VPC 私网/公网多来源访问。
#     靠 htpasswd basic auth + 阿里云安全组/ufw 放行把关。

services:
  registry:
    image: registry:2
    container_name: sales-agent-registry
    restart: unless-stopped
    ports:
      # 绑所有网卡:三来源(本机/同 VPC 私网/杭州公网)都要能连
      - "0.0.0.0:5000:5000"
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Sales-Agent Registry
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    volumes:
      - ./htpasswd:/auth/htpasswd:ro
      - registry-data:/var/lib/registry

volumes:
  registry-data:
