.bar-chart{margin:16px 0}

.bar-label{width:140px;font-size:13px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toolbar select{min-width:140px}

.q-table th.sorted .sort-icon{opacity:1}
.q-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.q-table tr:hover{background:#f8fafc}
.q-table .q-text{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.q-table .q-text.expanded{white-space:normal;max-width:none}
.q-table .a-text{max-width:400px;max-height:80px;overflow:hidden;cursor:pointer;color:#555;font-size:12px}
.q-table .a-text.expanded{max-height:none}

？是直接聊福利痛点，还是先拉家常？\n   • 他遇到“价格贵”这种异议时，回应的第一句话是什么？\n   • **明天就约他喝杯咖啡，直接问：“你上个月那单XX客户，你是怎么让他从犹豫到签单的？”** 别问大道理，就问具体场景。\n\n2. **会后反思用“三问法”**\n   • 今天哪件事我做对了？（哪怕只是客户多聊了5分钟，也要记下来）\n   • 今天哪件事我本可以做得更好？（比如客户说“考虑一下”，我是不是没追问具体顾虑？）\n   • 明天我改哪一个动作？（只改一个，比如“明天所有电话开场先问预算，再介绍产品”）\n   • **别写长篇日记，就写在手机备忘录里，每条不超过50字。**\n\n3. **把模仿变成习惯**\n   • 选一个你佩服的同事，连续一周，每天跟他学一个具体动作（比如他的开场白、他跟进客户的时间点）。\n   • 每周五下午，花15分钟翻翻你这周的“三问”记录，看看自己改进了几个动作。\n\n**记住：销售业绩不是靠“想”提升的，是靠“改”提升的。** 你明天先做第一件事——约那个同事喝咖啡。", "rendered": "**你明天就做三件事：拆解、复制、复盘。**\n\n模仿成功同事不是照搬话术，而是拆解他的**动作逻辑**。会后反思不是写日记，而是**找差距、定动作**。\n\n具体来说：\n\n1. **拆解成功同事的三个关键动作**\n   • 他每周拜访多少客户？电话量多少？跟进频率是几天一次？\n   • 他第一次见客户，开场白怎么说的？是直接聊福利痛点，还是先拉家常？\n   • 他遇到“价格贵”这种异议时，回应的第一句话是什么？\n   • **明天就约他喝杯咖啡，直接问：“你上个月那单XX客户，你是怎么让他从犹豫到签单的？”** 别问大道理，就问具体场景。\n\n2. **会后反思用“三问法”**\n   • 今天哪件事我做对了？（哪怕只是客户多聊了5分钟，也要记下来）\n   • 今天哪件事我本可以做得更好？（比如客户说“考虑一下”，我是不是没追问具体顾虑？）\n   • 明天我改哪一个动作？（只改一个，比如“明天所有电话开场先问预算，再介绍产品”）\n   • **别写长篇日记，就写在手机备忘录里，每条不超过50字。**\n\n3. **把模仿变成习惯**\n   • 选一个你佩服的同事，连续一周，每天跟他学一个具体动作（比如他的开场白、他跟进客户的时间点）。\n   • 每周五下午，花15分钟翻翻你这周的“三问”记录，看看自己改进了几个动作。\n\n**记住：销售业绩不是靠“想”提升的，是靠“改”提升的。** 你明天先做第一件事——约那个同事喝咖啡。\n\n来源：\n1. 《你想学:成功的销售经验要怎样复制? - 今日头条》\n2. 《复制销售精英,倍增团队业绩! - 东亨(石家庄)企业管理咨询有限公司》\n3. 《工作总结的案例学习与借鉴.docx_咨信网zixin.com.cn》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 5678, "ttft_ms": 4, "prompt_tokens": 3822, "completion_tokens": 375, "total_tokens": 4197, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.2, "完整性 (Completeness) [GEval]": 0.1, "Contextual Recall": 0.0, "Contextual Precision": 0.95, "Contextual Relevancy": 0.8929, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": false, "Contextual Recall": false, "Contextual Precision": true, "Contextual Relevancy": true, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Com b_label": "taishan", "model": "(default)", "answer": "皮划艇和龙舟赛在培养团队意识上，核心差异在于**协作模式**和**角色分工**。你问这个问题，是想用在跟企业HR或工会沟通福利活动时的场景里吧？如果是，我给你一个能直接用的对比逻辑。\n\n**核心结论：龙舟赛是“强同步、高仪式感”的团队熔炼，皮划艇是“灵活配合、个人与团队平衡”的协作训练。**\n\n具体来说，三个关键差异点：\n\n1.  **协作模式不同**\n    -   **龙舟赛**：要求全员**绝对同步**。所有人的动作、节奏、发力点必须完全一致，一个人乱桨就会影响整船速度。这培养的是**无条件服从与高度纪律性**，适合强调执行力、步调一致的团队。\n    -   **皮划艇**：更强调**动态配合**。双人艇或多人艇需要根据水流、风向实时调整划桨节奏和方向，考验的是**即时沟通与灵活补位**。适合需要快速响应、跨部门协作的团队。\n\n2.  **角色与责任感知不同**\n    -   **龙舟赛**：角色固定（鼓手、舵手、划手），责任清晰。鼓手是“指挥中枢”，舵手是“方向把控”，划手是“执行单元”。这能强化**层级分工与责任归属感**。\n    -   **皮划艇**：角色相对模糊，尤其是双人艇，需要两人共同决策方向和节奏。这能培养**平等参与感和共同决策能力**，每个人都是“副船长”。\n\n3.  **心理体验与团队凝聚力触发点不同**\n    -   **龙舟赛**：**仪式感极强**。鼓声、口号、冲刺时的集体呐喊，能快速激发**集体荣誉感和归属感**，特别适合新团队破冰或年度团建，形成“我们是一个整体”的强烈记忆。\n    -   **皮划艇**：**沉浸感与信任感更强**。在水面上，你需要完全信任队友的配合，尤其是遇到急流或转弯时。这种**基于信任的协作**，更适合需要解决内部信任问题或提升默契度的成熟团队。\n\n**给你的销售动作建议：**\n\n下次跟客户聊团建福利时，别只说“我们有龙舟和皮划艇活动”。直接问：“您团队目前最需要解决的是**执行力统一**，还是**跨部门协作的默契**？”\n\n-   如果对方说“执行力”，你就推**龙舟赛**，话术：“龙舟赛是‘一个声音、一个节奏’，特别适合帮新团队快速建立统一标准，或者帮老团队打破部门墙。”\n-   如果对方说“协作默契”，你就推**皮划艇**，话术：“皮划艇是‘两人一条心’，能逼着他们实时沟通、互相补位，比开十次跨部门会议都管用。”\n\n这样，你卖的不是活动，是**解决团队痛点的方案**。", "rendered": "皮划艇和龙舟赛在培养团队意识上，核心差异在于**协作模式**和**角色分工**。你问这个问题，是想用在跟企业HR或工会沟通福利活动时的场景里吧？如果是，我给你一个能直接用的对比逻辑。\n\n**核心结论：龙舟赛是“强同步、高仪式感”的团队熔炼，皮划艇是“灵活配合、个人与团队平衡”的协作训练。**\n\n具体来说，三个关键差异点：\n\n1.  **协作模式不同**\n    -   **龙舟赛**：要求全员**绝对同步**。所有人的动作、节奏、发力点必须完全一致，一个人乱桨就会影响整船速度。这培养的是**无条件服从与高度纪律性**，适合强调执行力、步调一致的团队。\n    -   **皮划艇**：更强调**动态配合**。双人艇或多人艇需要根据水流、风向实时调整划桨节奏和方向，考验的是**即时沟通与灵活补位**。适合需要快速响应、跨部门协作的团队。\n\n2.  **角色与责任感知不同**\n    -   **龙舟赛**：角色固定（鼓手、舵手、划手），责任清晰。鼓手是“指挥中枢”，舵手是“方向把控”，划手是“执行单元”。这能强化**层级分工与责任归属感**。\n    -   **皮划艇**：角色相对模糊，尤其是双人艇，需要两人共同决策方向和节奏。这能培养**平等参与感和共同决策能力**，每个人都是“副船长”。\n\n3.  **心理体验与团队凝聚力触发点不同**\n    -   **龙舟赛**：**仪式感极强**。鼓声、口号、冲刺时的集体呐喊，能快速激发**集体荣誉感和归属感**，特别适合新团队破冰或年度团建，形成“我们是一个整体”的强烈记忆。\n    -   **皮划艇**：**沉浸感与信任感更强**。在水面上，你需要完全信任队友的配合，尤其是遇到急流或转弯时。这种**基于信任的协作**，更适合需要解决内部信任问题或提升默契度的成熟团队。\n\n**给你的销售动作建议：**\n\n下次跟客户聊团建福利时，别只说“我们有龙舟和皮划艇活动”。直接问：“您团队目前最需要解决的是**执行力统一**， ference": "若竞争对手试图模仿福多多的三大核心价值，其优势将被显著削弱：\n\n1. **稳定可靠**：福多多拥有20年稳健经营、零外债零诉讼的信用记录，以及核心团队超10年的稳定性，这些是长期积累的信任资产，竞争对手难以短期复制。模仿者若缺乏同等历史积淀，客户对其“承诺即做到”的信任度会大打折扣。\n\n2. **实际购买力领先**：福多多的购买力优势源于与供应商的深度合作和规模效应，而非单纯补贴。竞争对手若仅靠价格战模仿，可能陷入亏损或牺牲服务质量，反而无法持续提供同等性价比。\n\n3. **高品质服务**：福多多基于服务30000+企业客户的经验，形成了成熟的售后体系和客户洞察。模仿者若缺乏类似经验积累，其服务流程和响应能力将难以达到同等水平，客户体验必然下降。\n\n综上，福多多的三大价值支柱根植于20年的行业深耕与信用记录，竞争对手的模仿只能触及表面，无法真正削弱其核心差异化优势。", "kb_label": "taishan", "model": "(default)", "answer": "这个问题问得挺有深度，说明你在思考福多多的长期竞争力。直接说结论：**福多多的三大核心价值——规模效应、零风险承诺、20年信任——不是靠一个点子，而是靠时间、数据和真金白银砸出来的护城河，竞争对手模仿得了皮毛，模仿不了根基。**\n\n具体来说，模仿者会在这三方面被削弱：\n\n**1. 规模效应：模仿者没有“量”，成本根本压不下来**\n\n福多多覆盖全国14000+影院、75000+蛋糕门店、30万+商品资源（根据产品知识库《五大业务板块介绍》，置信度90%）。这个体量意味着什么？意味着跟供应商谈价格时，福多多有绝对的话语权。\n\n• **模仿者的问题**：他们可能也去谈“电影通兑”“蛋糕券”，但订单量不够，供应商凭什么给他底价？他拿到的成本价可能比福多多的零售价还高。最终要么自己亏本卖，要么把高价转嫁给客户。\n• **你的话术**：「王总，您说的对，市面上确实有类似的产品。但福利采购不是买一件两件，是几百上千人的事。福多多能做到电影票不高于猫眼零售价、蛋糕不高于官方正价，是因为我们一年几千万张的采购量。小平台拿不到这个价格，最后要么服务缩水，要么价格虚高，吃亏的还是员工。」\n\n**2. 零风险承诺：模仿者不敢“兜底”，一赔就破产**\n\n福多多的零风险承诺是写在合同里的：正品假一赔三、蛋糕差价双倍赔付、电影票差价三倍赔付（根据产品知识库《零风险承诺v2.0》，置信度90%）。这背后是20年零诉讼、零外债的底气，以及自营客服团队7*12h在线的服务能力。\n\n• **模仿者的问题**：他们敢承诺“假一赔三”吗？敢承诺“差价双倍赔”吗？一旦出问题，赔偿金额可能直接吃掉他们一年的利润。所以他们只能口头说“放心”，但不敢写进合同。\n• **你的话术**：「李总，很多小平台也说自己有电影票、有蛋糕，但您问他们一句‘敢不敢把差价双倍赔付写进合同’，他们就不吭声了。福多多敢，因为我们20年没出过一单纠纷。您选福利供应商，选的是省心，不是选一个可能让您去处理投诉的麻烦。」\n\n**3. 20年信任：模仿者没有“历史”，客户不敢托付**\n\n福多多服务超30000家企业，覆盖2000万员工，实缴注册资本3000万，20年稳健经营（根据产品知识库《公司介绍》，置信度90%）。对于HR和工会来说，选福利供应商最怕的就是“公司跑路、员工投诉”。\n\n• **模仿者的问题**：一个新公司，哪怕产品做得再像，HR敢把全公司几百号人的福利交给他吗？万一明年公司没了，员工手里的券找谁兑？这个信任成本，模仿者永远补不上。\n• **你的话术**：「张总，选福利供应商不是选淘宝店，今天开明天关。福多多做了20年，服务了3万多家企业，实缴资本3000万，零外债。您把福利交给我们，等于给自己上了一道保险。那些新公司，您敢把全公司员工的蛋糕、电影票都押在他身上吗？」\n\n**总结一下你明天就能用的动作：**\n\n下次客户说“别家也有类似的”，你就抓住这三点反问：\n1. **“他敢把‘差价双倍赔’写进合同吗？”** —— 逼对方亮出零风险承诺。\n2. **“他服务过多少家企业？做了多少年？”** —— 用20年历史碾压。\n3. **“他的电影票能保证比猫眼便宜吗？”** —— 用规模效应堵住价格漏洞。\n\n**风险提醒**：以上话术涉及的价格承诺和零风险条款，具体执行细节（如赔付流程、适用范围）建议你签合同前跟公司确认最新政策，确保跟客户说的和实际能兑现的一致。", "rendered": "这个问题问得挺有深度，说明你在思考福多多的长期竞争力。直接说结论：**福多多的三大核心价值——规模效应、零风险承诺、20年信任— 的手机。不如白天水上乐园（我们景点门票覆盖600+城市），晚上包个影院看个喜剧片，大家笑一笑，一天的疲惫全消，团队感情自然升温。\" 核心卖点：**场景互补、全天候体验、情绪价值**。\n\n**背后的逻辑：**\n团队凝聚力的本质是\"共同经历\"。HR花大价钱搞拓展、搞聚餐，最后大家记住的往往是\"一起吐槽\"而不是\"一起成长\"。电影天然具备\"共同情绪体验\"——一起笑、一起哭、一起讨论，这种连接感是吃饭喝酒替代不了的。你帮HR算清楚这笔账，他就不会只把你当\"发券的\"。\n\n**如果客户追问\"怎么落地\"**，你就说：\"我可以给你出一份完整的团建方案模板，包含活动流程、预算测算、员工反馈收集表，你拿去直接能用。\" 这句话一出口，你就从供应商变成了合作伙伴。", "rendered": "直接给结论：**把\"看电影\"从\"发券\"升级成\"活动载体\"，你就从卖福利的变成了帮HR做团建的顾问。**\n\n你提到的\"常规、大型、水上活动\"其实对应的是企业团建场景，HR最头疼的不是预算，而是\"花了钱大家还不满意\"。你的切入点不是卖电影票，而是帮HR设计一套\"低成本、高参与、易组织\"的团建方案。\n\n**明天就做的三件事：**\n\n1. **针对\"常规团建\"（月度/季度）**：推\"主题观影+包场\"方案。话术：\"张总，你们团队聚餐每次人均200，大家吃完了各回各家。换成包场看电影，人均50-80，看完电影组织个15分钟分享会，每人讲一句电影里最有感触的话，团队氛围瞬间拉满。成本降一半，效果翻一倍。\" 核心卖点：**低成本、高话题性、易组织**。\n\n2. **针对\"大型活动\"（年会/周年庆）**：推\"电影票+定制券面\"方案。话术：\"你们年会抽奖，发个保温杯大家拿回家吃灰。换成电影通兑券，券面印上公司logo和祝福语，员工带家人去看，等于帮公司做了一次家庭层面的品牌传播。而且我们支持全国14000+影院通兑，外地分公司也能用。\" 核心卖点：**仪式感、覆盖广、可定制**。\n\n3. **针对\"水上活动\"（夏季/户外）**：推\"景点门票+观影\"组合方案。话术：\"你们组织水上乐园团建，员工玩一天累得不行，晚上回酒店各玩各的手机。不如白天水上乐园（我们景点门票覆盖600+城市），晚上包个影院看个喜剧片，大家笑一笑，一天的疲惫全消，团队感情自然升温。\" 核心卖点：**场景互补、全天候体验、情绪价值**。\n\n**背后的逻辑：**\n团队凝聚力的本质是\"共同经历\"。HR花大价钱搞拓展、搞聚餐，最后大家记住的往往是\"一起吐槽\"而不是\"一起成长\"。电影天然具备\"共同情绪体验\"——一起笑、一起哭、一起讨论，这种连接感是吃饭喝酒替代不了的。你帮HR算清楚这笔账，他就不会只把你当\"发券的\"。\n\n**如果客户追问\"怎么落地\"**，你就说：\"我可以给你出一份完整的团建方案模板，包含活动流程、预算测算、员工反馈收集表，你拿去直接能用。\" 这句话一出口，你就从供应商变成了合作伙伴。\n\n来源：\n1. 《公司活动组织指南：让团队互动，增进凝聚力》\n2. 《沙滩团建活动方案.pptx_淘豆网》\n3. 《如何通过团队建设活动提升团队凝聚力?-银行频道-和讯网》\n（共 4 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 4, "latency_ms": 9197, "ttft_ms": 53, "prompt_tokens": 3824, "completion_tokens": 549, "total_tokens": 4373, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.0, "完整性 (Completeness) [GEval]": 0.0, "Contextual Recall": 0.0, "Contextual Precision": 0.0, "Contextual Relevancy": 1.0, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.9}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": false, "Contextual Recall": false, "C ince no relevant nodes exist, the ranking of relevant nodes higher than irrelevant nodes is impossible, resulting in the lowest score.", "Contextual Relevancy": "The score is 1.00 because the retrieval context is entirely relevant to the input, which asks about how conventional, large-scale, and water activities enhance team cohesion and communication. The context includes specific relevant statements such as '沙滩接力赛...培养团队合作精神', '沙滩拔河比赛...增强团队凝聚力和协作能力', and '户外拓展训练...增强信任、协作、应变和沟通能力', directly addressing the input's focus on team activities and communication improvement.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, showing excellent faithfulness. Great job!", "Answer Relevancy": "The score is 1.00 because the actual output directly and comprehensively addresses the input's request to compare conventional, large-scale, and water activities in enhancing team cohesion and communication, with no irrelevant statements detected.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统直接回应用户请求，提供了三种具体可操作的团建方案（常规团建、大型活动、水上活动），并阐述了电影作为共同经历的价值，符合专业销售教练的角色。但未明确提及是否完全覆盖用户问题中的所有关键信息点，因此给予0.9分。"}}, {"question_id": "golden_0421", "question": "Compare 网票福多多 vs 竞争对手在服务响应与售后保障上的差异。", "reference": "根据上下文，网票福多多与竞争对手在服务响应与售后保障上的核心差异如下：\n\n- **服务响应**：网票福多多拥有自营客服团队，被充分授权，提供快速响应和定制化方案支持，确保问题当天闭环；而竞争对手常出现售后服务难以保障、推诿严重的问题。\n- **售后保障**：网票福多多提供多重补偿与书面承诺，包括正品授权、差价赔付、兑换可靠性、合同零风险等，即使出现问题也能兜底，采购无需背锅；竞争对手则存在承诺与实际体验不一致、平台经营稳定性存疑等风险。\n\n简言之，网票福多多以“高品质运营及售后服务”让采购省心、员工满意，而竞争对手在响应速度和保障力度上明显不足。", "kb_label": "taishan", "model": "(default)", "answer": "这问题问得好，客户拿服务响应和售后保障来比，说明他们心里有杆秤，想找个靠谱的长期伙伴。别慌，咱们的优势很硬，直接亮出来。\n\n**第一句话：客户比服务，你就把“零风险”和“自营客服”这两张王牌拍在桌上。**\n\n客户真正担心的不是“谁家客服回得快”，而是“出了问题谁兜底、多久能解决”。咱们的核心差异点就两个：**零风险承诺**和**自营客服团队**。\n\n给你三个切入角度，直接拿去用：\n\n**角度一：用“零风险承诺”打“信任牌”**\n「王总，您问服务保障，我直接跟您说最核心的——我们敢承诺“零风险”。电影票比猫眼零售价贵，差价三倍赔；蛋糕比官方正价贵，差价双倍赔；所有商品假一赔三。这不是口号，是写进合同里的。您想想，哪个福利供应商敢把这种承诺白纸黑字写出来？我们敢，因为我们20年零诉讼、零外债，底气在这儿。」\n*逻辑：客户比服务，本质是比“谁更靠谱”。零风险承诺直接把信任成本降到最低，让HR不用为售后问题背锅。*\n\n**角度二：用“自营客服”打“响应牌”**\n「很多同行客服是外包的，您找他们得排队，问题转来转去。我们不一样，400多人的自营客服团队，7x12小时在线，24小时内极速响应。您员工遇到问题，一个电话或在线消息，我们自己的客服直接处理，不用跟第三方扯皮。这对HR来说，省心太多了。」\n*逻辑：客户关心的是“出了问题我找谁、多久能解决”。自营客服意味着可控、高效，对比外包客服的“踢皮球”体验，优势一目了然。*\n\n**角度三：用“20年稳健经营”打“安全牌”**\n「王总，服务保障说到底看的是公司的底子。我们2005年成立，实缴注册资本3000万，国家高新技术企业，信息安全管理、质量管理、五星售后服务这些资质全齐。您选福利供应商，最怕的就是公司不稳定、服务断档。我们20年稳扎稳打，就是您最安全的选择。」\n*逻辑：对于企业HR，选供应商是“零风险”决策。强调公司的资质和经营年限，就是告诉他们：选我们，你没有任何后顾之忧。*\n\n**风险提醒：** 跟客户聊服务保障时，别主动去贬低任何一家竞品，只说咱们自己的优势。如果客户非要你评价竞品，你就说“每家各有特点，我重点给您讲讲我们福多多是怎么做的”，然后回到上面三个角度。", "rendered": "这问题问得好，客户拿服务响应和售后保障来比，说明他们心里有杆秤，想找个靠谱的长期伙伴。别慌，咱们的优势很硬，直接亮出来。\n\n**第一句话：客户比服务，你就把“零风险”和“自营客服”这两张王牌拍在桌上。**\n\n客户真正担心的不是“谁家客服回得快”，而是“出了问题谁兜底、多久能解决”。咱们的核心差异点就两个：**零风险承诺**和**自营客服团队**。\n\n给你三个切入角度，直接拿去用：\n\n**角度一：用“零风险承诺”打“信任牌”**\n「王总，您问服务保障，我直接跟您说最核心的——我们敢承诺“零风险”。电影票比猫眼零售价贵，差价三倍赔；蛋糕比官方正价贵，差价双倍赔；所有商品假一赔三。这不是口号，是写进合同里的。您想想，哪个福利供应商敢把这种承诺白纸黑字写出来？我们敢，因为我们20年零诉讼、零外债，底气在这儿。」\n*逻辑：客户比服务，本质是比“谁更靠谱”。零风险承诺直接把信任成本降到最低，让HR不用为售后问题背锅。*\n\n**角度二：用“自营客服”打“响应牌”**\n「很多同行客服是外包的，您找他们得排队，问题转来转去。我们不一样，400多人的自营客服团队，7x12小时在线，24小时内极速响应。您员工遇到问题，一个电话或在线消息，我们自己的客服直接处理，不用跟第三方扯皮。这对HR来说，省心太多了。」\n*逻辑：客户关心的是“出了问题我找谁、多久能解决”。自营客服意味着可控、高效，对比外包客服的“踢皮球”体验，优势一目了然。*\n\n**角度三：用“20年稳健经营”打“安全牌”**\n「王总，服务保障说到底看的是公司的底子。我们2005年成立，实缴注册资本3000万，国家高新技术企业，信息安全管理、质量管理、五星售后服务这些资质全齐。您选福利供应商，最怕的就是公司不稳定、服务断档。我们20年稳扎稳打，就是您最安全的选择。」\n*逻辑：对于企业HR，选供应商是“零风险”决策。强调公司的资质和经营年限，就是告诉他们：选我们，你没有任何后顾之忧。*\n\n**风险提醒：** 跟客户聊服务保障时，别主动去贬低任何一家竞品，只说咱们自己的优势。如果客户非要你评价竞品，你就说“每家各有特点，我重点给您讲讲我们福多多是怎么做的”，然后回到上面三个角度。\n\n来源：\n1. 《比较一下淘宝和拼多多在售后服务上的差距 - 今日头条》\n2. 《现在的淘宝和拼多多哪一个平台的客服给客户体验会更好一些?_知乎》\n3. 《对比淘宝和拼多多两个平台_知乎》\n（共 5 条来源）", "task_type": "objection_handling", "risk_level": "none", "sources_count": 5, "latency_ms": 8855, "ttft_ms": 33, "prompt_tokens": 5242, "completion_tokens": 582, "total_tokens": 5824, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.9, "完整性 (Completeness) [GEval]": 0.8, "Contextual Recall": 0.4, "Contextual Precision": 0.0, "Contextual Relevancy": 0.3333, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.6}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": true, "Contextual Recall": false, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": true}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output covers the core facts from the Expected Output, including the self-operated customer service team, rapid response, zero-risk commitment, and compensation policies. However, it omits the specific mention of '当天闭环' (same-day resolution) and the explicit contrast of competitors' '推诿严重' (severe buck-passing). The completeness is high but not perfect, as the Expected Output's concise summary of '高品质运营及售后服务' is not directly mirrored. The output is highly practical for sales scenarios, providing ready-to-use talking points and risk reminders. Based on the scoring guide, the alignment is strong but with minor omissions, warranting a score of 9.", "完整性 (Completeness) [GEval]": "The actual output covers the key points from the expected output: it mentions the self-operated customer service team (service response) and the zero-risk commitment with compensation guarantees (after-sales assurance). However, it omits the specific comparison of competitors' shortcomings (e.g., poor after-sales, inconsistent promises) and the phrase 'high-quality operations and after-sales service' that summarizes the advantage. These are minor omissions, as the core meaning of the two main differentiators is present.", "Contextual Recall": "The score is 0.40 because only partial sentiment alignment exists between the expected output and the retrieval context. Specifically, sentence 1's mention of competitors' service issues like '推诿严重' finds some resonance in node(s) in retrieval c ctions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness. Great job!", "Answer Relevancy": "The score is 1.00 because the actual output contains no irrelevant statements and fully addresses the input's request to compare service response and after-sales support between 网票福多多 and its competitors.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "The response provided strategic sales differentiators, which aligns with the role of a sales coach, but it did not directly address the user's specific question (likely about competitor comparison) and omitted key information points from the user's request. The advice is actionable and professional, but the lack of direct response and missing details reduce the overall alignment."}}, {"question_id": "golden_0503", "question": "比较给销售新人的建议：寻找相似成功榜样与向同事学习，聚焦于各自的益处。", "reference": "对于销售新人而言，寻找相似成功的榜样和向同事学习各有独特益处：\n\n- **寻找相似成功的榜样**：能让你获得强烈的“他行，我也行”的信念。王菲正是通过找到一位性格内敛但靠踏实复盘成功的男同事作为榜样，在低谷期重建了自信。这种榜样更具参考价值，能直接激发你的成长型思维，让你相信能力可以通过努力复制。\n\n- **向同事学习**：能让你吸收身边人具体的闪光点，并快速内化为自己的技能。王菲强调，观察同事在真实拜访中的沟通方式，并主动“蹭”拜访，是新人积累量变的关键。这种学习更贴近日常，能即时解决具体问题。\n\n两者结合，既能通过榜样获得精神动力，又能通过同事学习积累实战经验，共同支撑新人度过新手期。", "kb_label": "taishan", "model": "(default)", "answer": "直接说结论：**对销售新人来说，先找相似成功榜样，再向同事学习，顺序不能反。**\n\n原因很简单——榜样给你\"能成\"的信心和方向，同事给你\"怎么干\"的方法和避坑。\n\n**先找相似成功榜样，核心价值是\"破冰\"和\"定位\"：**\n- 你刚入行，最怕的是\"这事我能干成吗？\"找一个和你背景、资源差不多的销冠，看他怎么从零到一，比看那些天赋型选手更有用。比如你之前是做行政转销售的，就找一个同样转型成功的同事案例，他的路径你直接能复制，这叫**\"可复制的成功\"**。\n- 根据员工案例库《王菲销售业务分享》（置信度80%），新人最容易卡在\"不敢开口\"和\"不知道客户在哪\"。榜样能告诉你：**\"我当年也是这么过来的，后来我做了这三件事...\"** 这比任何理论都管用。\n\n**再向同事学习，核心价值是\"落地\"和\"纠偏\"：**\n- 榜样给你方向，但具体到\"怎么给工会主席打电话\"\"客户说考虑一下怎么接\"，这些细节必须靠身边同事。每天花10分钟，盯一个你觉得厉害的同事，看他怎么开场、怎么处理异议、怎么逼单。**你不需要问，光看就能学到80%。**\n- 更关键的是，同事能给你**即时反馈**。你打完电话、拜访完客户，直接找他说\"我刚才那话术哪里不对\"，他一句话就能点醒你。这是榜样做不到的。\n\n**你明天就做的三件事：**\n1. 找你们团队里，业绩前3且入行时间不超过2年的同事，问他们\"你第一单怎么签的\"，记下来\n2. 每天下班前，找一个你觉得最会聊的同事，请他喝杯咖啡，让他复盘今天一个成功或失败的客户对话\n3. 给自己定个目标：**第一个月，模仿一个榜样的话术和节奏；第二个月，开始形成自己的风格**\n\n记住，新人最大的误区是\"自己闷头干\"。**榜样给你方向，同事给你方法，你只管执行。**", "rendered": "直接说结论：**对销售新人来说，先找相似成功榜样，再向同事学习，顺序不能反。**\n\n原因很简单——榜样给你\"能成\"的信心和方向，同事给你\"怎么干\"的方法和避坑。\n\n**先找相似成功榜样，核心价值是\"破冰\"和\"定位\"：**\n- 你刚入行，最怕的是\"这事我能干成吗？\"找一个和你背景、资源差不多的销冠，看他怎么从零到一，比看那些天赋型选手更有用。比如你之前是做行政转销售的，就找一个同样转型成功的同事案例，他的路径你直接能复制，这叫**\"可复制的成功\"**。\n- 根据员工案例库《王菲销售业务分享》（置信度80%），新人最容易卡在\"不敢开口\"和\"不知道客户在哪\"。榜样能告诉你：**\"我当年也是这么过来的，后来我做了这三件事...\"** 这比任何理论都管用。\n\n**再向同事学习，核心价值是\"落地\"和\"纠偏\"：**\n- 榜样给你方向，但具体到\"怎么给工会主席打电话\"\"客户说考虑一下怎么接\"，这些细节必须靠身边同事。每天花10分钟，盯一个你觉得厉害的同事，看他怎么开场、怎么处理异议、怎么逼单。**你不需要问，光看就能学到80%。**\n- 更关键的是，同事能给你**即时反馈**。你打完电话、拜访完客户，直接找他说\"我刚才那话术哪里不对\"，他一句话就能点醒你。这是榜样做不到的。\n\n**你明天就做的三件事：**\n1. 找你们团队里，业绩前3且入行时间不超过2年的同事，问他们\"你第一单怎么签的\"，记下来\n2. 每天下班前，找一个你觉得最会聊的同事，请他喝杯咖啡，让他复盘今天一个成功或失败的客户对话\n3. 给自己定个目标：**第一个月，模仿一个榜样的话术和节奏；第二个月，开始形成自己的风格**\n\n记住，新人最大的误区是\"自己闷头干\"。**榜样给你方向，同事给你方法，你只管执行。**\n\n来源：\n1. 《销售新人必看的经验分享!_职Q!》\n2. 《作为销售同行,你有哪些建议或者话,想对销售新手说的 ?_知乎》\n3. 《销售新手应该这样做,才能快速提高!_职Q!》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 7692, "ttft_ms": 51, "prompt_tokens": 3831, "completion_tokens": 461, "total_tokens": 4292, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.6, "完整性 (Completeness) [GEval]": 0.6, "Contextual Recall": 0.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.3333, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.95}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": true, "Contextual Recall": false, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": true}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output adds a strong sequential recommendation (\"先找榜样，再向同事学习\") not present in the Expected Output, which presents them as complementary without ordering. It also i 委员会或会员代表表决，体现民主程序。", "kb_label": "taishan", "model": "(default)", "answer": "这六大痛点抓得准，你明天就按这个顺序去拆解客户：**先解决合规和发票，再谈人均和性价比，最后用方便和流程民主收尾。**\n\n具体怎么打，我给你拆成三组动作：\n\n**第一组：合规+发票（这是工会的命门，必须先过）**\n- 话术直接上：“我们网票福多多成立20年，实缴注册资本3000万，至今零诉讼、零外债，所有商品和服务都能开正规增值税专用发票，品类明细按工会要求开，一分不差。”——这句话就是定心丸。\n- 根据产品知识库《零风险承诺v2.0》（置信度90%），我们的资质和发票体系是经过国家高新技术企业认证的，工会最怕审计出问题，你把这个点讲透，其他都好谈。\n\n**第二组：人均+性价比（这是工会的算账逻辑）**\n- 别跟客户算“我们便宜”，要算“你们省了多少事”。话术：“人均预算100元，我们年节慰问礼包有100-1000元多档位可选，30万+商品资源，蛋糕不高于官方正价（差价双倍赔付），电影票不高于猫眼零售价（差价三倍赔付）。你花同样的钱，员工拿到的是实实在在的优惠，工会不用再自己比价、垫钱、报销。”\n- 根据客户画像库（置信度75%），工会采购最怕“花了钱员工还不满意”，性价比不是最低价，是“花同样的钱，员工体验最好”。\n\n**第三组：方便+流程民主（这是工会的隐形需求）**\n- 方便：直接说“员工手机端操作，自选商品/蛋糕/电影票，我们7x12h客服团队24小时内响应，工会不用管分发、售后、投诉。”\n- 流程民主：话术：“你们工会委员开会讨论方案时，直接拿我们平台做备选，员工自选模式本身就是民主——每个人选自己想要的，不用投票、不用统计，系统自动生成订单，工会只需要审核预算。”——这招能帮工会省掉“选品吵架”的麻烦。\n\n**最后一句收尾话术**：“李主席，你们工会的六大痛点，我们一个方案全解决。你什么时候方便，我带着资质文件和方案过去，半小时讲清楚，你听完再决定。”", "rendered": "这六大痛点抓得准，你明天就按这个顺序去拆解客户：**先解决合规和发票，再谈人均和性价比，最后用方便和流程民主收尾。**\n\n具体怎么打，我给你拆成三组动作：\n\n**第一组：合规+发票（这是工会的命门，必须先过）**\n- 话术直接上：“我们网票福多多成立20年，实缴注册资本3000万，至今零诉讼、零外债，所有商品和服务都能开正规增值税专用发票，品类明细按工会要求开，一分不差。”——这句话就是定心丸。\n- 根据产品知识库《零风险承诺v2.0》（置信度90%），我们的资质和发票体系是经过国家高新技术企业认证的，工会最怕审计出问题，你把这个点讲透，其他都好谈。\n\n**第二组：人均+性价比（这是工会的算账逻辑）**\n- 别跟客户算“我们便宜”，要算“你们省了多少事”。话术：“人均预算100元，我们年节慰问礼包有100-1000元多档位可选，30万+商品资源，蛋糕不高于官方正价（差价双倍赔付），电影票不高于猫眼零售价（差价三倍赔付）。你花同样的钱，员工拿到的是实实在在的优惠，工会不用再自己比价、垫钱、报销。”\n- 根据客户画像库（置信度75%），工会采购最怕“花了钱员工还不满意”，性价比不是最低价，是“花同样的钱，员工体验最好”。\n\n**第三组：方便+流程民主（这是工会的隐形需求）**\n- 方便：直接说“员工手机端操作，自选商品/蛋糕/电影票，我们7x12h客服团队24小时内响应，工会不用管分发、售后、投诉。”\n- 流程民主：话术：“你们工会委员开会讨论方案时，直接拿我们平台做备选，员工自选模式本身就是民主——每个人选自己想要的，不用投票、不用统计，系统自动生成订单，工会只需要审核预算。”——这招能帮工会省掉“选品吵架”的麻烦。\n\n**最后一句收尾话术**：“李主席，你们工会的六大痛点，我们一个方案全解决。你什么时候方便，我带着资质文件和方案过去，半小时讲清楚，你听完再决定。”\n\n来源：\n1. 《工会采购制度》\n2. 《工会询价方案.docx_淘豆网》\n3. 《工会资金采购管理办法.docx-原创力文档》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 8525, "ttft_ms": 6, "prompt_tokens": 3828, "completion_tokens": 500, "total_tokens": 4328, "error": "", "m             <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
</body>
</html>
