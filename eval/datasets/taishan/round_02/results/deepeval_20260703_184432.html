.container{max-width:1400px;margin:0 auto;padding:24px}

.card .value{font-size:28px;font-weight:700;color:#1a1a2e}

.card.good .value{color:#10b981}
.card.warn .value{color:#f59e0b}
.card.bad .value{color:#ef4444}

.diff-positive{color:#10b981;font-weight:600}
.diff-negative{color:#ef4444;font-weight:600}
.diff-neutral{color:#6b7280}

.bar-chart{margin:16px 0}

.bar-label{width:140px;font-size:13px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toolbar input{flex:1;min-width:200px}
.toolbar select{min-width:140px}

.q-table tr:hover{background:#f8fafc}

了，说明你聊得不够多。这个思维一换，被拒从\"坏事\"变成\"进度条\"。\n\n**第三，主角心态——这是你的\"行动开关\"**\n\n主角心态不是\"我一定能成\"，而是\"我是这场对话的主导者\"。客户拒绝，你不需要消化情绪，你只需要切换策略。比如客户说\"太贵了\"，主角心态的反应是：\"好，那我换个角度，给你算笔账，看看省在哪。\" 你不是在求他，你是在帮他做决策。\n\n**明天就做的动作**：每次被拒后，立刻问自己一个问题：\"如果我是这个客户的福利顾问，我下一步该给他什么建议？\" 把\"被拒绝\"变成\"被提问\"，你就从被动变成了主动。\n\n**这三个东西怎么配合？**\n\n- **拒绝是常态**让你不把被拒当回事（认知层面）\n- **概率思维**让你把被拒当数字（情绪层面）\n- **主角心态**让你在被拒后立刻行动（行为层面）\n\n**一句话总结**：你不是在\"被拒绝\"，你只是在\"筛选客户\"。筛掉的越多，留下的就越准。明天开始，把被拒次数当成你的进度条，而不是你的成绩单。", "rendered": "这个问题问得深，但答案很简单：**把\"被拒绝\"从\"我的失败\"变成\"销售流程的必经环节\"，你就不会自我怀疑了。**\n\n你提到的这三个点，不是三个独立的心态，而是一套完整的防御系统。我拆开给你讲，每个给一个明天就能用的动作。\n\n**第一，拒绝是常态——这是你的\"认知底座\"**\n\n你卖的不是水，客户渴了自然会买。你卖的是福利方案，客户有预算、有流程、有偏好，拒绝是大概率事件。根据员工案例库《王菲销售业务分享》（置信度80%），她刚入行时被连续拒绝8次，第9个客户才开单。拒绝不是针对你，是客户在筛选。\n\n**明天就做的动作**：每次被拒后，在笔记本上写一句话：\"这个客户拒绝的是我的方案，不是我这个人的价值。\" 写满10次，你再看心态。\n\n**第二，概率思维——这是你的\"情绪防火墙\"**\n\n销售是数字游戏。假设你的转化率是10%，那被拒9次就离成交只差1步。你不需要让每个客户都说\"好\"，你只需要找到那个说\"好\"的人。\n\n**明天就做的动作**：给自己定一个\"被拒KPI\"——比如今天必须被拒绝5次。被拒够了，目标就完成了，反而轻松。被拒少了，说明你聊得不够多。这个思维一换，被拒从\"坏事\"变成\"进度条\"。\n\n**第三，主角心态——这是你的\"行动开关\"**\n\n主角心态不是\"我一定能成\"，而是\"我是这场对话的主导者\"。客户拒绝，你不需要消化情绪，你只需要切换策略。比如客户说\"太贵了\"，主角心态的反应是：\"好，那我换个角度，给你算笔账，看看省在哪。\" 你不是在求他，你是在帮他做决策。\n\n**明天就做的动作**：每次被拒后，立刻问自己一个问题：\"如果我是这个客户的福利顾问，我下一步该给他什么建议？\" 把\"被拒绝\"变成\"被提问\"，你就从被动变成了主动。\n\n**这三个东西怎么配合？**\n\n- **拒绝是常态**让你不把被拒当回事（认知层面）\n- **概率思维**让你把被拒当数字（情绪层面）\n- **主角心态**让你在被拒后立刻行动（行为层面）\n\n**一句话总结**：你不是在\"被拒绝\"，你只是在\"筛选客户\"。筛掉的越多，留下的就越准。明天开始，把被拒次数当成你的进度条，而不是你的成绩单。\n\n来源：\n1. 《脑科学告诉你:一个简单的脑部技巧,可以帮助你克服自我怀疑。真相约翰有罪美国医学协会杂志_网易订阅》\n2. 《左槐 - 知乎》\n3. 《积极的心态面对任何事情(无惧与坚持)书评》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 9732, "ttft_ms": 9, "prompt_tokens": 3825, "completion_tokens": 544, "total_tokens": 4369, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.8, "完整性 (Completeness) [GEval]": 1.0, "Contextual Recall": 0.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.2326, "Faithfulness": 1.0, "Answer Relevancy": 0.9688, "AnswerRecall (回答 n", "model": "(default)", "answer": "王菲，你这个问题问得好，说明你想从实战中找方法。我直接说结论：**初做标书，别想着自己憋大招，你的核心动作就两个：一是“厚着脸皮”问对人，二是把问来的东西变成自己的“武器库”。**\n\n具体怎么做，我给你拆成三步，明天就能用：\n\n1.  **找准“师傅”，问对问题。** 别逮着谁就问“标书怎么做”，太泛了。你要锁定一个做过标书的同事，直接问：“哥/姐，咱们公司做福利标书，最常被卡住的资质文件是哪几个？你手头有没有现成的模板或清单能让我抄一份？” 这样问，对方不累，你拿到的也是干货。根据员工案例库《王菲销售业务分享》（置信度80%），王菲当时就是直接找负责过工会项目的同事，要到了“营业执照、社保缴纳证明、近三年审计报告”这几项核心资质的清单。\n\n2.  **把“问来的”变成“自己的”。** 拿到清单后，别光存着。你要做的是**分类建档**。比如建个文件夹叫“标书资质库”，里面再分：\n    *   **硬资质**：营业执照、开户许可证、社保/纳税证明（这些是死的，每年更新一次）。\n    *   **软实力**：公司介绍、成功案例、客户评价、服务承诺（这些是活的，可以针对不同客户微调）。\n    *   **加分项**：高新技术企业证书、ISO认证、零风险承诺文件（这些是福多多的独家武器，必须放进去）。\n    每次做完一份标书，就把新找到的文件或模板扔进去，你的“武器库”就越来越厚。\n\n3.  **“厚脸皮”的秘诀是“有来有往”。** 别光索取。你问完同事，拿到模板后，可以顺手说一句：“哥/姐，太感谢了，我整理了一份咱们常用资质的清单，发你一份，以后你也省事。” 或者下次帮对方带杯咖啡。**人情是互相的，你越“厚脸皮”地请教，越要“大方”地分享和感谢。** 这样，下次你再问，对方更愿意帮你。\n\n**一句话总结：标书不是写出来的，是“问”和“攒”出来的。明天上班，先找到那个做过标书的同事，按我说的第一步去问。**", "rendered": "王菲，你这个问题问得好，说明你想从实战中找方法。我直接说结论：**初做标书，别想着自己憋大招，你的核心动作就两个：一是“厚着脸皮”问对人，二是把问来的东西变成自己的“武器库”。**\n\n具体怎么做，我给你拆成三步，明天就能用：\n\n1.  **找准“师傅”，问对问题。** 别逮着谁就问“标书怎么做”，太泛了。你要锁定一个做过标书的同事，直接问：“哥/姐，咱们公司做福利标书，最常被卡住的资质文件是哪几个？你手头有没有现成的模板或清单能让我抄一份？” 这样问，对方不累，你拿到的也是干货。根据员工案例库《王菲销售业务分享》（置信度80%），王菲当时就是直接找负责过工会项目的同事，要到了“营业执照、社保缴纳证明、近三年审计报告”这几项核心资质的清单。\n\n2.  **把“问来的”变成“自己的”。** 拿到清单后，别光存着。你要做的是**分类建档**。比如建个文件夹叫“标书资质库”，里面再分：\n    *   **硬资质**：营业执照、开户许可证、社保/纳税证明（这些是死的，每年更新一次）。\n    *   **软实力**：公司介绍、成功案例、客户评价、服务承诺（这些是活的，可以针对不同客户微调）。\n    *   **加分项**：高新技术企业证书、ISO认证、零风险承诺文件（这些是福多多的独家武器，必须放进去）。\n    每次做完一份标书，就把新找到的文件或模板扔进去，你的“武器库”就越来越厚。\n\n3.  **“厚脸皮”的秘诀是“有来有往”。** 别光索取。你问完同事，拿到模板后，可以顺手说一句：“哥/姐，太感谢了，我整理了一份咱们常用资质的清单，发你一份，以后你也省事。” 或者下次帮对方带杯咖啡。**人情是互相的，你越“厚脸皮”地请教，越要“大方”地分享和感谢。** 这样，下次你再问，对方更愿意帮你。\n\n**一句话总结：标书不是写出来的，是“问”和“攒”出来的。明天上班，先找到那个做过标书的同事，按我说的第一步去问。**\n\n来源：\n1. 《北京法律服务网》\n2. 《王菲成长旧事:当歌星一点都不好玩 - 豆丁网》\n3. 《她是平民屋邨校出身双料港姐,性格活络疑与唱片公司太子爷好事近_王菲_张子_香港》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 9458, "ttft_ms": 4, "prompt_tokens": 3832, "completion_tokens": 520, "total_to 册资本3000万，这些才是客户敢把福利预算交给我们的底气。产品可以抄，但20年积累的信用和风控体系抄不了。」\n\n**逻辑**：把竞争从\"功能层面\"拉到\"信任层面\"，这是后来者最难跨越的门槛。\n\n**角度三：用\"服务深度\"拉开差距**\n「另外，友商复制产品容易，但复制服务很难。我们有自营客服团队7×12小时在线，24小时极速响应。企业HR最怕的不是产品不好，而是出了问题没人管。福多多能承诺的是——不管哪个环节出问题，我们有人兜底。这种服务深度，是友商靠外包客服做不到的。」\n\n**逻辑**：把竞争从\"产品层面\"拉到\"服务层面\"，强调长期合作的安心感。\n\n**风险提醒**：如果客户追问具体某个竞品的情况，比如\"XX公司也做蛋糕卡，你们有什么区别\"，不要直接说对方不好，而是说\"关于XX的具体信息我这边知识库覆盖有限，我可以先给你详细介绍福多多蛋糕的几项核心优势——200+品牌、11000+款式、覆盖75000+门店，而且承诺不高于官方正价，差价双倍赔付。\"", "rendered": "这个问题问得挺深，说明你在认真思考福多多的护城河。客户能问出这句话，恰恰说明他已经认可了福多多\"三个支柱\"这个框架，只是在担心复制性。\n\n**直接说结论：竞品能复制一个点，但复制不了三个点形成的系统。福多多的独特性不在于单个支柱，而在于三个支柱之间的咬合关系。**\n\n给你三个角度去回应客户：\n\n**角度一：从\"单点优势\"转向\"系统优势\"**\n「王总，您这个问题问得很专业。确实，如果只看单个点，比如电影票，友商也能做。但福多多的独特性在于三个支柱是咬合在一起的——电影票的覆盖量、蛋糕的零差价承诺、年节礼包的供应链能力，这三者形成的是一个福利闭环。友商复制一个点容易，但要把三个点同时做到我们这种深度，需要同时搞定全国14000+影院的结算体系、200+蛋糕品牌的零差价协议、30万+商品的供应链，这不是砸钱就能短期堆出来的。」\n\n**逻辑**：把客户的注意力从\"单个功能对比\"拉到\"系统能力对比\"，让对方意识到复制成本极高。\n\n**角度二：用\"零风险承诺\"作为信任锚点**\n「而且王总，福多多真正难复制的不只是产品，而是我们敢给的承诺。电影票不高于猫眼零售价，差价三倍赔付；蛋糕不高于官方正价，差价双倍赔付。友商敢不敢把这些承诺写进合同？我们20年零诉讼、零外债，实缴注册资本3000万，这些才是客户敢把福利预算交给我们的底气。产品可以抄，但20年积累的信用和风控体系抄不了。」\n\n**逻辑**：把竞争从\"功能层面\"拉到\"信任层面\"，这是后来者最难跨越的门槛。\n\n**角度三：用\"服务深度\"拉开差距**\n「另外，友商复制产品容易，但复制服务很难。我们有自营客服团队7×12小时在线，24小时极速响应。企业HR最怕的不是产品不好，而是出了问题没人管。福多多能承诺的是——不管哪个环节出问题，我们有人兜底。这种服务深度，是友商靠外包客服做不到的。」\n\n**逻辑**：把竞争从\"产品层面\"拉到\"服务层面\"，强调长期合作的安心感。\n\n**风险提醒**：如果客户追问具体某个竞品的情况，比如\"XX公司也做蛋糕卡，你们有什么区别\"，不要直接说对方不好，而是说\"关于XX的具体信息我这边知识库覆盖有限，我可以先给你详细介绍福多多蛋糕的几项核心优势——200+品牌、11000+款式、覆盖75000+门店，而且承诺不高于官方正价，差价双倍赔付。\"\n\n来源：\n1. 《拼多多和字节在海外“打”起来之前，先要完成一个共同目标：击败SHEIN》\n2. 《拼多多运营模式成功的关键是什么?_知乎》\n3. 《拼多多和字节在海外打起来之前,先要完成一个共同目标:击败SHEIN_新浪财经_新浪网》\n（共 5 条来源）", "task_type": "objection_handling", "risk_level": "none", "sources_count": 5, "latency_ms": 10466, "ttft_ms": 18, "prompt_tokens": 5769, "completion_tokens": 580, "total_tokens": 6349, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.5, "完整性 (Completeness) [GEval]": 0.4, "Contextual Recall": 0.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.6, "Faithfulne 层面？", "reference": "根据上下文，支撑王菲销售行为的内在系统包含以下三个层面：\n\n1. **能力层面**：包括觉察复盘能力、同理共情能力、借力学习能力和情绪调节能力。\n2. **信念/价值观层面**：包括“都是客户的问题”、“做事要搞清楚”、“坚持就能做成”、“成长比成交更重要”和“自己的工作最重要”。\n3. **身份认同层面**：认同自己是一个能帮客户解决问题的“超级销售”，并正从优秀个人贡献者向“团队 Leader”的身份转变。", "kb_label": "taishan", "model": "(default)", "answer": "目前还没有足够的销售对话数据来做这份报告。多和助手聊聊真实的销售场景，下次就能看到结果了。", "rendered": "目前还没有足够的销售对话数据来做这份报告。多和助手聊聊真实的销售场景，下次就能看到结果了。", "task_type": "", "risk_level": "none", "sources_count": 0, "latency_ms": 11, "ttft_ms": 0, "prompt_tokens": 0, "completion_tokens": 0, "total_tokens": 0, "error": "DeepEval error: Evaluation LLM outputted an invalid JSON. Please use a better evaluation model.", "metric_scores": {}, "metric_success": {}, "metric_reasons": {}}, {"question_id": "golden_0542", "question": "模仿成功同事及会后反思如何推动销售业绩提升？", "reference": "根据上下文，模仿成功榜样和会后复盘主要通过以下方式提升销售业绩：\n\n1.  **通过模仿学习提升能力**：王菲认为自己的好成绩很大程度上源于“模仿和学习”。她通过找一个与自己性格相似的成功榜样，并观察、吸收同事和朋友的闪光点，培养了成长型思维，相信能力可以通过学习得到发展，从而不断优化自己的销售方法。\n\n2.  **通过复盘将经验转化为养分**：王菲强调“如果你见完客户不去复盘，那就等于没见”。通过复盘，无论拜访成功与否，每一次经历都会变成自己的养分。碰到的问题越多，需要学习和复盘的东西就越多，积累的就越深，慢慢就成了专家。当客户觉得“你懂他”时，成交就有了信任基础。", "kb_label": "taishan", "model": "(default)", "answer": "直接说结论：**模仿成功同事不是照搬动作，而是拆解他的\"成交逻辑\"，然后结合你自己的风格去复制。** 会后反思的核心是\"找差距、定动作\"，不是写流水账。\n\n给你三个马上能用的动作：\n\n1. **盯一个成功同事，做\"三拆\"**\n   - 拆他的**开场白**：他是怎么破冰的？用了什么话术让客户愿意聊下去？\n   - 拆他的**异议处理**：客户说贵/考虑时，他第一反应说什么？逻辑是什么？\n   - 拆他的**跟进节奏**：他隔几天联系？用什么理由？发什么内容？\n   下周找机会跟单一次，或者请他复盘一个成交案例，记下来。\n\n2. **会后反思用\"三问\"代替流水账**\n   - 今天**哪个环节**客户反应最好？为什么？\n   - 今天**哪个环节**卡住了？下次遇到同样情况，我第一句话说什么？\n   - 今天**哪个动作**是成功同事会做、我没做的？明天补上。\n   每天花5分钟写这三问，比写长篇反思有用十倍。\n\n3. **把\"模仿\"变成\"刻意练习\"**\n   - 选一个你最想提升的点（比如开场白），这周每天对着镜子练3遍，或者找同事对练。\n   - 下周拜访时，刻意用一次成功同事的话术，结束后立刻复盘效果。\n   - 别贪多，一个月只死磕一个技能。\n\n**记住：** 销售提升不是靠\"想明白\"，是靠\"练到肌肉记忆\"。你明天就做一件事——约那个成功同事喝杯咖啡，请他拆一个真实成交案例给你听。", "rendered": "直接说结论：**模仿成功同事不是照搬动作，而是拆解他的\"成交逻辑\"，然后结合你自己的风格去复制。** 会后反思的核心是\"找差距、定动作\"，不是写流水账。\n\n给你三个马上能用的动作：\n\n1. **盯一个成功同事，做\"三拆\"**\n   - 拆他的**开场白**：他是怎么破冰的？用了什么话术让客户愿意聊下去？\n   - 拆他的**异议处理**：客户 g to a score slightly below 1.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness. Great job!", "Answer Relevancy": "The score is 0.76 because the actual output contains several statements that are not directly comparing the three core value pillars or highlighting differences from competitors, which is the main requirement of the input. However, the output still partially addresses the topic, so it is not lower.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统直接回应用户问题，提供了具体、可操作的销售话术，覆盖了三大核心价值支柱，并针对每个优势指出了竞争对手痛点，没有遗漏关键信息，语气符合专业销售教练角色。"}}, {"question_id": "golden_0423", "question": "如果福利采购负责人忽视供应商稳定性风险，可能会引发哪些潜在危机？", "reference": "如果福利采购负责人忽视供应商稳定性风险，可能引发以下隐性危机：\n\n1. **供应商跑路风险**：一旦供应商经营不稳或突然倒闭，已支付的福利预算可能无法追回，导致企业直接经济损失，且员工无法正常享受福利，引发大规模投诉。\n2. **服务中断与推诿**：不稳定的供应商常出现服务响应慢、问题推诿，员工兑换福利时遭遇卡顿、商品下架或临时加价，导致满意度骤降，工会和HR疲于“救火”。\n3. **审计与问责压力**：采购决策者需为供应商资质不稳、财务不透明等问题承担审计责任，甚至面临被举报“吃回扣”的合规风险，职业风险显著增大。\n4. **员工幸福感下降**：福利预算花出去却换不来员工认可，员工因体验差而抱怨，企业留人、暖心的初衷落空，反而加剧内部矛盾。\n\n这些危机最终会使福利采购成为领导汇报时的“负面案例”，而非亮点政绩。", "kb_label": "taishan", "model": "(default)", "answer": "直接说：**忽视供应商稳定性，最致命的后果不是价格贵，而是“关键时刻掉链子”，让你在老板和员工面前两头不讨好。**\n\n具体来说，会引发三个层面的潜在危机：\n\n**1. 信任崩塌危机（对HR/采购负责人个人）**\n• **员工层面**：中秋节发不出蛋糕券、春节礼包配送延迟、电影票兑换不了——员工不会骂供应商，只会骂“公司福利真差劲”“HR办事不靠谱”。你辛辛苦苦做的福利调研、方案汇报，全毁在最后一公里。\n• **老板层面**：老板只看结果。福利发得乱七八糟，他会质疑你的供应商筛选能力、风险把控能力，甚至怀疑你拿了回扣。一次重大事故，足以让你在老板心里的信任分归零。\n\n**2. 运营瘫痪危机（对公司）**\n• **突发断供**：供应商资金链断裂、系统宕机、仓库被封，直接导致福利无法发放。比如蛋糕券突然无法核销，员工生日当天收不到蛋糕，这种负面情绪会迅速在公司内部发酵。\n• **数据安全风险**：不稳定的供应商，IT系统可能漏洞百出。员工个人信息、公司组织架构一旦泄露，法律风险和声誉损失是灾难性的。\n\n**3. 成本失控危机（对预算）**\n• **隐性成本**：为了补救一次事故，HR需要投入大量时间安抚员工、协调供应商、写报告解释。这些时间成本远超那点采购差价。\n• **替换成本**：临时换供应商，新供应商的报价、服务、系统对接都需要重新磨合，仓促上马往往更贵、更差。\n\n**你明天就能用的动作：**\n下次和客户聊时，别只谈价格和产品。直接问一句：“**王总，您现在的供应商，如果明天突然系统崩了，您有备用方案吗？**” 这个问题，比任何产品介绍都更能戳中痛点。然后顺势介绍福多多的“零风险承诺”和20年稳健经营背景——**根据产品 ice disruption, audit pressure, and employee dissatisfaction. However, it omits the specific 'audit and accountability pressure' and 'employee happiness decline' as distinct items, and introduces a sales pitch for 'Fuduoduo' that is not in the Expected Output, reducing completeness. The practical usefulness for sales scenarios is high due to the actionable question and product promotion, but the score is lowered because the response does not fully align with the Expected Output's structure and misses some critical points.", "完整性 (Completeness) [GEval]": "The Actual Output covers the core themes of trust collapse, operational disruption, and cost overruns, but it does not explicitly address the 'supplier absconding risk' (financial loss from prepaid budgets) or 'audit and accountability pressure' (compliance risks and accusations of kickbacks) that are key points in the Expected Output. The mention of 'kickback suspicion' is present but not tied to audit pressure. The employee satisfaction point is covered indirectly. Overall, several important points are missing, leading to a score in the 0.5-0.6 range.", "Contextual Recall": "The score is 0.00 because none of the sentences in the expected output are directly supported by the retrieval context. While node(s) in retrieval context (e.g., node 1 and node 4) mention general supplier risks like instability, delivery delays, and compliance issues, they lack the specific details present in the expected output, such as '隐性危机', '供应商跑路风险', '已支付的福利预算可能无法追回', '服务响应慢、问题推诿', '审计与问责压力', '被举报吃回扣', '员工幸福感下降', and '负面案例'. The context does not cover the welfare procurement scenario or the employee satisfaction and leadership reporting aspects at all.", "Contextual Precision": "The score is 0.25 because only the fourth node is relevant, but it is ranked fourth out of five, meaning three irrelevant nodes are ranked above it. The first node is irrelevant as it 'does not specifically address the consequences of ignoring supplier stability n_0349", "question": "合规要求、预算限制和成员需求如何共同影响工会采购？", "reference": "工会采购的合规性、预算刚性和会员需求三者共同决定了采购的流程与方向。首先，合规性要求采购必须严格遵循工会经费使用规定，流程需民主透明，且对发票、人均标准有严格要求，确保经得起审计。其次，预算刚性意味着经费额度有限，工会必须通过规模化采购和优选方案实现预算价值最大化。最后，会员需求驱动福利内容必须多元且实用，以提升会员感知和满意度。综合来看，合规性保障采购合法透明，预算刚性约束成本效率，会员需求则决定福利的针对性与吸引力，三者缺一不可。", "kb_label": "taishan", "model": "(default)", "answer": "这个问题问得准，说明你已经开始从\"卖产品\"往\"做顾问\"转了。这三者不是独立因素，而是一个三角约束，你必须在里面找到最优解。\n\n**核心结论：合规是底线，预算是边界，成员需求是突破口。你的价值就是把这三者串起来，给工会主席一个\"既安全又省钱还能让员工满意\"的方案。**\n\n具体怎么串，给你三个动作：\n\n1.  **用合规建立信任，打消主席的顾虑。** 工会采购最怕的就是审计出问题。你开场就要主动亮出福多多的\"护身符\"——根据产品知识库《零风险承诺v2.0》（置信度90%），我们有实缴3000万注册资本、20年零诉讼零外债、国家高新技术企业资质。直接跟主席说：\"我们所有流程都经得起审计，合同、发票、资质一应俱全，您这边合规上有什么特殊要求，我们全力配合。\" 这能让他从\"怕出事\"变成\"放心聊\"。\n\n2.  **用预算框定方案，别让客户觉得你漫天要价。** 别一上来就推最贵的套餐。先问清楚：\"咱们今年人均预算大概在什么范围？是固定金额还是按人头浮动？\" 然后根据预算，直接给出2-3个档位的方案。比如预算200元/人，就推年节慰问的200元档礼包；预算500元/人，就可以组合观影文娱+生日礼遇。**让主席觉得你是在帮他省钱，而不是在推销。**\n\n3.  **用成员需求制造\"爽点\"，让方案落地。** 这是你拉开和竞品差距的地方。别只讲\"我们有30万种商品\"，要讲\"你们员工最想要什么\"。你可以问主席：\"咱们员工平均年龄多大？平时团建爱看电影还是聚餐？\" 然后针对性推荐。比如年轻员工多的企业，就主推**观影文娱**（全国14000+影院通兑）和**企业餐补**（外卖到店都能用）；传统企业就推**年节慰问**的实物礼包。**让主席觉得你懂他的员工，方案能帮他提升满意度。**\n\n**一句话总结：你明天去见工会主席，就按这个顺序聊——先亮资质（合规），再问预算（边界），最后推场景（需求）。把这三件事串起来，你就是他眼里的\"福利顾问\"，不是\"卖券的\"。**", "rendered": "这个问题问得准，说明你已经开始从\"卖产品\"往\"做顾问\"转了。这三者不是独立因素，而是一个三角约束，你必须在里面找到最优解。\n\n**核心结论：合规是底线，预算是边界，成员需求是突破口。你的价值就是把这三者串起来，给工会主席一个\"既安全又省钱还能让员工满意\"的方案。**\n\n具体怎么串，给你三个动作：\n\n1.  **用合规建立信任，打消主席的顾虑。** 工会采购最怕的就是审计出问题。你开场就要主动亮出福多多的\"护身符\"——根据产品知识库《零风险承诺v2.0》（置信度90%），我们有实缴3000万注册资本、20年零诉讼零外债、国家高新技术企业资质。直接跟主席说：\"我们所有流程都经得起审计，合同、发票、资质一应俱全，您这边合规上有什么特殊要求，我们全力配合。\" 这能让他从\"怕出事\"变成\"放心聊\"。\n\n2.  **用预算框定方案，别让客户觉得你漫天要价。** 别一上来就推最贵的套餐。先问清楚：\"咱们今年人均预算大概在什么范围？是固定金额还是按人头浮动？\" 然后根据预算，直接给出2-3个档位的方案。比如预算200元/人，就推年节慰问的200元档礼包；预算500元/人，就可以组合观影文娱+生日礼遇。**让主席觉得你是在帮他省钱，而不是在推销。**\n\n3.  **用成员需求制造\"爽点\"，让方案落地。** 这是你拉开和竞品差距的地方。别只讲\"我们有30万种商品\"，要讲\"你们员工最想要什么\"。你可以问主席：\"咱们员工平均年龄多大？平时团建爱看电影还是聚餐？\" 然后针对性推荐。比如年轻员工多的企业，就主推**观影文娱**（全国14000+影院通兑）和**企业餐补**（外卖到店都能用）；传统企业就推**年节慰问**的实物礼包。**让主席觉得你懂他的员工，方案能帮他提升满意度。** 。不用长篇大论，30秒搞定。\n2. **每周五花15分钟**：翻一遍这周的失败档案，找共性。比如\"连续3次客户都说价格高\"，那下周你就重点练价值塑造。\n3. **找前辈对一次**：挑一个你觉得最难搞的客户，把复盘结果发给我或你的师傅，我们帮你看看盲区在哪。\n\n记住，**复盘不是写作文，是给明天的自己装导航**。不做复盘，你就是在黑夜里开车，撞了也不知道为什么。", "rendered": "这个问题问得好，但咱们别空谈理论。我给你一个明天就能用的动作，比讨论\"成长差异\"实在得多。\n\n**你明天就做一件事：** 挑出你上个月最失败的一单，用10分钟写三句话——①客户拒绝我的直接原因是什么？②我当时哪句话/哪个动作是败笔？③如果重来，我第一句会说什么？\n\n做完这个，你就已经比那个\"跳过复盘\"的销售领先了。因为成长不是靠\"知道\"，是靠\"做到\"。\n\n**具体说说差距在哪：**\n\n• **复盘的销售**：三个月后，他能预判客户80%的异议。比如客户说\"考虑一下\"，他脑子里立刻弹出3种应对话术，因为他在复盘里已经演练过。根据员工案例库《王菲销售业务分享》（置信度80%），王菲提到\"每次复盘后，我都能把客户拒绝的话术提前准备好，成交率提升了30%以上\"。\n\n• **不复盘的销售**：三个月后，他还在用同一套话术撞南墙。客户说\"贵\"，他只会说\"我们质量好\"，因为他的经验库是空的，每次都是\"第一次\"面对客户。\n\n**你做得好的地方：** 你能问出这个问题，说明你已经意识到复盘的价值，这比90%的新销售强。很多人干了一年都不知道自己为什么没开单。\n\n**给你的具体改进动作：**\n\n1. **建立\"失败档案\"**：每次丢单后，用手机备忘录记3个关键词——客户拒绝理由、你的应对、下次改进。不用长篇大论，30秒搞定。\n2. **每周五花15分钟**：翻一遍这周的失败档案，找共性。比如\"连续3次客户都说价格高\"，那下周你就重点练价值塑造。\n3. **找前辈对一次**：挑一个你觉得最难搞的客户，把复盘结果发给我或你的师傅，我们帮你看看盲区在哪。\n\n记住，**复盘不是写作文，是给明天的自己装导航**。不做复盘，你就是在黑夜里开车，撞了也不知道为什么。\n\n来源：\n1. 《超兔CRM系统落地复盘,助力销售业绩提升_网易订阅》\n2. 《复盘对销售有多重要?_知乎》\n3. 《2022营销月度总结实用》\n（共 5 条来源）", "task_type": "conversation_review", "risk_level": "none", "sources_count": 5, "latency_ms": 7388, "ttft_ms": 12, "prompt_tokens": 3912, "completion_tokens": 439, "total_tokens": 4351, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.3, "完整性 (Completeness) [GEval]": 0.2, "Contextual Recall": 1.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.4839, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.0}, "metric_success": {"正确性 (Correctness) [GEval]": false, "完整性 (Completeness) [GEval]": false, "Contextual Recall": true, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": false}, "metric_reasons": {"正确性 (Correctness) [GEval]": "The Actual Output does not match the core facts or policy description from the Expected Output. The Expected Output centers on a re irrelevant to the input, as they do not directly compare the growth difference between skipping follow-up reviews for a month and diligently reviewing. For example, the first node (rank 1) states it '并未直接对比‘连续一个月跳过复盘’与‘认真复盘’的成长差异', and the fifth node (rank 5) is a sales monthly work plan template that '未涉及复盘与成长对比的内容'. Since no relevant nodes exist, the ranking of relevant nodes higher than irrelevant nodes is impossible, resulting in the lowest score.", "Contextual Relevancy": "The score is 0.48 because the retrieval context contains some relevant statements about the importance of review (复盘) for sales growth, such as '今天超兔要从业务视角说说销售成长及业绩提升的关键——复盘' and the case study comparing two salespeople's different work methods, which directly relates to the input's question about growth differences between a salesperson who skips follow-up reviews and one who summarizes meetings. However, many statements are irrelevant, including philosophical quotes from Schopenhauer, general sales qualities, incomplete sentences, and unrelated topics like personnel changes or product learning, as noted in reasons like '该陈述是关于叔本华的哲学观点，与销售成长或客户跟进复盘无关' and '该语句主要涉及人员变更和招聘计划，与输入中关于新销售跳过客户跟进复盘与认真总结的成长差异无关'. This mix of relevant and irrelevant content results in a moderate score.", "Faithfulness": "The score is 1.00 because there are no contradictions between the actual output and the retrieval context. The actual output perfectly aligns with the information provided, demonstrating excellent faithfulness. Great job!", "Answer Relevancy": "The score is 1.00 because the actual output contains no irrelevant statements and fully addresses the input question about comparing the growth of a salesperson who skips follow-up reviews versus one who diligently summarizes meetings.", "AnswerRecall (回答召回率)": "检索内容为空，无法评估召回率", "Task Completion": "系统未直接回应用户的具体问题，而是给出了关于复盘与不复盘销售成长差异的分析，这属于答非所问。同时，未提供可操作的、具体的销售建议或信息，也未针对用户问题中的关键信息点进行回应，且回答的语气和风格不符合专业销售教练的角色。"}}, {"question_id": "golden_0351", "question": "工会经费计提比例及留存规则？", "reference": "根据工会经费管理规定，经费主要来源为单位按工资总额2%计提的工会经费，其中基层工会留存50%，其余部分上缴上级工会。此外，经费还包括会员缴纳的5‰会费、行政补助和上级补助等。", "kb_label": "taishan", "model": "(default)", "answer": "工会经费的计提比例和留存规则，**直接关系到你给客户做方案时算预算、讲合规的底气**。根据《中华人民共和国工会法》和《基层工会经费收支管理办法》，标准是统一的。\n\n**核心结论：**\n1.  **计提比例**：企业按全部职工工资总额的 **2%** 计提工会经费。\n2.  **留存规则**：这2%中，**40%** 上缴上级工会（通常由地税代征），**60%** 留存给企业基层工会自行使用。\n\n**你明天就能用的三个动作：**\n\n1.  **算给客户看**：客户公司年工资总额1000万，工会经费就是20万。其中12万（60%）是工会自己能花的钱。你推荐福多多的福利方案，就是帮他把这12万花在刀刃上——员工满意、合规透明。\n2.  **讲合规价值**：很多HR和工会主席最怕的就是\"钱花不出去\"或\"花错地方\"。福多多的观影、蛋糕、年节慰问，全部属于《办法》里规定的\"职工活动支出\"和\"维权支出\"范畴，**每一笔都有据可查，经得起审计**。这是你最大的卖点。\n3.  **准备一个\"合规话术\"**：下次见客户，直接说：\"王总，工会经费60%是你们自己的钱，但怎么花得合规、让员工叫好、领导放心？福多多的方案，每一分钱都能对应到工会经费的支出科目，审计来了也不怕。\"\n\n**注意**：各地税务代征比例和返还流程可能有细微差异（比如有些地方是先全额上缴再返还60%），建议你在和客户沟通具体方案时，**需要查询知识库确认**当地的具体返还政策，或者让客户和他们的财务确认一下。但2%和60%这个核心规则，全国通用。", "rendered": "工会经费的计提比例和留存规则，**直接关系到你给客户做方案时算预算、讲合规的底气**。根据《中华人民共和国工会法》和《基层工会经费收支管理办法》，标准是统一的。\n\n**核心结论：**\n1.  **计提比例**：企业按全部职工工资总额的 **2%** 计提工会经费。\n2.  **留存规则**：这2%中，**40%** 上缴上级工会（通常由地税代征），**60%** 留存给企业基层工会自行使用。\n\n**你明天就能用的三个动作：**\n\n1.  **算给客户看**：客户公司年工资总额1000万，工会经费就是20万。其中12万（60%）是工会自己能花的钱。你推荐福多多的福利方案，就是帮他把这12万花在刀刃上——员工满意、合规透明。\n2.  **讲合规价值**：很多HR和工会主席最怕的就是\"钱花不出去\"或\"花错地方\"。福多多的观影、蛋糕、年节慰问，全部属于《办法》里规定的\"职工活动支出\"和\"维权支出\"范畴，**每一笔都有据可查，经得起审计**。这是你最大的卖点。\n3.  **准备一个\"合规话术\"**：下次见客户，直接说：\"王总，工会经费60%是你们自己的钱，但怎么花得合规、让员工叫好、领导放心？福多多的方案，每一分钱都能对应到工会经费的支出科目，审计来了也不怕。\"\n\n**注意**：各地税务代征比例和返还流程可能有细微差异（比如有些地方是先全额上缴再返还60%），建议你在和客户沟通具体方案时，**需要查询知识库确认**当地的具体返还政策，或者让客户和他们的财务确认一下。但2%和60%这个核心规则，全国通用。\n\n来源：\n1. 《工会经费的计提比例是多少》\n2. 《工会经费的计提比例_律图》\n3. 《工会经费的计提比例_张燕鹏律师律师问答-华律•精选解答》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 6699, "ttft_ms": 37, "prompt_tokens": 3818, "completion_tokens": 405, "total_tokens": 4223, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.5, "完整性 (Completeness) [GEval]": 0.2, "Contextual Recall": 0.5, "Contextual Precision": 1.0, "Contextual R 一样，他的路你复制得了。\n- 具体动作：明天找你的主管问一句\"咱们团队里，有没有跟我情况差不多的销冠？我想跟他学一周\"。然后盯他3个关键动作：**怎么开场、怎么应对拒绝、怎么逼单**。记下来，下周直接套用。\n\n**二、再向同事学习——这是你的\"避坑指南\"**\n- 好处是**低成本试错**。同事每天跟你一起跑客户，他今天踩的坑，你明天就能避开。比如他刚被客户用\"预算不够\"怼回来，你晚上问他\"当时你怎么回的？\"，第二天你遇到同样问题就有现成话术。\n- 具体动作：每天午休或下班前，花5分钟问一个同事\"今天哪个客户最难搞？你咋处理的？\" 记下来，下次遇到类似情况直接抄答案。\n\n**三、两者怎么配合？**\n- 榜样给你**方向**（知道往哪走）\n- 同事给你**路况**（知道哪里有坑）\n- 你每天做的事就是：**用榜样的方法去跑客户，用同事的教训来避险**\n\n最后送你一句话：**新人不要自己发明轮子，先复制，再优化。** 明天就开始找那个榜样，别等。", "rendered": "直接说结论：**先找相似成功榜样，再向同事学习，顺序不能反。**\n\n新人最容易踩的坑是\"见谁学谁\"，结果学了一堆不适合自己的打法，越干越乱。我给你拆开说：\n\n**一、先找相似成功榜样——这是你的\"导航地图\"**\n- 好处是帮你**快速建立\"我能成\"的信心**。找一个跟你背景、性格、入行时间差不多的销冠，看他怎么开场、怎么破冰、怎么处理\"再考虑\"。因为你们起点一样，他的路你复制得了。\n- 具体动作：明天找你的主管问一句\"咱们团队里，有没有跟我情况差不多的销冠？我想跟他学一周\"。然后盯他3个关键动作：**怎么开场、怎么应对拒绝、怎么逼单**。记下来，下周直接套用。\n\n**二、再向同事学习——这是你的\"避坑指南\"**\n- 好处是**低成本试错**。同事每天跟你一起跑客户，他今天踩的坑，你明天就能避开。比如他刚被客户用\"预算不够\"怼回来，你晚上问他\"当时你怎么回的？\"，第二天你遇到同样问题就有现成话术。\n- 具体动作：每天午休或下班前，花5分钟问一个同事\"今天哪个客户最难搞？你咋处理的？\" 记下来，下次遇到类似情况直接抄答案。\n\n**三、两者怎么配合？**\n- 榜样给你**方向**（知道往哪走）\n- 同事给你**路况**（知道哪里有坑）\n- 你每天做的事就是：**用榜样的方法去跑客户，用同事的教训来避险**\n\n最后送你一句话：**新人不要自己发明轮子，先复制，再优化。** 明天就开始找那个榜样，别等。\n\n来源：\n1. 《销售新人必看的经验分享!_职Q!》\n2. 《作为销售同行,你有哪些建议或者话,想对销售新手说的 ?_知乎》\n3. 《销售新手应该这样做,才能快速提高!_职Q!》\n（共 5 条来源）", "task_type": "general_sales_coaching", "risk_level": "none", "sources_count": 5, "latency_ms": 6344, "ttft_ms": 23, "prompt_tokens": 3831, "completion_tokens": 383, "total_tokens": 4214, "error": "", "metric_scores": {"正确性 (Correctness) [GEval]": 0.9, "完整性 (Completeness) [GEval]": 0.7, "Contextual Recall": 0.0, "Contextual Precision": 0.0, "Contextual Relevancy": 0.3333, "Faithfulness": 1.0, "Answer Relevancy": 1.0, "AnswerRecall (回答召回率)": 1.0, "Task Completion": 0.7}, "metric_success": {"正确性 (Correctness) [GEval]": true, "完整性 (Completeness) [GEval]": true, "Contextual Recall": false, "Contextual Precision": false, "Contextual Relevancy": false, "Faithfulness": true, "Answer Relevancy": true, "AnswerRecall (回答召回率)": true, "Task Completion": true}, "metric_reasons": {"正确性 (Cor             <div class="sub">${KB_LIST.map((n,i) => `${n}: ${scores[i].toFixed(2)}`).join(' / ')}</div>

    });

    container.innerHTML = html;
}

const PAGE_SIZE = 50;
let currentPage = 1;

function goPage(n) { currentPage = n; renderTable(); window.scrollTo(0, 300); }

function renderTable() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const kbFilter = document.getElementById('kb-filter').value;
    const scoreFilter = document.getElementById('score-filter').value;

    const taskFilter = document.getElementById('task-filter').value;

    let filtered = RESULTS.filter(r => {
        if (kbFilter !== 'all' && r.kb_label !== kbFilter) return false;
        if (taskFilter !== 'all' && (r.task_type||'') !== taskFilter) return false;
        const status = getPassStatus(r);
        if (scoreFilter !== 'all' && status !== scoreFilter) return false;
        if (search && !(r.question||'').toLowerCase().includes(search) && !(r.question_id||'').toLowerCase().includes(search)) return false;
        return true;
    });

    filtered = sortResults(currentSort.col, currentSort.asc).filter(r => filtered.includes(r));

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const pageItems = filtered.slice((currentPage-1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    document.getElementById('result-count').innerHTML = `显示 ${filtered.length} / ${RESULTS.length} 条` +
        (totalPages > 1 ? ` | 第 ${currentPage}/${totalPages} 页` +
        ` <button onclick="goPage(1)" ${currentPage<=1?'disabled':''}>«</button>` +
        ` <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>` +
        ` <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>` +
        ` <button onclick="goPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>` : '');

    // KB filter options
    const kbSelect = document.getElementById('kb-filter');
    if (kbSelect.options.length <= 1) {
        kbSelect.innerHTML = '<option value="all">全部 KB</option>' + KB_LIST.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // Task type filter options
    const taskSelect = document.getElementById('task-filter');
    if (taskSelect.options.length <= 1) {
        const types = [...new Set(RESULTS.map(r => r.task_type || '(空)'))].sort();
        taskSelect.innerHTML = '<option value="all">全部任务类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // Headers
    const cols = ['question_id','kb_label','question','task_type','latency_ms','ttft_ms','total_tokens','risk_level'];
    const thead = document.querySelector('#q-table thead');
    thead.innerHTML = `<tr>
        ${cols.map(c => {
            const labels = {question_id:'ID',kb_label:'KB',question:'问题',task_type:'任务类型',latency_ms:'延迟',ttft_ms:'TTFT',total_tokens:'Token',risk_level:'风险'};
            const sorted = currentSort.col === c ? ' sorted' : '';
            const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '↕';
            return `<th class="${sorted}" onclick="currentSort={col:'${c}',asc:currentSort.col==='${c}'?!currentSort.asc:true};renderTable()">${labels[c]||c} <span class="sort-icon">${arrow}</span></th>`;
        }).join('')}
        ${METRIC_NAMES.map(m => `<th onclick="currentSort={col:'${m}',asc:currentSort.col==='${m}'?!currentSort.asc:true};renderTable()">${m} <span class="sort-icon">↕</span></th>`).join('')}
        <th>状态</th>
    </tr>`;

    // Rows
    const tbody = document.querySelector('#q-table tbody');
    tbody.innerHTML = pageItems.map((r, i) => {
        const status = getPassStatus(r);
        const statusIcon = {pass:'✅',partial:'⚠️',fail:'❌',error:'💥',na:'—'}[status] || '—';
        const qid = r.question_id || '';
        const qText = (r.question || '').substring(0, 80);
        const isExpanded = expandedRows.has(qid + r.kb_label);

        const ttft = r.ttft_ms ? r.ttft_ms + 'ms' : '—';
        const tok = r.total_tokens ? (r.prompt_tokens||0)+'/'+(r.completion_tokens||0)+'/'+(r.total_tokens||0) : '—';

        let row = `<tr>
            <td>${qid}</td>
            <td>${r.kb_label||''}</td>
            <td class="q-text ${isExpanded?'expanded':''}" onclick="toggleExpand('${qid}','${r.kb_label}')" title="${(r.question||'').replace(/"/g,'&quot;')}">${isExpanded ? (r.question||'') : qText}</td>
            <td>${r.task_type||''}</td>
            <td>${r.latency_ms||0}ms</td>
            <td>${ttft}</td>
            <td>${tok}</td>
            <td>${r.risk_level||'none'}</td>
            ${METRIC_NAMES.map(m => {
                const score = r.metric_scores?.[m];
                const success = r.metric_success?.[m];
                const cls = score == null ? 'na' : success ? 'pass' : 'fail';
                return `<td><span class="score-badge ${cls}">${score != null ? score.toFixed(2) : '—'}</span></td>`;
            }).join('')}
            <td><span class="score-badge ${status==='pass'?'pass':status==='error'?'fail':status==='partial'?'fail':'na'}">${statusIcon}</span></td>
        </tr>`;

        // Expandable detail row
        if (isExpanded) {
            row += `<tr class="detail-row open"><td colspan="${8 + METRIC_NAMES.length}" class="detail-content">
                <div class="detail-grid">
                    <div class="detail-item"><div class="k">完整回答</div><div class="v">${(r.answer||'(无)').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0, 2000)}</div></div>
                    ${r.reference ? `<div class="detail-item"><div class="k">参考答案</div><div class="v">${r.reference.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
                    <div class="detail-item"><div class="k">性能指标</div><div class="v">延迟: ${r.latency_ms||0}ms | TTFT: ${r.ttft_ms||0}ms | Token: 入${r.prompt_tokens||0}/出${r.completion_tokens||0}/总${r.total_tokens||0}</div></div>
                    <div class="detail-item"><div class="k">指标详情</div><div class="v">
                        ${METRIC_NAMES.map(m => {
                            const reason = r.metric_reasons?.[m] || '';
                            return `<div style="margin:4px 0"><strong>${m}:</strong> ${(r.metric_scores?.[m]||0).toFixed(2)}${reason ? `<div class="reason-box">${reason.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}</div>`;
                        }).join('')}
                    </div></div>
                    ${r.error ? `<div class="detail-item"><div class="k">错误</div><div class="v" style="color:#ef4444">${r.error}</div></div>` : ''}
                </div>
            </td></tr>`;
        }

        return row;
    }).join('');
}

window.toggleExpand = function(qid, kb) {
    const key = qid + kb;
    if (expandedRows.has(key)) expandedRows.delete(key);
    else expandedRows.add(key);
    renderTable();
};

// ── Init ──
renderSummaryCards();
renderKBCompare();
renderBarChart();
renderTable();
</script>
</body>
</html>
